<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IIHF World Championship 2026 Simulator</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px 10px;
      background: #0b0e14;
      color: #e2e8f0;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 1.8rem;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .teams {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      max-width: 1000px;
      margin: auto;
    }

    .team {
      cursor: pointer;
      transition: all 0.2s ease-in-out;
      width: 65px; 
      padding: 8px;
      background: #1a1f29;
      border-radius: 8px;
      border: 1px solid #2d3748;
      box-sizing: border-box;
    }

    .team img {
      width: 100%;
      height: auto;
      aspect-ratio: 3/2;
      object-fit: cover;
      filter: drop-shadow(0 0 2px rgba(0,0,0,0.5));
      border-radius: 2px;
    }

    .team:hover {
      background: #2d3748;
      transform: translateY(-3px);
    }

    .selected {
      border-color: #38bdf8;
      background: #1e293b;
      box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
      transform: scale(1.05);
    }

    #match {
      margin-top: 25px;
      font-size: 1.2rem;
      min-height: 1.6em;
      font-weight: 500;
      color: #38bdf8;
    }

    .button-container {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .series-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    button {
      padding: 12px 25px;
      font-size: 16px;
      cursor: pointer;
      background-color: #f1f5f9;
      border: none;
      border-radius: 8px;
      color: #0b0e14;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      background-color: #38bdf8;
      color: white;
    }

    button:disabled {
      background-color: #2d3748;
      color: #475569;
      cursor: not-allowed;
    }

    #result {
      margin-top: 30px;
      font-size: 1.1rem;
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 12px;
      display: inline-block;
      min-width: 360px;
      text-align: left;
    }

    .score-display-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 10px;
    }

    .score-display {
      font-size: 3.5rem;
      font-weight: bold;
      color: #38bdf8;
      min-width: 120px;
      text-align: center;
    }

    .score-logo {
      width: 60px;
      height: 40px;
      object-fit: cover;
      border-radius: 4px;
    }

    .game-line {
      border-bottom: 1px solid #2d3748;
      padding: 8px 0;
      font-size: 0.95rem;
    }

    .winner-box {
      margin-top: 20px;
      font-size: 1.8rem;
      color: #fbbf24;
      text-align: center;
      font-weight: bold;
      padding: 10px;
      border: 2px solid #fbbf24;
      border-radius: 8px;
    }

    .status-msg {
      font-style: italic;
      color: #94a3b8;
      text-align: center;
      margin-bottom: 10px;
    }

    .team-names-info {
        text-align: center;
        font-size: 0.9rem;
        color: #e2e8f0;
    }

    @media (min-width: 600px) {
      .team { width: 85px; padding: 10px; }
      h1 { font-size: 2.5rem; }
    }
  </style>
</head>
<body>

  <h1>SIMULATOR NARODAKU + MS</h1>

  <div class="teams" id="teams"></div>

  <div id="match">Vyber dva týmy</div>

  <div class="button-container">
    <button id="simBtn" onclick="simulateMatch()">Simulovat zápas</button>
    <div class="series-buttons">
      <button id="bo3Btn" onclick="startSeries('bo3')">Série BO3</button>
      <button id="bo5Btn" onclick="startSeries('bo5')">Série BO5</button>
      <button id="bo7Btn" onclick="startSeries('bo7')">Série BO7</button>
    </div>
  </div>

  <div id="result"></div>

  <script>
    const teams = {
      canada: { name: "Kanada", attack: 96, defense: 93, logo: "https://flagcdn.com/w160/ca.png" },
      usa: { name: "USA", attack: 94, defense: 92, logo: "https://flagcdn.com/w160/us.png" },
      sweden: { name: "Švédsko", attack: 92, defense: 94, logo: "https://flagcdn.com/w160/se.png" },
      finland: { name: "Finsko", attack: 88, defense: 95, logo: "https://flagcdn.com/w160/fi.png" },
      czechia: { name: "Česko", attack: 91, defense: 90, logo: "https://flagcdn.com/w160/cz.png" },
      switzerland: { name: "Švýcarsko", attack: 87, defense: 89, logo: "https://flagcdn.com/w160/ch.png" },
      germany: { name: "Německo", attack: 85, defense: 84, logo: "https://flagcdn.com/w160/de.png" },
      slovakia: { name: "Slovensko", attack: 84, defense: 83, logo: "https://flagcdn.com/w160/sk.png" },
      latvia: { name: "Lotyšsko", attack: 79, defense: 86, logo: "https://flagcdn.com/w160/lv.png" },
      denmark: { name: "Dánsko", attack: 78, defense: 80, logo: "https://flagcdn.com/w160/dk.png" },
      kazakhstan: { name: "Kazachstán", attack: 74, defense: 76, logo: "https://flagcdn.com/w160/kz.png" },
      norway: { name: "Norsko", attack: 76, defense: 77, logo: "https://flagcdn.com/w160/no.png" },
      france: { name: "Francie", attack: 75, defense: 78, logo: "https://flagcdn.com/w160/fr.png" },
      austria: { name: "Rakousko", attack: 77, defense: 75, logo: "https://flagcdn.com/w160/at.png" },
      hungary: { name: "Maďarsko", attack: 72, defense: 73, logo: "https://flagcdn.com/w160/hu.png" },
      slovenia: { name: "Slovinsko", attack: 73, defense: 74, logo: "https://flagcdn.com/w160/si.png" },
      italy: { name: "Itálie", attack: 75, defense: 75, logo: "https://flagcdn.com/w160/it.png" },
      britain: { name: "Velká Británie", attack: 74, defense: 75, logo: "https://flagcdn.com/w160/gb.png" }
    };

    const container = document.getElementById("teams");
    let selectedA = null;
    let selectedB = null;
    let isAnimating = false;

    function renderTeams() {
      for (let key in teams) {
        const div = document.createElement("div");
        div.classList.add("team");
        div.setAttribute("data-id", key);
        div.innerHTML = `<img src="${teams[key].logo}" alt="${teams[key].name}" title="${teams[key].name}">`;
        div.onclick = () => selectTeam(key, div);
        container.appendChild(div);
      }
    }

    function selectTeam(key, element) {
      if (isAnimating) return;
      if (!selectedA) {
        selectedA = key;
        element.classList.add("selected");
      } else if (!selectedB && key !== selectedA) {
        selectedB = key;
        element.classList.add("selected");
      } else {
        selectedA = key;
        selectedB = null;
        document.querySelectorAll(".team").forEach(t => t.classList.remove("selected"));
        element.classList.add("selected");
      }
      updateMatch();
    }

    function updateMatch() {
      const matchDiv = document.getElementById("match");
      if (selectedA && selectedB) {
        matchDiv.innerText = `${teams[selectedA].name} (Domácí) vs ${teams[selectedB].name}`;
      } else if (selectedA) {
        matchDiv.innerText = "Vyber hostující tým";
      } else {
        matchDiv.innerText = "Vyber dva týmy";
      }
    }

    function getGoals(att, def, isHome) {
      let power = (att - def) / 10 + 2.8;
      if (isHome) power += 0.5;
      let luck = (Math.random() + Math.random() + Math.random()) / 1.5;
      return Math.max(0, Math.round(power * luck));
    }

    async function animateScore(finalA, finalB, isSeries = false, gameNum = 0, homeSide = "", winsA = 0, winsB = 0, ot = false, winnerOT = "") {
      const res = document.getElementById("result");
      let curA = 0, curB = 0;
      const duration = 7000;

      let baseA = ot ? (winnerOT === "A" ? finalA - 1 : finalA) : finalA;
      let baseB = ot ? (winnerOT === "B" ? finalB - 1 : finalB) : finalB;

      let goals = [];
      for(let i=0; i<baseA; i++) goals.push("A");
      for(let i=0; i<baseB; i++) goals.push("B");
      goals.sort(() => Math.random() - 0.5);

      const interval = duration / (goals.length + (ot ? 1 : 0));

      for (let i = 0; i < goals.length; i++) {
        await new Promise(r => setTimeout(r, interval));
        if (goals[i] === "A") curA++; else curB++;
        updateDisplay(res, curA, curB, isSeries, gameNum, homeSide, winsA, winsB, ot, false);
      }

      if (ot) {
        await new Promise(r => setTimeout(r, interval));
        if (winnerOT === "A") curA++; else curB++;
        updateDisplay(res, curA, curB, isSeries, gameNum, homeSide, winsA, winsB, ot, true);
      }
      
      if (isSeries) {
          updateDisplay(res, finalA, finalB, isSeries, gameNum, homeSide, winsA, winsB, ot, true, true);
          await new Promise(r => setTimeout(r, 2000));
      }
    }

    function updateDisplay(res, curA, curB, isSeries, gameNum, homeSide, winsA, winsB, ot, isDoneOT, isFinal = false) {
      let leftTeam, rightTeam, leftScore, rightScore;
      
      if (homeSide === "A" || (!isSeries)) { 
          leftTeam = teams[selectedA];
          rightTeam = teams[selectedB];
          leftScore = curA;
          rightScore = curB;
      } else { 
          leftTeam = teams[selectedB];
          rightTeam = teams[selectedA];
          leftScore = curB;
          rightScore = curA;
      }

      const statusText = isSeries ? `Série: ${winsA}:${winsB} - Zápas ${gameNum} (doma: ${leftTeam.name})` : (isFinal ? "KONEC" : "Zápas probíhá...");
      const endMark = isFinal ? `<div style="text-align:center; font-weight:bold; color:#fbbf24;">KONEC${ot ? " (prod.)" : ""}</div>` : "";

      res.innerHTML = `
        <div class="status-msg">${statusText}</div>
        <div class="score-display-wrapper">
            <img src="${leftTeam.logo}" class="score-logo">
            <div class="score-display">${leftScore}:${rightScore}</div>
            <img src="${rightTeam.logo}" class="score-logo">
        </div>
        ${endMark}
        <div class="team-names-info">${leftTeam.name} vs ${rightTeam.name}</div>
      `;
    }

    async function simulateMatch() {
      if (!selectedA || !selectedB || isAnimating) return;
      isAnimating = true; toggleButtons(true);
      
      let finalA = getGoals(teams[selectedA].attack, teams[selectedB].defense, true); 
      let finalB = getGoals(teams[selectedB].attack, teams[selectedA].defense, false);
      let ot = false;
      let winnerOT = "";
      if (finalA === finalB) { 
        ot = true; 
        if (Math.random() < 0.5) { finalA++; winnerOT = "A"; } else { finalB++; winnerOT = "B"; }
      }

      await animateScore(finalA, finalB, false, 0, "A", 0, 0, ot, winnerOT);
      updateDisplay(document.getElementById("result"), finalA, finalB, false, 0, "A", 0, 0, ot, true, true);
      
      isAnimating = false; toggleButtons(false);
    }

    async function startSeries(type) {
      if (!selectedA || !selectedB || isAnimating) return;
      isAnimating = true; toggleButtons(true);

      let winTarget = type === "bo3" ? 2 : type === "bo5" ? 3 : 4;
      let schedule = type === "bo7" ? ["A","A","B","B","A","B","A"] : 
                     (type === "bo5" ? ["A","A","B","B","A"] : ["A","B","A"]);

      let winsA = 0, winsB = 0, gameIdx = 0, history = [];

      while (winsA < winTarget && winsB < winTarget) {
        let homeSide = schedule[gameIdx] || (gameIdx % 2 === 0 ? "A" : "B"); 
        let finalA = getGoals(teams[selectedA].attack, teams[selectedB].defense, homeSide === "A");
        let finalB = getGoals(teams[selectedB].attack, teams[selectedA].defense, homeSide === "B");
        let ot = false;
        let winnerOT = "";
        if (finalA === finalB) {
            ot = true;
            if (Math.random() < 0.5) { finalA++; winnerOT = "A"; } else { finalB++; winnerOT = "B"; }
        }

        await animateScore(finalA, finalB, true, gameIdx + 1, homeSide, winsA, winsB, ot, winnerOT);

        if (finalA > finalB) winsA++; else winsB++;
        history.push({game: gameIdx+1, scoreA: finalA, scoreB: finalB, ot: ot, home: homeSide});
        renderHistory(winsA, winsB, history);
        gameIdx++;
      }

      const winner = winsA > winsB ? teams[selectedA].name : teams[selectedB].name;
      document.getElementById("result").innerHTML += `<div class="winner-box">🏆 VÍTĚZ SÉRIE: ${winner.toUpperCase()} (${winsA}:${winsB})</div>`;
      isAnimating = false; toggleButtons(false);
    }

    function renderHistory(wA, wB, history) {
      let html = `<div class="status-msg">Série probíhá</div><div class="score-display" style="font-size:2.5rem; text-align:center;">${wA}:${wB}</div>`;
      history.forEach(h => {
        const isAHome = h.home === "A";
        const leftName = isAHome ? teams[selectedA].name : teams[selectedB].name;
        const rightName = isAHome ? teams[selectedB].name : teams[selectedA].name;
        const leftScore = isAHome ? h.scoreA : h.scoreB;
        const rightScore = isAHome ? h.scoreB : h.scoreA;

        html += `<div class="game-line">Zápas ${h.game}: ${leftName} <strong>${leftScore}:${rightScore}</strong> ${rightName} <span style="font-size:0.8rem; color:#94a3b8">${h.ot ? "(prod.)" : ""}</span></div>`;
      });
      document.getElementById("result").innerHTML = html;
    }

    function toggleButtons(disabled) {
      document.querySelectorAll("button").forEach(b => b.disabled = disabled);
    }

    renderTeams();
  </script>
</body>
</html>
