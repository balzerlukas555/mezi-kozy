<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extraliga simulátor</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px 10px;
      background: #0b0e14;
      color: #e2e8f0;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 1.8rem;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .teams {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      max-width: 1000px;
      margin: auto;
    }

    .team {
      cursor: pointer;
      transition: all 0.2s ease-in-out;
      width: 65px; 
      padding: 8px;
      background: #1a1f29;
      border-radius: 8px;
      border: 1px solid #2d3748;
      box-sizing: border-box;
    }

    .team img {
      width: 100%;
      height: auto;
      aspect-ratio: 1/1;
      object-fit: contain;
      filter: drop-shadow(0 0 2px rgba(0,0,0,0.5));
    }

    .team:hover {
      background: #2d3748;
      transform: translateY(-3px);
    }

    .selected {
      border-color: #38bdf8;
      background: #1e293b;
      box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
      transform: scale(1.05);
    }

    #match {
      margin-top: 25px;
      font-size: 1.2rem;
      min-height: 1.6em;
      font-weight: 500;
      color: #38bdf8;
    }

    button {
      margin-top: 20px;
      padding: 15px 40px;
      font-size: 18px;
      cursor: pointer;
      background-color: #f1f5f9;
      border: none;
      border-radius: 8px;
      color: #0b0e14;
      font-weight: bold;
      width: 100%;
      max-width: 320px;
      transition: 0.2s;
    }

    button:hover {
      background-color: #38bdf8;
      color: white;
    }

    button:active {
      transform: scale(0.96);
    }

    button:disabled {
      background-color: #2d3748;
      color: #475569;
      cursor: not-allowed;
    }

    #result {
      margin-top: 30px;
      font-size: 1.6rem;
      font-weight: 800;
      padding: 20px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      display: inline-block;
      min-width: 280px;
      line-height: 1.4;
    }

    @media (min-width: 600px) {
      .team { width: 85px; padding: 10px; }
      h1 { font-size: 2.5rem; }
      #match { font-size: 24px; }
      #result { font-size: 2.2rem; }
    }
  </style>
</head>
<body>

  <h1>🏒 Simulátor Extraligy</h1>

  <div class="teams" id="teams"></div>

  <div id="match">Vyber dva týmy</div>

  <button id="simBtn" onclick="simulate()">Simulovat zápas</button>

  <div id="result"></div>

  <script>
    const teams = {
      pardubice: { name: "HC Dynamo Pardubice", attack: 94, defense: 91, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2FPCE-2x.png&w=120&h=120&exact=1" },
      sparta: { name: "HC Sparta Praha", attack: 85, defense: 81, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fwueb1-spa.png&w=120&h=120&exact=1" },
      trinec: { name: "HC Oceláři Třinec", attack: 87, defense: 82, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fccek3-tri.png&w=120&h=120&exact=1" },
      mountfield: { name: "Mountfield HK", attack: 86, defense: 88, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fj9qyt-hkr.png&w=120&h=120&exact=1" },
      vitkovice: { name: "HC Vítkovice Ridera", attack: 77, defense: 74, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2F65gcx-vit.png&w=120&h=120&exact=1" },
      kometa: { name: "HC Kometa Brno", attack: 83, defense: 80, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2F8oo52-kom.png&w=120&h=120&exact=1" },
      boleslav: { name: "BK Mladá Boleslav", attack: 80, defense: 78, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fk1yj3-mbl.png&w=120&h=120&exact=1" },
      litvinov: { name: "HC Verva Litvínov", attack: 76, defense: 72, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fifboo-lit.png&w=120&h=120&exact=1" },
      liberec: { name: "Bílí Tygři Liberec", attack: 89, defense: 86, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fi5lg4-lib.png&w=120&h=120&exact=1" },
      olomouc: { name: "HC Olomouc", attack: 78, defense: 76, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fy4tmv-olo.png&w=120&h=120&exact=1" },
      plzen: { name: "HC Škoda Plzeň", attack: 88, defense: 93, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fpijgb-plz.png&w=120&h=120&exact=1" },
      karlovy_vary: { name: "HC Energie Karlovy Vary", attack: 83, defense: 84, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2F98xoj-kva.png&w=120&h=120&exact=1" },
      kladno: { name: "Rytíři Kladno", attack: 79, defense: 79, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2F7wb9o-kla.png&w=120&h=120&exact=1" },
      ceske_budejovice: { name: "Motor České Budějovice", attack: 82, defense: 78, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2F4zj2z-ceb.png&w=120&h=120&exact=1" }
    };

    const container = document.getElementById("teams");
    let selectedA = null;
    let selectedB = null;

    function renderTeams() {
      for (let key in teams) {
        const div = document.createElement("div");
        div.classList.add("team");
        div.innerHTML = `<img src="${teams[key].logo}" alt="${teams[key].name}" title="${teams[key].name}">`;
        div.onclick = () => selectTeam(key, div);
        container.appendChild(div);
      }
    }

    function selectTeam(key, element) {
      if (!selectedA) {
        selectedA = key;
        element.classList.add("selected");
      } else if (!selectedB && key !== selectedA) {
        selectedB = key;
        element.classList.add("selected");
      } else {
        selectedA = key;
        selectedB = null;
        document.querySelectorAll(".team").forEach(t => t.classList.remove("selected"));
        element.classList.add("selected");
      }
      updateMatch();
    }

    function updateMatch() {
      if (selectedA && selectedB) {
        document.getElementById("match").innerText =
          `${teams[selectedA].name} vs ${teams[selectedB].name}`;
      } else if (selectedA) {
          document.getElementById("match").innerText = "Vyber soupeře";
      }
    }

    function getGoals(att, def, isHome) {
      let power = (att - def) / 10 + 2.8;
      if (isHome) power += 0.3;
      let luck = (Math.random() + Math.random() + Math.random()) / 1.5; 
      let finalGoals = Math.round(power * luck);
      if (Math.random() > 0.95) finalGoals += Math.floor(Math.random() * 3);
      return Math.max(0, finalGoals);
    }

    function simulate() {
      if (!selectedA || !selectedB) {
        document.getElementById("result").innerText = "Vyber dva týmy 😄";
        return;
      }

      const btn = document.getElementById("simBtn");
      const resDiv = document.getElementById("result");
      const A = teams[selectedA];
      const B = teams[selectedB];

      let baseA = getGoals(A.attack, B.defense, true);
      let baseB = getGoals(B.attack, A.defense, false);

      let finalA = baseA;
      let finalB = baseB;
      let resultSuffix = "";

      if (baseA === baseB) {
        if (Math.random() < 0.5) {
          finalA = baseA + 1;
          finalB = baseB;
          resultSuffix = " (pp)";
        } else {
          finalA = baseA;
          finalB = baseB + 1;
          resultSuffix = " (sn)";
        }
      }

      btn.disabled = true;
      let currentA = 0;
      let currentB = 0;

      let sequence = [];

      for (let i = 0; i < baseA + baseB; i++) {
        sequence.push(i < baseA ? "A" : "B");
      }

      sequence.sort(() => Math.random() - 0.5);

      if (baseA === baseB) {
        sequence.push(finalA > finalB ? "A" : "B");
      }

      let index = 0;
      let duration = 6500;
      let stepTime = sequence.length > 0 ? duration / sequence.length : 2000;

      let interval = setInterval(() => {
        if (index < sequence.length) {
          if (sequence[index] === "A") currentA++;
          else currentB++;
          index++;
        }

        resDiv.innerHTML =
          `<div style="font-size: 3rem; color: #38bdf8;">${currentA} : ${currentB}</div>` +
          `<div style="font-size: 1.2rem; color: #94a3b8; margin-top: 10px;">${A.name} vs ${B.name}</div>`;

        if (index === sequence.length) {
          clearInterval(interval);
          btn.disabled = false;
          resDiv.innerHTML =
            `<div style="font-size: 3.5rem; color: #38bdf8;">${currentA} : ${currentB}</div>` +
            `<div style="font-size: 1.2rem; color: #ffffff; margin-top: 10px; font-weight: bold;">KONEC${resultSuffix}</div>` +
            `<div style="font-size: 1rem; color: #94a3b8;">${A.name} vs ${B.name}</div>`;
        }
      }, stepTime);
    }

    renderTeams();
  </script>
</body>
</html>
