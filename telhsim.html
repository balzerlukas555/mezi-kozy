<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Extraliga simulátor - Ultimate Hybrid</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      margin: 0;
      padding: 10px;
      background: #0b0e14;
      color: #e2e8f0;
      overflow-x: hidden;
    }

    h1 { margin-bottom: 15px; font-size: 1.4rem; color: #ffffff; text-transform: uppercase; letter-spacing: 1px; }

    .teams { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; max-width: 1000px; margin: auto; }

    .team {
      cursor: pointer; transition: all 0.2s ease-in-out; width: 55px; padding: 5px;
      background: #1a1f29; border-radius: 8px; border: 1px solid #2d3748; box-sizing: border-box;
    }

    .team img { width: 100%; height: auto; aspect-ratio: 1/1; object-fit: contain; }

    .team:hover { background: #2d3748; transform: translateY(-3px); }

    .selected { border-color: #38bdf8; background: #1e293b; box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); transform: scale(1.05); }

    #match { margin-top: 15px; font-size: 1rem; min-height: 1.4em; font-weight: 500; color: #38bdf8; padding: 0 10px; }

    .game-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      margin: 15px auto;
      width: 100%;
      max-width: 900px;
    }

    .side-logo {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.05);
      border-radius: 6px;
      border: 1px solid #2d3748;
      flex-shrink: 0;
    }

    .side-logo img { max-width: 80%; max-height: 80%; object-fit: contain; }

    #rink-container {
      background: #ffffff;
      border: 3px solid #475569;
      border-radius: 20px;
      width: 100%; 
      max-width: 600px;
      aspect-ratio: 2 / 1;
      position: relative;
      overflow: hidden;
      display: none; 
      box-shadow: inset 0 0 15px rgba(0,0,0,0.1);
    }

    canvas { 
      width: 100% !important; 
      height: auto !important; 
      display: block; 
    }

    .button-container { margin-top: 15px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
    
    .series-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 20px; font-size: 15px; cursor: pointer; background-color: #f1f5f9;
      border: none; border-radius: 8px; color: #0b0e14; font-weight: bold; transition: 0.3s;
    }

    button:hover { background-color: #38bdf8; color: white; }
    button:disabled { background-color: #2d3748; color: #475569; cursor: not-allowed; }

    #result { 
      margin-top: 15px; 
      font-size: 1rem; 
      background: rgba(255,255,255,0.05); 
      padding: 10px; 
      border-radius: 12px; 
      display: inline-block; 
      width: 95%; 
      max-width: 450px; 
      box-sizing: border-box;
      text-align: center;
    }
    
    .score-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      margin: 5px 0;
    }
    .score-display { font-size: 2.2rem; font-weight: bold; color: #38bdf8; min-width: 80px; }
    .mini-logo { width: 35px; height: 35px; object-fit: contain; }

    #timer { font-size: 1.2rem; color: #fbbf24; font-weight: bold; margin-bottom: 2px; }
    #period { color: #94a3b8; font-weight: bold; margin-bottom: 2px; font-size: 0.9rem; }
    #status { font-size: 0.9rem; }

    /* Styly z kódu 2 pro historii a vítěze */
    .game-line { border-bottom: 1px solid #2d3748; padding: 8px 0; font-size: 0.95rem; text-align: left; }
    .winner-box { margin-top: 20px; font-size: 1.8rem; color: #fbbf24; text-align: center; font-weight: bold; padding: 10px; border: 2px solid #fbbf24; border-radius: 8px; }
    .score-display-wrapper { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 10px; }
    .score-logo { width: 60px; height: 60px; object-fit: contain; }

    .toggle-container { margin: 10px 0; background: #1a1f29; padding: 10px; border-radius: 8px; border: 1px solid #2d3748; }

    @media (min-width: 600px) { 
      .team { width: 85px; padding: 10px; } 
      h1 { font-size: 2.5rem; }
      .side-logo { width: 80px; height: 80px; }
      #rink-container { border-radius: 40px; border-width: 5px; }
      .score-display { font-size: 3.5rem; }
      .mini-logo { width: 50px; height: 50px; }
      #result { padding: 20px; }
    }
  </style>
</head>
<body>

  <h1>🏒 Simulátor Extraligy</h1>

  <div class="teams" id="teams"></div>

  <div id="match">Vyber dva týmy</div>

  <div class="toggle-container">
    <label for="simType">Režim simulace: </label>
    <select id="simType" style="padding: 5px; border-radius: 4px; background: #0b0e14; color: white; border: 1px solid #38bdf8;">
        <option value="graphic">Grafická animace</option>
        <option value="quick">Rychlá číselná</option>
    </select>
  </div>

  <div class="button-container">
    <button id="simBtn" onclick="initSimulation('single')">Simulovat zápas</button>
    <div class="series-buttons">
      <button id="bo3Btn" onclick="initSimulation('bo3')">Série BO3</button>
      <button id="bo5Btn" onclick="initSimulation('bo5')">Série BO5</button>
      <button id="bo7Btn" onclick="initSimulation('bo7')">Série BO7</button>
    </div>
  </div>

  <div class="game-wrapper" id="gameWrapper" style="display: none;">
    <div class="side-logo" id="leftSideRinkLogo"></div>
    <div id="rink-container">
      <canvas id="hockeyRink" width="600" height="300"></canvas>
    </div>
    <div class="side-logo" id="rightSideRinkLogo"></div>
  </div>

  <div id="result">
    <div id="period">1. třetina</div>
    <div id="timer">00:00</div>
    <div class="score-container">
        <img id="scoreLogoA" class="mini-logo" src="" style="display:none;">
        <div id="scoreText" class="score-display">0:0</div>
        <img id="scoreLogoB" class="mini-logo" src="" style="display:none;">
    </div>
    <div id="status" style="font-style: italic; color: #94a3b8;">Vyber týmy a začni hru</div>
  </div>

  <script>
    const teams = {
      pardubice: { name: "HC Dynamo Pardubice", attack: 94, dribling: 92, defense: 91, goalkeeper: 97, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2FPCE-2x.png&w=120&h=120&exact=1", homeColor: "#ce0000", awayColor: "#ffffff" },
      sparta: { name: "HC Sparta Praha", attack: 85, dribling: 88, defense: 81, goalkeeper: 90, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fwueb1-spa.png&w=120&h=120&exact=1", homeColor: "#800000", awayColor: "#ffcc00" },
      trinec: { name: "HC Oceláři Třinec", attack: 87, dribling: 85, defense: 82, goalkeeper: 94, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fccek3-tri.png&w=120&h=120&exact=1", homeColor: "#ff0000", awayColor: "#ffffff" },
      mountfield: { name: "Mountfield HK", attack: 86, dribling: 84, defense: 88, goalkeeper: 89, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fj9qyt-hkr.png&w=120&h=120&exact=1", homeColor: "#000000", awayColor: "#ff0000" },
      vitkovice: { name: "HC Vítkovice Ridera", attack: 77, dribling: 79, defense: 74, goalkeeper: 82, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2F65gcx-vit.png&w=120&h=120&exact=1", homeColor: "#0056a0", awayColor: "#ffffff" },
      kometa: { name: "HC Kometa Brno", attack: 83, dribling: 82, defense: 80, goalkeeper: 85, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2F8oo52-kom.png&w=120&h=120&exact=1", homeColor: "#003399", awayColor: "#ffffff" },
      boleslav: { name: "BK Mladá Boleslav", attack: 80, dribling: 78, defense: 78, goalkeeper: 83, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fk1yj3-mbl.png&w=120&h=120&exact=1", homeColor: "#008000", awayColor: "#ffffff" },
      litvinov: { name: "HC Verva Litvínov", attack: 76, dribling: 81, defense: 72, goalkeeper: 79, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fifboo-lit.png&w=120&h=120&exact=1", homeColor: "#ffcc00", awayColor: "#000000" },
      liberec: { name: "Bílí Tygři Liberec", attack: 89, dribling: 87, defense: 86, goalkeeper: 88, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fi5lg4-lib.png&w=120&h=120&exact=1", homeColor: "#005aab", awayColor: "#ffffff" },
      olomouc: { name: "HC Olomouc", attack: 78, dribling: 75, defense: 76, goalkeeper: 92, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fy4tmv-olo.png&w=120&h=120&exact=1", homeColor: "#ff0000", awayColor: "#ffffff" },
      plzen: { name: "HC Škoda Plzeň", attack: 88, dribling: 84, defense: 93, goalkeeper: 86, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fpijgb-plz.png&w=120&h=120&exact=1", homeColor: "#0056a0", awayColor: "#ffffff" },
      karlovy_vary: { name: "HC Energie Karlovy Vary", attack: 83, dribling: 85, defense: 84, goalkeeper: 84, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2F98xoj-kva.png&w=120&h=120&exact=1", homeColor: "#000000", awayColor: "#ffffff" },
      kladno: { name: "Rytíři Kladno", attack: 79, dribling: 80, defense: 80, goalkeeper: 81, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2F7wb9o-kla.png&w=120&h=120&exact=1", homeColor: "#004a8d", awayColor: "#ffffff" },
      ceske_budejovice: { name: "Motor České Budějovice", attack: 82, dribling: 83, defense: 78, goalkeeper: 85, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2F4zj2z-ceb.png&w=120&h=120&exact=1", homeColor: "#ffff00", awayColor: "#cc0000" },
      jihlava: { name: "HC Dukla Jihlava", attack: 72, dribling: 70, defense: 69, goalkeeper: 74, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2FJIH-2x.png&w=120&h=120&exact=1", homeColor: "#800000", awayColor: "#ffcc00" },
      zlin: { name: "Rl Okna Berani Zlín", attack: 67, dribling: 65, defense: 70, goalkeeper: 72, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2FZLN-2x.png&w=120&h=120&exact=1", homeColor: "#003399", awayColor: "#ffff00" }
    };

    const canvas = document.getElementById("hockeyRink");
    const ctx = canvas.getContext("2d");
    let selectedA = null, selectedB = null;
    let scoreA = 0, scoreB = 0;
    let gameRunning = false;
    let timeLeft = 30;
    let currentPeriod = 1;
    let timerInterval = null;
    let isOvertime = false;
    const rinkLogo = new Image();

    // Proměnné pro série (BOx)
    let winsA = 0, winsB = 0;
    let currentSeriesGame = 0;
    let seriesTarget = 1;
    let seriesHistory = [];
    let isAnimatingQuick = false;

    // Herní objekty z kódu 1
    let puck = { x: 300, y: 150, vx: 0, vy: 0, radius: 5, owner: null, isShot: false, passLock: 0 };
    let playerA1 = { x: 150, y: 150, color: "red", radius: 12, baseSpeed: 1.2, side: 'A', id: 1, role: 'forward', decisionTimer: 0, currentAction: 'move' };
    let playerA2 = { x: 150, y: 100, color: "red", radius: 12, baseSpeed: 1.2, side: 'A', id: 2, role: 'forward', decisionTimer: 0, currentAction: 'move' };
    let playerA5 = { x: 150, y: 200, color: "red", radius: 12, baseSpeed: 1.2, side: 'A', id: 5, role: 'forward', decisionTimer: 0, currentAction: 'move' };
    let playerA3 = { x: 80,  y: 120, color: "red", radius: 12, baseSpeed: 1.0, side: 'A', id: 3, role: 'defender', decisionTimer: 0, currentAction: 'move' };
    let playerA4 = { x: 80,  y: 180, color: "red", radius: 12, baseSpeed: 1.0, side: 'A', id: 4, role: 'defender', decisionTimer: 0, currentAction: 'move' };
    let playerB1 = { x: 450, y: 150, color: "blue", radius: 12, baseSpeed: 1.2, side: 'B', id: 1, role: 'forward', decisionTimer: 0, currentAction: 'move' };
    let playerB2 = { x: 450, y: 100, color: "blue", radius: 12, baseSpeed: 1.2, side: 'B', id: 2, role: 'forward', decisionTimer: 0, currentAction: 'move' };
    let playerB5 = { x: 450, y: 200, color: "blue", radius: 12, baseSpeed: 1.2, side: 'B', id: 5, role: 'forward', decisionTimer: 0, currentAction: 'move' };
    let playerB3 = { x: 520, y: 120, color: "blue", radius: 12, baseSpeed: 1.0, side: 'B', id: 3, role: 'defender', decisionTimer: 0, currentAction: 'move' };
    let playerB4 = { x: 520, y: 180, color: "blue", radius: 12, baseSpeed: 1.0, side: 'B', id: 4, role: 'defender', decisionTimer: 0, currentAction: 'move' };
    let goalieA = { x: 25, y: 150, radius: 14, color: "red", side: 'A' };
    let goalieB = { x: 575, y: 150, radius: 14, color: "blue", side: 'B' };
    let lastPuckX = 0, lastPuckY = 0, globalStuckTimer = 0;

    // --- FUNKCE Z KÓDU Č. 2 (RYCHLÁ SIMULACE) ---

    function getGoals(att, def, isHome) {
      let power = (att - def) / 10 + 2.8;
      if (isHome) power += 0.5;
      let luck = (Math.random() + Math.random() + Math.random()) / 1.5;
      return Math.max(0, Math.round(power * luck));
    }

    async function animateScore(finalA, finalB, isSeries = false, gameNum = 0, homeSide = "", winsA = 0, winsB = 0, ot = false, winnerOT = "") {
      const res = document.getElementById("result");
      let curA = 0, curB = 0;
      const duration = 2500; // Zrychleno pro účely aplikace

      let baseA = ot ? (winnerOT === "A" ? finalA - 1 : finalA) : finalA;
      let baseB = ot ? (winnerOT === "B" ? finalB - 1 : finalB) : finalB;

      let goals = [];
      for(let i=0; i<baseA; i++) goals.push("A");
      for(let i=0; i<baseB; i++) goals.push("B");
      goals.sort(() => Math.random() - 0.5);

      const interval = duration / (goals.length + (ot ? 1 : 0));

      for (let i = 0; i < goals.length; i++) {
        await new Promise(r => setTimeout(r, interval));
        if (goals[i] === "A") curA++; else curB++;
        updateQuickDisplay(res, curA, curB, isSeries, gameNum, homeSide, winsA, winsB, ot, false);
      }

      if (ot) {
        await new Promise(r => setTimeout(r, interval));
        if (winnerOT === "A") curA++; else curB++;
        updateQuickDisplay(res, curA, curB, isSeries, gameNum, homeSide, winsA, winsB, ot, true);
      }
      
      if (isSeries) {
          updateQuickDisplay(res, finalA, finalB, isSeries, gameNum, homeSide, winsA, winsB, ot, true, true);
          await new Promise(r => setTimeout(r, 1000));
      }
    }

    function updateQuickDisplay(res, curA, curB, isSeries, gameNum, homeSide, winsA, winsB, ot, isDoneOT, isFinal = false) {
      let leftTeam, rightTeam, leftScore, rightScore;
      if (homeSide === "A" || (!isSeries)) { 
          leftTeam = teams[selectedA]; rightTeam = teams[selectedB]; leftScore = curA; rightScore = curB;
      } else { 
          leftTeam = teams[selectedB]; rightTeam = teams[selectedA]; leftScore = curB; rightScore = curA;
      }
      const statusText = isSeries ? `Série: ${winsA}:${winsB} - Zápas ${gameNum}` : (isFinal ? "KONEC" : "Zápas probíhá...");
      const endMark = isFinal ? `<div style="text-align:center; font-weight:bold; color:#fbbf24;">KONEC${ot ? " (prod.)" : ""}</div>` : "";
      res.innerHTML = `
        <div class="status-msg">${statusText}</div>
        <div class="score-display-wrapper">
            <img src="${leftTeam.logo}" class="score-logo">
            <div class="score-display">${leftScore}:${rightScore}</div>
            <img src="${rightTeam.logo}" class="score-logo">
        </div>
        ${endMark}
        <div style="text-align:center; font-size:0.9rem;">${leftTeam.name} vs ${rightTeam.name}</div>
      `;
    }

    async function startQuickSeries(type) {
      if (!selectedA || !selectedB || isAnimatingQuick) return;
      isAnimatingQuick = true; toggleButtons(true);
      let target = type === "bo3" ? 2 : type === "bo5" ? 3 : type === "bo7" ? 4 : 1;
      let wA = 0, wB = 0, gameIdx = 0, history = [];
      let schedule = ["A","A","B","B","A","B","A"];

      while ((wA < target && wB < target) || (target === 1 && gameIdx < 1)) {
        let homeSide = schedule[gameIdx % 7]; 
        let finalA = getGoals(teams[selectedA].attack, teams[selectedB].defense, homeSide === "A");
        let finalB = getGoals(teams[selectedB].attack, teams[selectedA].defense, homeSide === "B");
        let ot = false; let winnerOT = "";
        if (finalA === finalB) {
            ot = true; if (Math.random() < 0.5) { finalA++; winnerOT = "A"; } else { finalB++; winnerOT = "B"; }
        }
        await animateScore(finalA, finalB, target > 1, gameIdx + 1, homeSide, wA, wB, ot, winnerOT);
        if (finalA > finalB) wA++; else wB++;
        history.push({game: gameIdx+1, scoreA: finalA, scoreB: finalB, ot: ot, home: homeSide});
        renderHistory(wA, wB, history);
        gameIdx++;
        if (target === 1) break;
      }
      if (target > 1) {
          const winner = wA > wB ? teams[selectedA].name : teams[selectedB].name;
          document.getElementById("result").innerHTML += `<div class="winner-box">🏆 VÍTĚZ SÉRIE: ${winner.toUpperCase()} (${wA}:${wB})</div>`;
      }
      isAnimatingQuick = false; toggleButtons(false);
    }

    function renderHistory(wA, wB, history) {
      let html = `<div class="status-msg">Série probíhá</div><div class="score-display" style="font-size:2.5rem; text-align:center;">${wA}:${wB}</div>`;
      history.forEach(h => {
        const isAHome = h.home === "A";
        const leftName = isAHome ? teams[selectedA].name : teams[selectedB].name;
        const rightName = isAHome ? teams[selectedB].name : teams[selectedA].name;
        const leftScore = isAHome ? h.scoreA : h.scoreB;
        const rightScore = isAHome ? h.scoreB : h.scoreA;
        html += `<div class="game-line">Zápas ${h.game}: ${leftName} <strong>${leftScore}:${rightScore}</strong> ${rightName} <span>${h.ot ? "(prod.)" : ""}</span></div>`;
      });
      document.getElementById("result").innerHTML = html;
    }

    // --- LOGIKA Z KÓDU Č. 1 (GRAFICKÁ SIMULACE) ---

    function renderTeams() {
      const container = document.getElementById("teams");
      for (let key in teams) {
        const div = document.createElement("div");
        div.classList.add("team");
        div.innerHTML = `<img src="${teams[key].logo}" alt="${teams[key].name}">`;
        div.onclick = () => {
            if (gameRunning || isAnimatingQuick) return;
            if (!selectedA) { selectedA = key; div.classList.add("selected"); rinkLogo.src = teams[key].logo; }
            else if (!selectedB && key !== selectedA) { selectedB = key; div.classList.add("selected"); }
            else { 
                selectedA = key; selectedB = null; 
                document.querySelectorAll(".team").forEach(t => t.classList.remove("selected"));
                div.classList.add("selected");
                rinkLogo.src = teams[key].logo;
            }
            document.getElementById("match").innerText = selectedB ? `${teams[selectedA].name} vs ${teams[selectedB].name}` : "Vyber soupeře";
        };
        container.appendChild(div);
      }
    }

    function resetPositions() {
      puck.x = 300; puck.y = 150; puck.vx = 0; puck.vy = 0; puck.owner = null; puck.isShot = false; puck.passLock = 0;
      let homeFwdX = (currentPeriod === 2 && !isOvertime) ? 450 : 150;
      let awayFwdX = (currentPeriod === 2 && !isOvertime) ? 150 : 450;
      let homeDefX = (currentPeriod === 2 && !isOvertime) ? 520 : 80;
      let awayDefX = (currentPeriod === 2 && !isOvertime) ? 80 : 520;
      [playerA1, playerA2, playerA3, playerA4, playerA5, playerB1, playerB2, playerB3, playerB4, playerB5].forEach(p => { p.decisionTimer = 0; p.currentAction = 'move'; });
      playerA1.x = (currentPeriod === 2 && !isOvertime) ? 320 : 280; playerA1.y = 150;
      playerA2.x = homeFwdX; playerA2.y = 100; playerA5.x = homeFwdX; playerA5.y = 200;
      playerA3.x = homeDefX; playerA3.y = 120; playerA4.x = homeDefX; playerA4.y = 180;
      playerB1.x = (currentPeriod === 2 && !isOvertime) ? 280 : 320; playerB1.y = 150;
      playerB2.x = awayFwdX; playerB2.y = 200; playerB5.x = awayFwdX; playerB5.y = 100;
      playerB3.x = awayDefX; playerB3.y = 120; playerB4.x = awayDefX; playerB4.y = 180;
      globalStuckTimer = 0;
    }

    function updateScoreDisplay() {
        document.getElementById("scoreText").innerText = `${scoreA}:${scoreB}`;
    }

    function updateSidesDisplay() {
        if (currentPeriod === 2 && !isOvertime) {
            document.getElementById("leftSideRinkLogo").innerHTML = `<img src="${teams[selectedB].logo}">`;
            document.getElementById("rightSideRinkLogo").innerHTML = `<img src="${teams[selectedA].logo}">`;
            goalieA.x = 575; goalieB.x = 25;
        } else {
            document.getElementById("leftSideRinkLogo").innerHTML = `<img src="${teams[selectedA].logo}">`;
            document.getElementById("rightSideRinkLogo").innerHTML = `<img src="${teams[selectedB].logo}">`;
            goalieA.x = 25; goalieB.x = 575;
        }
        const logoA = document.getElementById("scoreLogoA"); const logoB = document.getElementById("scoreLogoB");
        logoA.src = teams[selectedA].logo; logoB.src = teams[selectedB].logo;
        logoA.style.display = "block"; logoB.style.display = "block";
        updateScoreDisplay();
    }

    function update() {
      if (!gameRunning) return;
      if (puck.passLock > 0) puck.passLock--;
      if (Math.abs(puck.x - lastPuckX) < 0.2 && Math.abs(puck.y - lastPuckY) < 0.2) {
          globalStuckTimer++; if (globalStuckTimer > 180) { resetPositions(); }
      } else { globalStuckTimer = 0; }
      lastPuckX = puck.x; lastPuckY = puck.y;

      const teamA = [playerA1, playerA2, playerA3, playerA4, playerA5];
      const teamB = [playerB1, playerB2, playerB3, playerB4, playerB5];
      const allPlayers = [...teamA, ...teamB];

      allPlayers.forEach(p => {
          let teammates = (p.side === 'A') ? teamA.filter(x => x !== p) : teamB.filter(x => x !== p);
          let opponents = (p.side === 'A') ? teamB : teamA;
          let speed = (puck.owner === p) ? p.baseSpeed : p.baseSpeed * 1.25;
          let attackRight = (p.side === 'A' && (currentPeriod !== 2 || isOvertime)) || (p.side === 'B' && currentPeriod === 2 && !isOvertime);

          if (puck.owner === p) {
              let targetGoalX = attackRight ? 600 : 0;
              moveWithPuckComplex(p, targetGoalX, 150, getClosest(p, opponents), speed);
              puck.x = attackRight ? p.x + 12 : p.x - 12; puck.y = p.y;
          } else {
              movePlayerToPoint(p, puck.x, puck.y, speed);
          }
      });

      if (!puck.owner) { puck.x += puck.vx; puck.y += puck.vy; puck.vx *= 0.98; puck.vy *= 0.98; }
      goalieA.y = 150 + (puck.y - 150) * 0.35; goalieB.y = 150 + (puck.y - 150) * 0.35;
      handleBouncesAndGoals();
      if (puck.owner) {
        let p = puck.owner;
        let attackRight = (p.side === 'A' && (currentPeriod !== 2 || isOvertime)) || (p.side === 'B' && currentPeriod === 2 && !isOvertime);
        if (attackRight && p.x > 380) checkShot(p, 600, 150);
        else if (!attackRight && p.x < 220) checkShot(p, 0, 150);
      }
      allPlayers.forEach(p => checkInteraction(p, allPlayers));
      checkGoalieCollision(goalieA); checkGoalieCollision(goalieB);
      draw();
      requestAnimationFrame(update);
    }

    function getDistance(p1, p2) { return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2)); }
    function getClosest(p, list) { return list.reduce((prev, curr) => getDistance(p, curr) < getDistance(p, prev) ? curr : prev); }

    function movePlayerToPoint(p, tx, ty, speed) {
      let dx = tx - p.x; let dy = ty - p.y;
      let dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > 5) { p.x += (dx/dist) * speed; p.y += (dy/dist) * speed; }
      keepInRink(p);
    }

    function moveWithPuckComplex(p, targetX, targetY, closestOpp, speed) {
      let dx = targetX - p.x; let dy = targetY - p.y;
      let distToOpp = getDistance(p, closestOpp);
      let dribbleMod = (p.side === 'A' ? teams[selectedA].dribling : teams[selectedB].dribling) / 100;
      if (distToOpp < 65) {
        let angleToOpp = Math.atan2(closestOpp.y - p.y, closestOpp.x - p.x);
        p.x -= Math.cos(angleToOpp) * (0.8 * dribbleMod);
        p.y += (p.y > closestOpp.y ? 1 : -1) * (1.2 * dribbleMod);
      }
      let dist = Math.sqrt(dx*dx + dy*dy);
      p.x += (dx/dist) * (speed * 0.85); p.y += (dy/dist) * (speed * 0.85);
      keepInRink(p);
    }

    function checkInteraction(p, others) {
      if (puck.passLock > 0) return;
      if (!puck.owner && !puck.isShot) {
        if (getDistance(p, puck) < p.radius + 6 && Math.random() > 0.1) puck.owner = p;
      }
      if (puck.owner && puck.owner.side !== p.side) {
        if (getDistance(p, puck.owner) < p.radius * 2 + 2) {
            let stealChance = (p.side === 'A' ? teams[selectedA].defense : teams[selectedB].defense) * 0.45;
            if (Math.random() * 100 < stealChance) { puck.owner = null; puck.vx = (Math.random()-0.5)*4; }
        }
      }
    }

    function checkGoalieCollision(g) {
      if (getDistance(g, puck) < g.radius + puck.radius) {
        let gkStat = (g.side === 'A' ? teams[selectedA].goalkeeper : teams[selectedB].goalkeeper);
        if (Math.random() * 115 < gkStat) {
          puck.isShot = false; puck.owner = null; puck.vx *= -0.8; puck.vy += (Math.random() - 0.5) * 8;
          puck.x += (g.x < 300 ? 15 : -15);
        }
      }
    }

    function checkShot(p, goalX, goalY) {
      if (!puck.owner || puck.isShot) return;
      let stats = (p.side === 'A' ? teams[selectedA] : teams[selectedB]);
      if (Math.random() * 100 < stats.attack * 0.065) {
        puck.isShot = true; puck.owner = null;
        let targetY = 150 + (Math.random() - 0.5) * 90; 
        let angle = Math.atan2(targetY - p.y, goalX - p.x);
        puck.vx = Math.cos(angle) * 10; puck.vy = Math.sin(angle) * 10;
        document.getElementById("status").innerText = "Střela!";
      }
    }

    function handleBouncesAndGoals() {
      if (puck.y < 5 || puck.y > 295) puck.vy *= -1;
      if (puck.x < 0) {
        if (puck.y > 105 && puck.y < 195) { if (currentPeriod === 2 && !isOvertime) scoreA++; else scoreB++; goalScored(); }
        else { puck.x = 5; puck.vx *= -1; }
      }
      if (puck.x > 600) {
        if (puck.y > 105 && puck.y < 195) { if (currentPeriod === 2 && !isOvertime) scoreB++; else scoreA++; goalScored(); }
        else { puck.x = 595; puck.vx *= -1; }
      }
    }

    function keepInRink(p) {
      p.x = Math.max(p.radius, Math.min(600 - p.radius, p.x));
      p.y = Math.max(p.radius, Math.min(300 - p.radius, p.y));
    }

    function goalScored() {
      updateScoreDisplay();
      document.getElementById("status").innerText = "GÓÓÓL!";
      gameRunning = false;
      if (isOvertime) { handleEndOfGraphicMatch(); return; }
      setTimeout(() => { if (timeLeft > 0) { resetPositions(); gameRunning = true; update(); } }, 1200);
    }

    function draw() {
      ctx.clearRect(0, 0, 600, 300);
      if (rinkLogo.complete) { ctx.globalAlpha = 0.15; ctx.drawImage(rinkLogo, 225, 75, 150, 150); ctx.globalAlpha = 1.0; }
      ctx.strokeStyle = "rgba(255, 0, 0, 0.4)"; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(300, 0); ctx.lineTo(300, 300); ctx.stroke();
      ctx.strokeStyle = "rgba(0, 0, 255, 0.3)"; ctx.lineWidth = 4; ctx.strokeRect(200, 0, 0.1, 300); ctx.strokeRect(400, 0, 0.1, 300);
      ctx.strokeStyle = "#38bdf8"; ctx.lineWidth = 2; ctx.strokeRect(0, 105, 25, 90); ctx.strokeRect(575, 105, 25, 90); 
      ctx.fillStyle = "#111"; ctx.beginPath(); ctx.arc(puck.x, puck.y, puck.radius, 0, Math.PI*2); ctx.fill();
      [playerA1, playerA2, playerA3, playerA4, playerA5, playerB1, playerB2, playerB3, playerB4, playerB5].forEach(drawPlayer);
      drawGoalie(goalieA); drawGoalie(goalieB);
    }

    function drawPlayer(p) {
      ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = puck.owner === p ? "gold" : "rgba(0,0,0,0.3)"; ctx.lineWidth = 2; ctx.stroke();
    }

    function drawGoalie(g) {
      ctx.fillStyle = g.color; ctx.fillRect(g.x - 8, g.y - 15, 16, 30);
      ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.strokeRect(g.x - 8, g.y - 15, 16, 30);
    }

    function updateTimer() {
      if (timeLeft <= 0) { 
          gameRunning = false;
          if (currentPeriod < 3) {
              currentPeriod++; timeLeft = 30; document.getElementById("period").innerText = currentPeriod + ". třetina";
              updateSidesDisplay(); setTimeout(() => { resetPositions(); gameRunning = true; update(); }, 1500);
          } else if (scoreA === scoreB) {
              isOvertime = true; timeLeft = 999; document.getElementById("period").innerText = "PRODLOUŽENÍ";
              updateSidesDisplay(); setTimeout(() => { resetPositions(); gameRunning = true; update(); }, 1500);
          } else { handleEndOfGraphicMatch(); }
          return;
      }
      if (!isOvertime) timeLeft--;
      let m = Math.floor(timeLeft / 60); let s = timeLeft % 60;
      document.getElementById("timer").innerText = isOvertime ? "NÁHLÁ SMRT" : `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    // --- SPOJOVACÍ LOGIKA ---

    function initSimulation(type) {
        if (!selectedA || !selectedB) return;
        
        const mode = document.getElementById("simType").value;
        seriesTarget = (type === 'bo3' ? 2 : type === 'bo5' ? 3 : type === 'bo7' ? 4 : 1);
        winsA = 0; winsB = 0; currentSeriesGame = 0; seriesHistory = [];

        if (mode === 'quick') {
            document.getElementById("gameWrapper").style.display = "none";
            document.getElementById("rink-container").style.display = "none";
            startQuickSeries(type);
        } else {
            document.getElementById("gameWrapper").style.display = "flex";
            document.getElementById("rink-container").style.display = "block";
            document.getElementById("result").innerHTML = `
                <div id="period">Připrava...</div>
                <div id="timer">00:00</div>
                <div class="score-container">
                    <img id="scoreLogoA" class="mini-logo" src="">
                    <div id="scoreText" class="score-display">0:0</div>
                    <img id="scoreLogoB" class="mini-logo" src="">
                </div>
                <div id="status">Začínáme!</div>
            `;
            startGraphicMatch();
        }
    }

    function startGraphicMatch() {
      currentSeriesGame++;
      toggleButtons(true);
      currentPeriod = 1; isOvertime = false; scoreA = 0; scoreB = 0; timeLeft = 30;
      updateSidesDisplay();
      
      const s1 = 0.8 + (teams[selectedA].attack / 150);
      const s2 = 0.8 + (teams[selectedB].attack / 150);
      [playerA1, playerA2, playerA5].forEach(p => p.baseSpeed = s1);
      [playerA3, playerA4].forEach(p => p.baseSpeed = s1 * 0.85);
      [playerB1, playerB2, playerB5].forEach(p => p.baseSpeed = s2);
      [playerB3, playerB4].forEach(p => p.baseSpeed = s2 * 0.85);
      [playerA1, playerA2, playerA3, playerA4, playerA5, goalieA].forEach(p => p.color = teams[selectedA].homeColor);
      [playerB1, playerB2, playerB3, playerB4, playerB5, goalieB].forEach(p => p.color = teams[selectedB].awayColor);
      
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(updateTimer, 1000);
      gameRunning = true; resetPositions(); update();
    }

    function handleEndOfGraphicMatch() {
        clearInterval(timerInterval);
        gameRunning = false;
        
        if (scoreA > scoreB) winsA++; else winsB++;
        seriesHistory.push({game: currentSeriesGame, scoreA, scoreB, ot: isOvertime, home: "A"}); // Pro zjednodušení v grafice A home
        
        if (seriesTarget > 1 && winsA < seriesTarget && winsB < seriesTarget) {
            document.getElementById("status").innerText = `Konec zápasu! Stav série ${winsA}:${winsB}. Další zápas za 3s...`;
            setTimeout(startGraphicMatch, 3000);
        } else {
            document.getElementById("status").innerText = "KONEC SIMULACE!";
            toggleButtons(false);
            if (seriesTarget > 1) {
                renderHistory(winsA, winsB, seriesHistory);
                const winner = winsA > winsB ? teams[selectedA].name : teams[selectedB].name;
                document.getElementById("result").innerHTML += `<div class="winner-box">🏆 VÍTĚZ SÉRIE: ${winner.toUpperCase()} (${winsA}:${winsB})</div>`;
            }
        }
    }

    function toggleButtons(disabled) {
        document.querySelectorAll("button").forEach(b => b.disabled = disabled);
    }

    renderTeams();
  </script>
