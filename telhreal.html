<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Extraliga simulátor - 2D Engine PRO v8.5</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      margin: 0;
      padding: 10px;
      background: #0b0e14;
      color: #e2e8f0;
      overflow-x: hidden;
    }

    h1 { margin-bottom: 15px; font-size: 1.4rem; color: #ffffff; text-transform: uppercase; letter-spacing: 1px; }

    .teams { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; max-width: 1000px; margin: auto; }

    .team {
      cursor: pointer; transition: all 0.2s ease-in-out; width: 55px; padding: 5px;
      background: #1a1f29; border-radius: 8px; border: 1px solid #2d3748; box-sizing: border-box;
    }

    .team img { width: 100%; height: auto; aspect-ratio: 1/1; object-fit: contain; }

    .team:hover { background: #2d3748; transform: translateY(-3px); }

    .selected { border-color: #38bdf8; background: #1e293b; box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); transform: scale(1.05); }

    #match { margin-top: 15px; font-size: 1rem; min-height: 1.4em; font-weight: 500; color: #38bdf8; padding: 0 10px; }

    .game-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      margin: 15px auto;
      width: 100%;
      max-width: 900px;
    }

    .side-logo {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.05);
      border-radius: 6px;
      border: 1px solid #2d3748;
      flex-shrink: 0;
    }

    .side-logo img { max-width: 80%; max-height: 80%; object-fit: contain; }

    #rink-container {
      background: #ffffff;
      border: 3px solid #475569;
      border-radius: 20px;
      width: 100%;
      max-width: 600px;
      aspect-ratio: 2 / 1;
      position: relative;
      overflow: hidden;
      display: none; 
      box-shadow: inset 0 0 15px rgba(0,0,0,0.1);
    }

    canvas { 
      width: 100% !important; 
      height: auto !important; 
      display: block; 
    }

    .button-container { margin-top: 15px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
    
    .bo-buttons { display: flex; gap: 5px; justify-content: center; flex-wrap: wrap; }

    button {
      padding: 10px 20px; font-size: 15px; cursor: pointer; background-color: #f1f5f9;
      border: none; border-radius: 8px; color: #0b0e14; font-weight: bold; transition: 0.3s;
    }

    button:hover { background-color: #38bdf8; color: white; }
    button:disabled { background-color: #2d3748; color: #475569; cursor: not-allowed; }

    #result { 
      margin-top: 15px; 
      font-size: 1rem; 
      background: rgba(255,255,255,0.05); 
      padding: 10px; 
      border-radius: 12px; 
      display: inline-block; 
      width: 95%; 
      max-width: 450px; 
      box-sizing: border-box;
    }
    
    .score-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      margin: 5px 0;
    }
    .score-display { font-size: 2.2rem; font-weight: bold; color: #38bdf8; min-width: 80px; }
    .mini-logo { width: 35px; height: 35px; object-fit: contain; }

    #timer { font-size: 1.2rem; color: #fbbf24; font-weight: bold; margin-bottom: 2px; }
    #period { color: #94a3b8; font-weight: bold; margin-bottom: 2px; font-size: 0.9rem; }
    #status { font-size: 0.9rem; }

    #series-overlay {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(11, 14, 20, 0.95);
      border: 2px solid #38bdf8;
      padding: 30px;
      border-radius: 15px;
      z-index: 1000;
      display: none;
      min-width: 300px;
      box-shadow: 0 0 30px rgba(0,0,0,0.8);
      text-align: center;
    }

    @media (min-width: 600px) { 
      .team { width: 85px; padding: 10px; } 
      h1 { font-size: 2.5rem; }
      .side-logo { width: 80px; height: 80px; }
      #rink-container { border-radius: 40px; border-width: 5px; }
      .score-display { font-size: 3.5rem; }
      .mini-logo { width: 50px; height: 50px; }
      #result { padding: 20px; }
    }
  </style>
</head>
<body>

  <h1>🏒 Simulátor Extraligy</h1>

  <div class="teams" id="teams"></div>

  <div id="match">Vyber dva týmy</div>

  <div class="button-container">
    <button id="simBtn" onclick="initSeries(1)">Simulovat zápas</button>
    <div class="bo-buttons">
        <button id="bo3Btn" onclick="initSeries(2)">Série BO3</button>
        <button id="bo5Btn" onclick="initSeries(3)">Série BO5</button>
        <button id="bo7Btn" onclick="initSeries(4)">Série BO7</button>
    </div>
  </div>

  <div class="game-wrapper" id="gameWrapper" style="display: none;">
    <div class="side-logo" id="leftSideRinkLogo"></div>
    <div id="rink-container">
      <canvas id="hockeyRink" width="600" height="300"></canvas>
    </div>
    <div class="side-logo" id="rightSideRinkLogo"></div>
  </div>

  <div id="result">
    <div id="period">1. třetina</div>
    <div id="timer">00:30</div>
    <div class="score-container">
        <img id="scoreLogoA" class="mini-logo" src="" style="display:none;">
        <div id="scoreText" class="score-display">0:0</div>
        <img id="scoreLogoB" class="mini-logo" src="" style="display:none;">
    </div>
    <div id="status" style="font-style: italic; color: #94a3b8;">Vyber týmy a začni hru</div>
  </div>

  <div id="series-overlay">
      <h2 id="overlay-title" style="color: #38bdf8; margin-top: 0;">Výsledek zápasu</h2>
      <div id="overlay-content" style="font-size: 1.5rem; font-weight: bold; color: white;"></div>
  </div>

  <script>
    const teams = {
      pardubice: { name: "HC Dynamo Pardubice", attack: 94, dribling: 92, defense: 93, goalkeeper: 97, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2FPCE-2x.png&w=120&h=120&exact=1", homeColor: "#ff0000", awayColor: "#ffebeb" },
      sparta: { name: "HC Sparta Praha", attack: 88, dribling: 90, defense: 89, goalkeeper: 91, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fwueb1-spa.png&w=120&h=120&exact=1", homeColor: "#7a0000", awayColor: "#d9d9d9" },
      trinec: { name: "HC Oceláři Třinec", attack: 90, dribling: 91, defense: 89, goalkeeper: 94, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fccek3-tri.png&w=120&h=120&exact=1", homeColor: "#ff5454", awayColor: "#fff0f0" },
      mountfield: { name: "Mountfield HK", attack: 87, dribling: 84, defense: 90, goalkeeper: 89, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fj9qyt-hkr.png&w=120&h=120&exact=1", homeColor: "#cc0000", awayColor: "#260000" },
      vitkovice: { name: "HC Vítkovice Ridera", attack: 77, dribling: 79, defense: 74, goalkeeper: 80, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2F65gcx-vit.png&w=120&h=120&exact=1", homeColor: "#69aaff", awayColor: "#d1e5ff" },
      kometa: { name: "HC Kometa Brno", attack: 86, dribling: 85, defense: 87, goalkeeper: 90, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2F8oo52-kom.png&w=120&h=120&exact=1", homeColor: "#005ed9", awayColor: "#d1e5ff" },
      boleslav: { name: "BK Mladá Boleslav", attack: 78, dribling: 77, defense: 75, goalkeeper: 80, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fk1yj3-mbl.png&w=120&h=120&exact=1", homeColor: "#005e14", awayColor: "#001c06" },
      litvinov: { name: "HC Verva Litvínov", attack: 76, dribling: 74, defense: 72, goalkeeper: 79, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fifboo-lit.png&w=120&h=120&exact=1", homeColor: "#c9c600", awayColor: "#000000" },
      liberec: { name: "Bílí Tygři Liberec", attack: 89, dribling: 87, defense: 89, goalkeeper: 88, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fi5lg4-lib.png&w=120&h=120&exact=1", homeColor: "#00f2ff", awayColor: "#001f21" },
      olomouc: { name: "HC Olomouc", attack: 78, dribling: 75, defense: 79, goalkeeper: 83, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fy4tmv-olo.png&w=120&h=120&exact=1", homeColor: "#ff8084", awayColor: "#f0e6e6" },
      plzen: { name: "HC Škoda Plzeň", attack: 90, dribling: 85, defense: 93, goalkeeper: 86, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fpijgb-plz.png&w=120&h=120&exact=1", homeColor: "#0205bd", awayColor: "#dedeff" },
      karlovy_vary: { name: "HC Energie Karlovy Vary", attack: 83, dribling: 90, defense: 84, goalkeeper: 85, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2F98xoj-kva.png&w=120&h=120&exact=1", homeColor: "#1f1f1f", awayColor: "#009488" },
      kladno: { name: "Rytíři Kladno", attack: 79, dribling: 80, defense: 80, goalkeeper: 92, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2F7wb9o-kla.png&w=120&h=120&exact=1", homeColor: "#00233b", awayColor: "#e3f4ff" },
      ceske_budejovice: { name: "Motor České Budějovice", attack: 82, dribling: 83, defense: 78, goalkeeper: 85, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2F4zj2z-ceb.png&w=120&h=120&exact=1", homeColor: "#006ab0", awayColor: "#fff30d" },
      jihlava: { name: "HC Dukla Jihlava", attack: 70, dribling: 70, defense: 69, goalkeeper: 74, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2FJIH-2x.png&w=120&h=120&exact=1", homeColor: "#6e0c21", awayColor: "#deb618" },
      zlin: { name: "Rl Okna Berani Zlín", attack: 67, dribling: 65, defense: 70, goalkeeper: 72, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2FZLN-2x.png&w=120&h=120&exact=1", homeColor: "#d9d900", awayColor: "#1a3152" }
    };

    const canvas = document.getElementById("hockeyRink");
    const ctx = canvas.getContext("2d");
    let selectedA = null, selectedB = null;
    let scoreA = 0, scoreB = 0;
    let gameRunning = false;
    let timeLeft = 30;
    let currentPeriod = 1;
    let timerInterval = null;
    let isOvertime = false;
    const rinkLogo = new Image();

    let winsA = 0;
    let winsB = 0;
    let targetWins = 1;
    let currentGameInSeries = 0;
    let currentHomeSide = "A"; 

    let puck = { x: 300, y: 150, vx: 0, vy: 0, radius: 5, owner: null, isShot: false, passLock: 0 };
    
    let playerA1 = { x: 150, y: 150, color: "red", radius: 12, baseSpeed: 1.2, side: 'A', id: 1, role: 'forward', decisionTimer: 0, currentAction: 'move' };
    let playerA2 = { x: 150, y: 100, color: "red", radius: 12, baseSpeed: 1.2, side: 'A', id: 2, role: 'forward', decisionTimer: 0, currentAction: 'move' };
    let playerA5 = { x: 150, y: 200, color: "red", radius: 12, baseSpeed: 1.2, side: 'A', id: 5, role: 'forward', decisionTimer: 0, currentAction: 'move' };
    let playerA3 = { x: 80,  y: 120, color: "red", radius: 12, baseSpeed: 1.0, side: 'A', id: 3, role: 'defender', decisionTimer: 0, currentAction: 'move' };
    let playerA4 = { x: 80,  y: 180, color: "red", radius: 12, baseSpeed: 1.0, side: 'A', id: 4, role: 'defender', decisionTimer: 0, currentAction: 'move' };

    let playerB1 = { x: 450, y: 150, color: "blue", radius: 12, baseSpeed: 1.2, side: 'B', id: 1, role: 'forward', decisionTimer: 0, currentAction: 'move' };
    let playerB2 = { x: 450, y: 100, color: "blue", radius: 12, baseSpeed: 1.2, side: 'B', id: 2, role: 'forward', decisionTimer: 0, currentAction: 'move' };
    let playerB5 = { x: 450, y: 200, color: "blue", radius: 12, baseSpeed: 1.2, side: 'B', id: 5, role: 'forward', decisionTimer: 0, currentAction: 'move' };
    let playerB3 = { x: 520, y: 120, color: "blue", radius: 12, baseSpeed: 1.0, side: 'B', id: 3, role: 'defender', decisionTimer: 0, currentAction: 'move' };
    let playerB4 = { x: 520, y: 180, color: "blue", radius: 12, baseSpeed: 1.0, side: 'B', id: 4, role: 'defender', decisionTimer: 0, currentAction: 'move' };

    let goalieA = { x: 25, y: 150, radius: 14, color: "red", side: 'A' };
    let goalieB = { x: 575, y: 150, radius: 14, color: "blue", side: 'B' };

    let lastPuckX = 0, lastPuckY = 0, globalStuckTimer = 0;

    function renderTeams() {
      const container = document.getElementById("teams");
      for (let key in teams) {
        const div = document.createElement("div");
        div.classList.add("team");
        div.innerHTML = `<img src="${teams[key].logo}" alt="${teams[key].name}">`;
        div.onclick = () => {
            if (gameRunning) return;
            if (!selectedA) { selectedA = key; div.classList.add("selected"); }
            else if (!selectedB && key !== selectedA) { selectedB = key; div.classList.add("selected"); }
            else { 
                selectedA = key; selectedB = null; 
                document.querySelectorAll(".team").forEach(t => t.classList.remove("selected"));
                div.classList.add("selected");
            }
            document.getElementById("match").innerText = selectedB ? `${teams[selectedA].name} vs ${teams[selectedB].name}` : "Vyber soupeře";
        };
        container.appendChild(div);
      }
    }

    function resetPositions() {
      puck.x = 300; puck.y = 150; 
      puck.vx = 0; puck.vy = 0;
      puck.owner = null; puck.isShot = false; puck.passLock = 0;
      
      let sideInversion = (currentPeriod === 2 && !isOvertime);

      [playerA1, playerA2, playerA3, playerA4, playerA5, playerB1, playerB2, playerB3, playerB4, playerB5].forEach(p => {
          p.decisionTimer = 0;
          p.currentAction = 'move';
      });

      let homeTeamArr = (currentHomeSide === "A") ? 
          [playerA1, playerA2, playerA3, playerA4, playerA5, goalieA] : 
          [playerB1, playerB2, playerB3, playerB4, playerB5, goalieB];
      
      let awayTeamArr = (currentHomeSide === "A") ? 
          [playerB1, playerB2, playerB3, playerB4, playerB5, goalieB] : 
          [playerA1, playerA2, playerA3, playerA4, playerA5, goalieA];

      let fwdX_Left = sideInversion ? 450 : 150;
      let fwdX_Right = sideInversion ? 150 : 450;
      let defX_Left = sideInversion ? 520 : 80;
      let defX_Right = sideInversion ? 80 : 520;
      let goalieX_Left = sideInversion ? 575 : 25;
      let goalieX_Right = sideInversion ? 25 : 575;
      let centerBully_Left = sideInversion ? 320 : 280;
      let centerBully_Right = sideInversion ? 280 : 320;

      homeTeamArr[0].x = centerBully_Left; homeTeamArr[0].y = 150; 
      homeTeamArr[1].x = fwdX_Left; homeTeamArr[1].y = 100;
      homeTeamArr[4].x = fwdX_Left; homeTeamArr[4].y = 200;
      homeTeamArr[2].x = defX_Left; homeTeamArr[2].y = 120;
      homeTeamArr[3].x = defX_Left; homeTeamArr[3].y = 180;
      homeTeamArr[5].x = goalieX_Left; homeTeamArr[5].y = 150;

      awayTeamArr[0].x = centerBully_Right; awayTeamArr[0].y = 150; 
      awayTeamArr[1].x = fwdX_Right; awayTeamArr[1].y = 200;
      awayTeamArr[4].x = fwdX_Right; awayTeamArr[4].y = 100;
      awayTeamArr[2].x = defX_Right; awayTeamArr[2].y = 120;
      awayTeamArr[3].x = defX_Right; awayTeamArr[3].y = 180;
      awayTeamArr[5].x = goalieX_Right; awayTeamArr[5].y = 150;

      globalStuckTimer = 0;
    }

    function updateScoreDisplay() {
        let sideInversion = (currentPeriod === 2 && !isOvertime);
        if (!sideInversion) {
            document.getElementById("scoreText").innerText = `${scoreA}:${scoreB}`;
        } else {
            document.getElementById("scoreText").innerText = `${scoreB}:${scoreA}`;
        }
    }

    function updateSidesDisplay() {
        let sideInversion = (currentPeriod === 2 && !isOvertime);
        
        let leftLogo = (currentHomeSide === "A") ? teams[selectedA].logo : teams[selectedB].logo;
        let rightLogo = (currentHomeSide === "A") ? teams[selectedB].logo : teams[selectedA].logo;

        const rinkLeft = document.getElementById("leftSideRinkLogo");
        const rinkRight = document.getElementById("rightSideRinkLogo");
        const scoreLogoL = document.getElementById("scoreLogoA");
        const scoreLogoR = document.getElementById("scoreLogoB");

        if (!sideInversion) {
            rinkLeft.innerHTML = `<img src="${leftLogo}">`;
            rinkRight.innerHTML = `<img src="${rightLogo}">`;
            scoreLogoL.src = leftLogo;
            scoreLogoR.src = rightLogo;
        } else {
            rinkLeft.innerHTML = `<img src="${rightLogo}">`;
            rinkRight.innerHTML = `<img src="${leftLogo}">`;
            scoreLogoL.src = rightLogo;
            scoreLogoR.src = leftLogo;
        }
        
        scoreLogoL.style.display = "block";
        scoreLogoR.style.display = "block";

        updateScoreDisplay();
    }

    function update() {
      if (!gameRunning) return;

      if (puck.passLock > 0) puck.passLock--;

      if (Math.abs(puck.x - lastPuckX) < 0.2 && Math.abs(puck.y - lastPuckY) < 0.2) {
          globalStuckTimer++;
          if (globalStuckTimer > 180) { resetPositions(); document.getElementById("status").innerText = "Nové buly!"; }
      } else { globalStuckTimer = 0; }
      lastPuckX = puck.x; lastPuckY = puck.y;

      const teamA = [playerA1, playerA2, playerA3, playerA4, playerA5];
      const teamB = [playerB1, playerB2, playerB3, playerB4, playerB5];
      const allPlayers = [...teamA, ...teamB];

      allPlayers.forEach(p => {
          let teammates = (p.side === 'A') ? teamA.filter(x => x !== p) : teamB.filter(x => x !== p);
          let opponents = (p.side === 'A') ? teamB : teamA;
          let speed = (puck.owner === p) ? p.baseSpeed : p.baseSpeed * 1.25;
          
          let sideInversion = (currentPeriod === 2 && !isOvertime);
          let isHomeInMatch = (p.side === 'A' && currentHomeSide === "A") || (p.side === 'B' && currentHomeSide === "B");
          let attackRight = isHomeInMatch ? !sideInversion : sideInversion;

          teammates.forEach(tm => {
              let d = getDistance(p, tm);
              if (d < 50) {
                  let angle = Math.atan2(p.y - tm.y, p.x - tm.x);
                  p.x += Math.cos(angle) * 1.0;
                  p.y += Math.sin(angle) * 1.0;
              }
          });

          if (puck.owner === p) {
              let targetGoalX = attackRight ? 600 : 0;
              if (p.decisionTimer <= 0) {
                  let passChance = (p.role === 'defender' && Math.abs(p.x - (attackRight?0:600)) < 250) ? 0.6 : 0.3;
                  p.currentAction = (Math.random() < passChance) ? 'pass' : 'move';
                  p.decisionTimer = 60 + Math.random() * 40;
              }
              p.decisionTimer--;

              if (p.currentAction === 'pass') {
                  let bestTarget = teammates.reduce((prev, curr) => {
                      let dPrev = Math.abs(prev.x - (attackRight ? 600 : 0));
                      let dCurr = Math.abs(curr.x - (attackRight ? 600 : 0));
                      return dCurr < dPrev ? curr : prev;
                  });
                  passPuck(p, bestTarget, opponents);
                  p.currentAction = 'move';
              } else {
                  if (p.role === 'defender') {
                      let maxAdvance = attackRight ? 420 : 180;
                      if (attackRight && p.x > maxAdvance) targetGoalX = maxAdvance;
                      if (!attackRight && p.x < maxAdvance) targetGoalX = maxAdvance;
                  }
                  moveWithPuckComplex(p, targetGoalX, 150, getClosest(p, opponents), speed);
              }
              puck.x = attackRight ? p.x + 12 : p.x - 12;
              puck.y = p.y;
          } 
          else if (p.role === 'defender') {
              let defensiveBaseX = attackRight ? 120 : 480;
              let isPuckInZone = attackRight ? (puck.x < 300) : (puck.x > 300);
              if (!puck.owner && isPuckInZone) {
                  movePlayerToPoint(p, puck.x, puck.y, speed);
              } else if (puck.owner && puck.owner.side !== p.side) {
                  let targetX = puck.x + (attackRight ? -50 : 50);
                  movePlayerToPoint(p, targetX, puck.y, speed);
              } else {
                  let targetX = attackRight ? Math.min(puck.x - 80, defensiveBaseX) : Math.max(puck.x + 80, defensiveBaseX);
                  movePlayerToPoint(p, targetX, 150 + (p.id === 3 ? -30 : 30), speed * 0.8);
              }
          }
          else {
              if (!puck.owner && puck.x === 300 && puck.y === 150) {
                  if (p.id === 1) movePlayerToPoint(p, puck.x, puck.y, speed);
              } else {
                  if (puck.owner && puck.owner.side === p.side) {
                      let targetGoalX = attackRight ? 480 : 120;
                      let offset = 0;
                      if(p.id === 2) offset = -80;
                      if(p.id === 5) offset = 80;
                      movePlayerToPoint(p, targetGoalX, 150 + offset, speed);
                  } else {
                      movePlayerToPoint(p, puck.x, puck.y, speed);
                  }
              }
          }
      });

      if (!puck.owner) {
          puck.x += puck.vx; puck.y += puck.vy;
          puck.vx *= 0.98; puck.vy *= 0.98;
      }

      goalieA.y = 150 + (puck.y - 150) * 0.35;
      goalieB.y = 150 + (puck.y - 150) * 0.35;

      handleBouncesAndGoals();
      
      if (puck.owner) {
        let p = puck.owner;
        let sideInversion = (currentPeriod === 2 && !isOvertime);
        let isHomeInMatch = (p.side === 'A' && currentHomeSide === "A") || (p.side === 'B' && currentHomeSide === "B");
        let attackRight = isHomeInMatch ? !sideInversion : sideInversion;

        if (attackRight && p.x > 380) checkShot(p, 600, 150);
        else if (!attackRight && p.x < 220) checkShot(p, 0, 150);
      }

      allPlayers.forEach(p => checkInteraction(p, allPlayers));
      checkGoalieCollision(goalieA);
      checkGoalieCollision(goalieB);

      draw();
      requestAnimationFrame(update);
    }

    function getDistance(p1, p2) { return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2)); }
    function getClosest(p, list) { return list.reduce((prev, curr) => getDistance(p, curr) < getDistance(p, prev) ? curr : prev); }

    function passPuck(from, to, opponents) {
        puck.owner = null;
        let angle = Math.atan2(to.y - from.y, to.x - from.x);
        puck.vx = Math.cos(angle) * 7.5;
        puck.vy = Math.sin(angle) * 7.5;
        let closestOpp = getClosest(from, opponents);
        if (getDistance(from, closestOpp) < 30) {
            if (Math.random() < 0.8) {
                puck.passLock = 15;
                document.getElementById("status").innerText = "Pod hokejkou!";
            }
        } else {
            document.getElementById("status").innerText = "Přihrávka!";
        }
    }

    function movePlayerToPoint(p, tx, ty, speed) {
      let dx = tx - p.x; let dy = ty - p.y;
      let dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > 5) { p.x += (dx/dist) * speed; p.y += (dy/dist) * speed; }
      keepInRink(p);
    }

    function moveWithPuckComplex(p, targetX, targetY, closestOpp, speed) {
      let dx = targetX - p.x; let dy = targetY - p.y;
      let distToOpp = getDistance(p, closestOpp);
      let dribbleMod = (p.side === 'A' ? teams[selectedA].dribling : teams[selectedB].dribling) / 100;
      if (distToOpp < 65) {
        let angleToOpp = Math.atan2(closestOpp.y - p.y, closestOpp.x - p.x);
        p.x -= Math.cos(angleToOpp) * (0.8 * dribbleMod);
        p.y += (p.y > closestOpp.y ? 1 : -1) * (1.2 * dribbleMod);
      }
      let dist = Math.sqrt(dx*dx + dy*dy);
      p.x += (dx/dist) * (speed * 0.85);
      p.y += (dy/dist) * (speed * 0.85);
      keepInRink(p);
    }

    function checkInteraction(p, others) {
      if (puck.passLock > 0) return;
      if (!puck.owner && !puck.isShot) {
        if (getDistance(p, puck) < p.radius + 6 && Math.random() > 0.1) puck.owner = p;
      }
      if (puck.owner && puck.owner.side !== p.side) {
        if (getDistance(p, puck.owner) < p.radius * 2 + 2) {
            let sideStats = (p.side === 'A' ? teams[selectedA] : teams[selectedB]);
            let ownerStats = (puck.owner.side === 'A' ? teams[selectedA] : teams[selectedB]);
            let stealChance = (sideStats.defense * 0.45) - (ownerStats.dribling * 0.25) + 5;
            if (Math.random() * 100 < stealChance) { 
                puck.owner = null; puck.vx = (Math.random()-0.5)*4; 
                document.getElementById("status").innerText = "Odebrání!";
            }
        }
      }
    }

    function checkGoalieCollision(g) {
      if (getDistance(g, puck) < g.radius + puck.radius) {
        let gkStat = (g.side === 'A' ? teams[selectedA].goalkeeper : teams[selectedB].goalkeeper);
        if (Math.random() * 115 < gkStat) {
          puck.isShot = false; puck.owner = null; puck.passLock = 0;
          puck.vx *= -0.8; puck.vy += (Math.random() - 0.5) * 8;
          document.getElementById("status").innerText = "Zákrok!";
          puck.x += (g.x < 300 ? 15 : -15);
        }
      }
    }

    function checkShot(p, goalX, goalY) {
      if (!puck.owner || puck.isShot) return;
      let stats = (p.side === 'A' ? teams[selectedA] : teams[selectedB]);
      if (Math.random() * 100 < stats.attack * 0.065) {
        puck.isShot = true; puck.owner = null; puck.passLock = 0;
        let targetY = 150 + (Math.random() - 0.5) * 90; 
        let angle = Math.atan2(targetY - p.y, goalX - p.x);
        puck.vx = Math.cos(angle) * 10;
        puck.vy = Math.sin(angle) * 10;
        document.getElementById("status").innerText = "Střela!";
      }
    }

    function handleBouncesAndGoals() {
      if (puck.y < 5 || puck.y > 295) puck.vy *= -1;
      
      let sideInversion = (currentPeriod === 2 && !isOvertime);

      if (puck.x < 0) {
        if (puck.y > 105 && puck.y < 195) { 
            if (!sideInversion) {
                scoreB++; 
            } else {
                scoreA++;
            }
            goalScored(); 
        } else { puck.x = 5; puck.vx *= -1; }
      }
      if (puck.x > 600) {
        if (puck.y > 105 && puck.y < 195) { 
            if (!sideInversion) {
                scoreA++;
            } else {
                scoreB++;
            }
            goalScored(); 
        } else { puck.x = 595; puck.vx *= -1; }
      }
    }

    function keepInRink(p) {
      p.x = Math.max(p.radius, Math.min(600 - p.radius, p.x));
      p.y = Math.max(p.radius, Math.min(300 - p.radius, p.y));
    }

    function goalScored() {
      updateScoreDisplay();
      document.getElementById("status").innerText = "GÓÓÓL!";
      gameRunning = false;
      if (isOvertime) {
          clearInterval(timerInterval);
          document.getElementById("status").innerText = "KONEC PRODLOUŽENÍ!";
          setTimeout(finishMatch, 2000);
          return;
      }
      setTimeout(() => { if (timeLeft > 0) { resetPositions(); gameRunning = true; update(); } }, 1200);
    }

    function draw() {
      ctx.clearRect(0, 0, 600, 300);

      if (rinkLogo.complete) {
        ctx.globalAlpha = 0.15;
        ctx.drawImage(rinkLogo, 225, 75, 150, 150);
        ctx.globalAlpha = 1.0;
      }

      ctx.strokeStyle = "rgba(255, 0, 0, 0.4)"; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(300, 0); ctx.lineTo(300, 300); ctx.stroke();
      ctx.strokeStyle = "rgba(0, 0, 255, 0.3)"; ctx.lineWidth = 4;
      ctx.strokeRect(200, 0, 0.1, 300); ctx.strokeRect(400, 0, 0.1, 300);
      ctx.strokeStyle = "#38bdf8"; ctx.lineWidth = 2;
      ctx.strokeRect(0, 105, 25, 90); ctx.strokeRect(575, 105, 25, 90); 

      ctx.fillStyle = "#111";
      ctx.beginPath(); ctx.arc(puck.x, puck.y, puck.radius, 0, Math.PI*2); ctx.fill();
      
      [playerA1, playerA2, playerA3, playerA4, playerA5, playerB1, playerB2, playerB3, playerB4, playerB5].forEach(drawPlayer);
      drawGoalie(goalieA); drawGoalie(goalieB);
    }

    function drawPlayer(p) {
      ctx.shadowColor = "black"; ctx.shadowBlur = 4; ctx.shadowOffsetX = 2; ctx.shadowOffsetY = 2;
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
      ctx.strokeStyle = puck.owner === p ? "gold" : "rgba(0,0,0,0.3)"; 
      ctx.lineWidth = puck.owner === p ? 4 : 2; ctx.stroke();
      ctx.fillStyle = "white"; ctx.font = "bold 10px Arial"; ctx.fillText(p.side + p.id, p.x-6, p.y+4);
    }

    function drawGoalie(g) {
      ctx.shadowColor = "black"; ctx.shadowBlur = 4;
      ctx.fillStyle = g.color;
      ctx.fillRect(g.x - 8, g.y - 15, 16, 30);
      ctx.shadowBlur = 0;
      ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.strokeRect(g.x - 8, g.y - 15, 16, 30);
    }

    function updateTimer() {
      if (timeLeft <= 0) { 
          gameRunning = false;
          if (currentPeriod < 3) {
              currentPeriod++;
              timeLeft = 30;
              document.getElementById("period").innerText = currentPeriod + ". třetina";
              updateSidesDisplay();
              document.getElementById("status").innerText = "Buly " + currentPeriod + ". třetiny!";
              setTimeout(() => { resetPositions(); gameRunning = true; update(); }, 1500);
          } else if (scoreA === scoreB) {
              isOvertime = true; timeLeft = 999;
              document.getElementById("period").innerText = "PRODLOUŽENÍ";
              updateSidesDisplay();
              setTimeout(() => { resetPositions(); gameRunning = true; update(); }, 1500);
          } else {
              clearInterval(timerInterval);
              document.getElementById("status").innerText = "KONEC ZÁPASU!";
              setTimeout(finishMatch, 2000);
          }
          return;
      }
      if (!isOvertime) timeLeft--;
      let m = Math.floor(timeLeft / 60); let s = timeLeft % 60;
      document.getElementById("timer").innerText = isOvertime ? "NÁHLÁ SMRT" : `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    function initSeries(type) {
      if (!selectedA || !selectedB) return;
      winsA = 0; winsB = 0; currentGameInSeries = 0; targetWins = type; 
      document.getElementById("simBtn").disabled = true;
      document.getElementById("bo3Btn").disabled = true;
      document.getElementById("bo5Btn").disabled = true;
      document.getElementById("bo7Btn").disabled = true;
      startSimulatedMatch();
    }

    function startSimulatedMatch() {
      currentGameInSeries++;
      
      if (targetWins === 2) { 
          currentHomeSide = (currentGameInSeries === 2) ? "B" : "A";
      } else if (targetWins === 3) { 
          currentHomeSide = [1, 2, 5].includes(currentGameInSeries) ? "A" : "B";
      } else if (targetWins === 4) { 
          currentHomeSide = [1, 2, 5, 7].includes(currentGameInSeries) ? "A" : "B";
      } else {
          currentHomeSide = "A";
      }

      rinkLogo.src = currentHomeSide === "A" ? teams[selectedA].logo : teams[selectedB].logo;
      
      document.getElementById("gameWrapper").style.display = "flex";
      document.getElementById("rink-container").style.display = "block";
      currentPeriod = 1; isOvertime = false;
      scoreA = 0; scoreB = 0; timeLeft = 30;
      document.getElementById("period").innerText = "1. třetina";
      
      if (currentHomeSide === "A") {
          [playerA1, playerA2, playerA3, playerA4, playerA5, goalieA].forEach(p => p.color = teams[selectedA].homeColor);
          [playerB1, playerB2, playerB3, playerB4, playerB5, goalieB].forEach(p => p.color = teams[selectedB].awayColor);
      } else {
          [playerA1, playerA2, playerA3, playerA4, playerA5, goalieA].forEach(p => p.color = teams[selectedA].awayColor);
          [playerB1, playerB2, playerB3, playerB4, playerB5, goalieB].forEach(p => p.color = teams[selectedB].homeColor);
      }
      
      updateSidesDisplay();
      
      const s1 = 0.8 + (teams[selectedA].attack / 150);
      const s2 = 0.8 + (teams[selectedB].attack / 150);
      playerA1.baseSpeed = playerA2.baseSpeed = playerA5.baseSpeed = s1; playerA3.baseSpeed = playerA4.baseSpeed = s1 * 0.85;
      playerB1.baseSpeed = playerB2.baseSpeed = playerB5.baseSpeed = s2; playerB3.baseSpeed = playerB4.baseSpeed = s2 * 0.85;
      
      let homeName = currentHomeSide === "A" ? teams[selectedA].name : teams[selectedB].name;
      document.getElementById("status").innerText = "Zápas č." + currentGameInSeries + " (Domácí: " + homeName + ")";
      if(targetWins > 1) {
          document.getElementById("match").innerText = teams[selectedA].name + " [" + winsA + ":" + winsB + "] " + teams[selectedB].name;
      }

      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(updateTimer, 1000);
      gameRunning = true; 
      resetPositions(); 
      update();
    }

    function finishMatch() {
        let finalScore = `${scoreA}:${scoreB}`;
        if (scoreA > scoreB) winsA++; else winsB++;

        if (winsA < targetWins && winsB < targetWins) {
            const overlay = document.getElementById("series-overlay");
            const content = document.getElementById("overlay-content");
            content.innerHTML = `Konec ${currentGameInSeries}. zápasu<br><span style="color:#fbbf24">${finalScore}</span><br><br><span style="font-size: 1.1rem; color: #38bdf8">Stav série: ${winsA}:${winsB}</span>`;
            overlay.style.display = "block";

            setTimeout(() => {
                overlay.style.display = "none";
                startSimulatedMatch();
            }, 3000);
        } else {
            let winner = winsA > winsB ? teams[selectedA].name : teams[selectedB].name;
            if (targetWins > 1) {
                document.getElementById("status").innerHTML = "<strong style='color:#fbbf24'>VÍTĚZ SÉRIE: " + winner.toUpperCase() + " (" + winsA + ":" + winsB + ")</strong>";
                document.getElementById("match").innerText = teams[selectedA].name + " [" + winsA + ":" + winsB + "] " + teams[selectedB].name;
            } else {
                document.getElementById("status").innerText = "VÍTĚZ ZÁPASU: " + winner.toUpperCase();
            }
            document.getElementById("simBtn").disabled = false;
            document.getElementById("bo3Btn").disabled = false;
            document.getElementById("bo5Btn").disabled = false;
            document.getElementById("bo7Btn").disabled = false;
        }
    }

    renderTeams();
  </script>
