<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extraliga simulátor - 2D Engine</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px 10px;
      background: #0b0e14;
      color: #e2e8f0;
    }

    h1 { margin-bottom: 20px; font-size: 1.8rem; color: #ffffff; text-transform: uppercase; letter-spacing: 2px; }

    .teams { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; max-width: 1000px; margin: auto; }

    .team {
      cursor: pointer; transition: all 0.2s ease-in-out; width: 65px; padding: 8px;
      background: #1a1f29; border-radius: 8px; border: 1px solid #2d3748; box-sizing: border-box;
    }

    .team img { width: 100%; height: auto; aspect-ratio: 1/1; object-fit: contain; }

    .team:hover { background: #2d3748; transform: translateY(-3px); }

    .selected { border-color: #38bdf8; background: #1e293b; box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); transform: scale(1.05); }

    #match { margin-top: 25px; font-size: 1.2rem; min-height: 1.6em; font-weight: 500; color: #38bdf8; }

    /* HERNÍ PLOCHA A LOGA */
    .game-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin: 20px auto;
      max-width: 900px;
    }

    .side-logo {
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      border: 1px solid #2d3748;
    }

    .side-logo img {
      max-width: 80%;
      max-height: 80%;
      object-fit: contain;
    }

    #rink-container {
      background: #ffffff;
      border: 5px solid #475569;
      border-radius: 40px;
      width: 600px;
      height: 300px;
      position: relative;
      overflow: hidden;
      display: none; 
      box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
    }

    canvas { display: block; }

    .button-container { margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; }

    button {
      padding: 12px 25px; font-size: 16px; cursor: pointer; background-color: #f1f5f9;
      border: none; border-radius: 8px; color: #0b0e14; font-weight: bold; transition: 0.3s;
    }

    button:hover { background-color: #38bdf8; color: white; }

    button:disabled { background-color: #2d3748; color: #475569; cursor: not-allowed; }

    #result { margin-top: 30px; font-size: 1.1rem; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; display: inline-block; min-width: 360px; }

    .score-display { font-size: 3.5rem; font-weight: bold; color: #38bdf8; text-align: center; }

    @media (min-width: 600px) { .team { width: 85px; padding: 10px; } h1 { font-size: 2.5rem; } }
  </style>
</head>
<body>

  <h1>🏒 Simulátor Extraligy 2D</h1>

  <div class="teams" id="teams"></div>

  <div id="match">Vyber dva týmy</div>

  <div class="button-container">
    <button id="simBtn" onclick="startSimulatedMatch()">Simulovat grafický zápas</button>
  </div>

  <div class="game-wrapper" id="gameWrapper" style="display: none;">
    <div class="side-logo" id="homeLogoContainer"></div>
    <div id="rink-container">
      <canvas id="hockeyRink" width="600" height="300"></canvas>
    </div>
    <div class="side-logo" id="awayLogoContainer"></div>
  </div>

  <div id="result">
    <div id="scoreText" class="score-display">0:0</div>
    <div id="status" style="font-style: italic; color: #94a3b8;">Vyber týmy a začni hru</div>
  </div>

  <script>
    const teams = {
      pardubice: { name: "HC Dynamo Pardubice", attack: 94, defense: 91, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2FPCE-2x.png&w=120&h=120&exact=1", color: "#ce0000" },
      sparta: { name: "HC Sparta Praha", attack: 85, defense: 81, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fwueb1-spa.png&w=120&h=120&exact=1", color: "#800000" },
      trinec: { name: "HC Oceláři Třinec", attack: 87, defense: 82, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fccek3-tri.png&w=120&h=120&exact=1", color: "#ff0000" },
      mountfield: { name: "Mountfield HK", attack: 86, defense: 88, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fj9qyt-hkr.png&w=120&h=120&exact=1", color: "#000" },
      vitkovice: { name: "HC Vítkovice Ridera", attack: 77, defense: 74, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2F65gcx-vit.png&w=120&h=120&exact=1", color: "#0056a0" },
      kometa: { name: "HC Kometa Brno", attack: 83, defense: 80, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2F8oo52-kom.png&w=120&h=120&exact=1", color: "#003399" },
      boleslav: { name: "BK Mladá Boleslav", attack: 80, defense: 78, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fk1yj3-mbl.png&w=120&h=120&exact=1", color: "#008000" },
      litvinov: { name: "HC Verva Litvínov", attack: 76, defense: 72, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fifboo-lit.png&w=120&h=120&exact=1", color: "#ffcc00" },
      liberec: { name: "Bílí Tygři Liberec", attack: 89, defense: 86, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fi5lg4-lib.png&w=120&h=120&exact=1", color: "#005aab" },
      olomouc: { name: "HC Olomouc", attack: 78, defense: 76, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fy4tmv-olo.png&w=120&h=120&exact=1", color: "#ff0000" },
      plzen: { name: "HC Škoda Plzeň", attack: 88, defense: 93, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fpijgb-plz.png&w=120&h=120&exact=1", color: "#0056a0" },
      karlovy_vary: { name: "HC Energie Karlovy Vary", attack: 83, defense: 84, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2F98xoj-kva.png&w=120&h=120&exact=1", color: "#000" },
      kladno: { name: "Rytíři Kladno", attack: 79, defense: 80, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2F7wb9o-kla.png&w=120&h=120&exact=1", color: "#004a8d" },
      ceske_budejovice: { name: "Motor České Budějovice", attack: 82, defense: 78, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2F4zj2z-ceb.png&w=120&h=120&exact=1", color: "#ffff00" },
      jihlava: { name: "HC Dukla Jihlava", attack: 72, defense: 69, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2FJIH-2x.png&w=120&h=120&exact=1", color: "#800000" },
      zlin: { name: "Rl Okna Berani Zlín", attack: 67, defense: 70, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2FZLN-2x.png&w=120&h=120&exact=1", color: "#003399" }
    };

    const canvas = document.getElementById("hockeyRink");
    const ctx = canvas.getContext("2d");
    let selectedA = null, selectedB = null;
    let scoreA = 0, scoreB = 0;
    let gameRunning = false;

    // Fyzika a objekty
    let puck = { x: 300, y: 150, vx: 0, vy: 0, radius: 5 };
    let playerA = { x: 100, y: 150, color: "red", radius: 12, speed: 2.5 };
    let playerB = { x: 500, y: 150, color: "blue", radius: 12, speed: 2.5 };

    function renderTeams() {
      const container = document.getElementById("teams");
      for (let key in teams) {
        const div = document.createElement("div");
        div.classList.add("team");
        div.innerHTML = `<img src="${teams[key].logo}" alt="${teams[key].name}">`;
        div.onclick = () => {
            if (!selectedA) { selectedA = key; div.classList.add("selected"); }
            else if (!selectedB && key !== selectedA) { selectedB = key; div.classList.add("selected"); }
            else { 
                selectedA = key; selectedB = null; 
                document.querySelectorAll(".team").forEach(t => t.classList.remove("selected"));
                div.classList.add("selected");
            }
            document.getElementById("match").innerText = selectedB ? `${teams[selectedA].name} vs ${teams[selectedB].name}` : "Vyber soupeře";
        };
        container.appendChild(div);
      }
    }

    function resetPositions() {
      puck.x = 300; puck.y = 150; puck.vx = (Math.random() - 0.5) * 5; puck.vy = (Math.random() - 0.5) * 5;
      playerA.x = 100; playerA.y = 150;
      playerB.x = 500; playerB.y = 150;
    }

    function update() {
      if (!gameRunning) return;

      movePlayer(playerA, puck);
      movePlayer(playerB, puck);

      puck.x += puck.vx;
      puck.y += puck.vy;
      puck.vx *= 0.985; puck.vy *= 0.985; // Tření

      // Mantinely - horní a dolní
      if (puck.y - puck.radius < 0) { puck.y = puck.radius; puck.vy *= -1; }
      if (puck.y + puck.radius > 300) { puck.y = 300 - puck.radius; puck.vy *= -1; }
      
      // Mantinely - boční a góly
      if (puck.x - puck.radius < 0) {
        if (puck.y > 100 && puck.y < 200) { scoreB++; goalScored(); } 
        else { puck.x = puck.radius; puck.vx *= -1; }
      }
      if (puck.x + puck.radius > 600) {
        if (puck.y > 100 && puck.y < 200) { scoreA++; goalScored(); }
        else { puck.x = 600 - puck.radius; puck.vx *= -1; }
      }

      checkCollision(playerA);
      checkCollision(playerB);

      draw();
      requestAnimationFrame(update);
    }

    function movePlayer(p, target) {
      let dx = target.x - p.x;
      let dy = target.y - p.y;
      let dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > 5) {
        p.x += (dx/dist) * p.speed;
        p.y += (dy/dist) * p.speed;
      }
      // Hráč nesmí vyjet z hřiště
      p.x = Math.max(p.radius, Math.min(600 - p.radius, p.x));
      p.y = Math.max(p.radius, Math.min(300 - p.radius, p.y));
    }

    function checkCollision(p) {
      let dx = puck.x - p.x;
      let dy = puck.y - p.y;
      let dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < p.radius + puck.radius) {
        let angle = Math.atan2(dy, dx);
        let force = 6; 
        puck.vx = Math.cos(angle) * force;
        puck.vy = Math.sin(angle) * force;
      }
    }

    function goalScored() {
      document.getElementById("scoreText").innerText = `${scoreA}:${scoreB}`;
      gameRunning = false;
      setTimeout(() => { gameRunning = true; resetPositions(); update(); }, 1200);
    }

    function draw() {
      ctx.clearRect(0, 0, 600, 300);
      
      // Led a čáry
      ctx.strokeStyle = "rgba(255, 0, 0, 0.3)"; ctx.lineWidth = 4;
      ctx.beginPath(); ctx.moveTo(300, 0); ctx.lineTo(300, 300); ctx.stroke(); // Střed
      
      ctx.strokeStyle = "#38bdf8"; ctx.lineWidth = 2;
      ctx.strokeRect(0, 100, 30, 100); ctx.strokeRect(570, 100, 30, 100); // Brankoviště

      // Puk
      ctx.shadowBlur = 5; ctx.shadowColor = "black";
      ctx.fillStyle = "#111";
      ctx.beginPath(); ctx.arc(puck.x, puck.y, puck.radius, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;

      // Hráči
      drawPlayer(playerA);
      drawPlayer(playerB);
    }

    function drawPlayer(p) {
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.stroke();
    }

    function startSimulatedMatch() {
      if (!selectedA || !selectedB) return;
      
      // Zobrazení wrapperu a log
      document.getElementById("gameWrapper").style.display = "flex";
      document.getElementById("rink-container").style.display = "block";
      document.getElementById("homeLogoContainer").innerHTML = `<img src="${teams[selectedA].logo}" alt="Home">`;
      document.getElementById("awayLogoContainer").innerHTML = `<img src="${teams[selectedB].logo}" alt="Away">`;
      
      playerA.color = teams[selectedA].color || "red";
      playerB.color = teams[selectedB].color || "blue";
      
      playerA.speed = (teams[selectedA].attack / 100) * 3.2;
      playerB.speed = (teams[selectedB].attack / 100) * 3.2;

      scoreA = 0; scoreB = 0;
      document.getElementById("scoreText").innerText = "0:0";
      document.getElementById("status").innerText = "Zápas v plném proudu!";
      gameRunning = true;
      resetPositions();
      update();
    }

    renderTeams();
  </script>
</body>
</html>
