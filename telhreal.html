<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extraliga simulátor - Real-Tactical Update</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px 10px;
      background: #0b0e14;
      color: #e2e8f0;
    }

    h1 { margin-bottom: 20px; font-size: 1.8rem; color: #ffffff; text-transform: uppercase; letter-spacing: 2px; }

    .teams { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; max-width: 1000px; margin: auto; }

    .team {
      cursor: pointer; transition: all 0.2s ease-in-out; width: 65px; padding: 8px;
      background: #1a1f29; border-radius: 8px; border: 1px solid #2d3748; box-sizing: border-box;
    }

    .team img { width: 100%; height: auto; aspect-ratio: 1/1; object-fit: contain; }

    .team:hover { background: #2d3748; transform: translateY(-3px); }

    .selected { border-color: #38bdf8; background: #1e293b; box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); transform: scale(1.05); }

    #match { margin-top: 25px; font-size: 1.2rem; min-height: 1.6em; font-weight: 500; color: #38bdf8; }

    .game-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin: 20px auto;
      max-width: 900px;
    }

    .side-logo {
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      border: 1px solid #2d3748;
    }

    .side-logo img { max-width: 80%; max-height: 80%; object-fit: contain; }

    #rink-container {
      background: #ffffff;
      border: 5px solid #475569;
      border-radius: 40px;
      width: 600px;
      height: 300px;
      position: relative;
      overflow: hidden;
      display: none; 
      box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
    }

    canvas { display: block; }

    .button-container { margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; }

    button {
      padding: 12px 25px; font-size: 16px; cursor: pointer; background-color: #f1f5f9;
      border: none; border-radius: 8px; color: #0b0e14; font-weight: bold; transition: 0.3s;
    }

    button:hover { background-color: #38bdf8; color: white; }
    button:disabled { background-color: #2d3748; color: #475569; cursor: not-allowed; }

    #result { margin-top: 30px; font-size: 1.1rem; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; display: inline-block; min-width: 360px; }
    .score-display { font-size: 3.5rem; font-weight: bold; color: #38bdf8; text-align: center; }
    #timer { font-size: 1.5rem; color: #fbbf24; font-weight: bold; margin-bottom: 5px; }
    #period { color: #94a3b8; font-weight: bold; margin-bottom: 5px; }

    @media (min-width: 600px) { .team { width: 85px; padding: 10px; } h1 { font-size: 2.5rem; } }
  </style>
</head>
<body>

  <h1>🏒 Simulátor Extraligy 2D</h1>

  <div class="teams" id="teams"></div>

  <div id="match">Vyber dva týmy</div>

  <div class="button-container">
    <button id="simBtn" onclick="startSimulatedMatch()">Simulovat grafický zápas</button>
  </div>

  <div class="game-wrapper" id="gameWrapper" style="display: none;">
    <div class="side-logo" id="homeLogoContainer"></div>
    <div id="rink-container">
      <canvas id="hockeyRink" width="600" height="300"></canvas>
    </div>
    <div class="side-logo" id="awayLogoContainer"></div>
  </div>

  <div id="result">
    <div id="period">1. třetina</div>
    <div id="timer">00:30</div>
    <div id="scoreText" class="score-display">0:0</div>
    <div id="status" style="font-style: italic; color: #94a3b8;">Vyber týmy a začni hru</div>
  </div>

  <script>
    const teams = {
      pardubice: { name: "HC Dynamo Pardubice", attack: 94, dribling: 92, defense: 91, goalkeeper: 97, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2FPCE-2x.png&w=120&h=120&exact=1", homeColor: "#ce0000", awayColor: "#ffffff" },
      sparta: { name: "HC Sparta Praha", attack: 85, dribling: 88, defense: 81, goalkeeper: 90, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fwueb1-spa.png&w=120&h=120&exact=1", homeColor: "#800000", awayColor: "#ffcc00" },
      trinec: { name: "HC Oceláři Třinec", attack: 87, dribling: 85, defense: 82, goalkeeper: 94, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fccek3-tri.png&w=120&h=120&exact=1", homeColor: "#ff0000", awayColor: "#ffffff" },
      mountfield: { name: "Mountfield HK", attack: 86, dribling: 84, defense: 88, goalkeeper: 89, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fj9qyt-hkr.png&w=120&h=120&exact=1", homeColor: "#000000", awayColor: "#ff0000" },
      vitkovice: { name: "HC Vítkovice Ridera", attack: 77, dribling: 79, defense: 74, goalkeeper: 82, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2F65gcx-vit.png&w=120&h=120&exact=1", homeColor: "#0056a0", awayColor: "#ffffff" },
      kometa: { name: "HC Kometa Brno", attack: 83, dribling: 82, defense: 80, goalkeeper: 85, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2F8oo52-kom.png&w=120&h=120&exact=1", homeColor: "#003399", awayColor: "#ffffff" },
      boleslav: { name: "BK Mladá Boleslav", attack: 80, dribling: 78, defense: 78, goalkeeper: 83, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fk1yj3-mbl.png&w=120&h=120&exact=1", homeColor: "#008000", awayColor: "#ffffff" },
      litvinov: { name: "HC Verva Litvínov", attack: 76, dribling: 81, defense: 72, goalkeeper: 79, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fifboo-lit.png&w=120&h=120&exact=1", homeColor: "#ffcc00", awayColor: "#000000" },
      liberec: { name: "Bílí Tygři Liberec", attack: 89, dribling: 87, defense: 86, goalkeeper: 88, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fi5lg4-lib.png&w=120&h=120&exact=1", homeColor: "#005aab", awayColor: "#ffffff" },
      olomouc: { name: "HC Olomouc", attack: 78, dribling: 75, defense: 76, goalkeeper: 92, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fy4tmv-olo.png&w=120&h=120&exact=1", homeColor: "#ff0000", awayColor: "#ffffff" },
      plzen: { name: "HC Škoda Plzeň", attack: 88, dribling: 84, defense: 93, goalkeeper: 86, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fpijgb-plz.png&w=120&h=120&exact=1", homeColor: "#0056a0", awayColor: "#ffffff" },
      karlovy_vary: { name: "HC Energie Karlovy Vary", attack: 83, dribling: 85, defense: 84, goalkeeper: 84, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2F98xoj-kva.png&w=120&h=120&exact=1", homeColor: "#000000", awayColor: "#ffffff" },
      kladno: { name: "Rytíři Kladno", attack: 79, dribling: 80, defense: 80, goalkeeper: 81, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2F7wb9o-kla.png&w=120&h=120&exact=1", homeColor: "#004a8d", awayColor: "#ffffff" },
      ceske_budejovice: { name: "Motor České Budějovice", attack: 82, dribling: 83, defense: 78, goalkeeper: 85, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2F4zj2z-ceb.png&w=120&h=120&exact=1", homeColor: "#ffff00", awayColor: "#cc0000" },
      jihlava: { name: "HC Dukla Jihlava", attack: 72, dribling: 70, defense: 69, goalkeeper: 74, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2FJIH-2x.png&w=120&h=120&exact=1", homeColor: "#800000", awayColor: "#ffcc00" },
      zlin: { name: "Rl Okna Berani Zlín", attack: 67, dribling: 65, defense: 70, goalkeeper: 72, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2FZLN-2x.png&w=120&h=120&exact=1", homeColor: "#003399", awayColor: "#ffff00" }
    };

    const canvas = document.getElementById("hockeyRink");
    const ctx = canvas.getContext("2d");
    let selectedA = null, selectedB = null;
    let scoreA = 0, scoreB = 0;
    let gameRunning = false;
    let timeLeft = 30;
    let currentPeriod = 1;
    let timerInterval = null;
    let isOvertime = false;
    const rinkLogo = new Image();

    let puck = { x: 300, y: 150, vx: 0, vy: 0, radius: 5, owner: null, isShot: false, passLock: 0, isOneTimer: false };
    
    // Taktický stav
    let tacticalMode = null; 
    let tacticalPasses = 0;
    let tacticalTargetPasses = 0;

    let playerA1 = { x: 150, y: 100, color: "red", radius: 12, baseSpeed: 1.2, side: 'A', id: 1, role: 'forward', decisionTimer: 0 };
    let playerA2 = { x: 150, y: 200, color: "red", radius: 12, baseSpeed: 1.2, side: 'A', id: 2, role: 'forward', decisionTimer: 0 };
    let playerA3 = { x: 80,  y: 150, color: "red", radius: 12, baseSpeed: 1.0, side: 'A', id: 3, role: 'defender', decisionTimer: 0 };

    let playerB1 = { x: 450, y: 100, color: "blue", radius: 12, baseSpeed: 1.2, side: 'B', id: 1, role: 'forward', decisionTimer: 0 };
    let playerB2 = { x: 450, y: 200, color: "blue", radius: 12, baseSpeed: 1.2, side: 'B', id: 2, role: 'forward', decisionTimer: 0 };
    let playerB3 = { x: 520, y: 150, color: "blue", radius: 12, baseSpeed: 1.0, side: 'B', id: 3, role: 'defender', decisionTimer: 0 };

    let goalieA = { x: 25, y: 150, radius: 14, color: "red", side: 'A' };
    let goalieB = { x: 575, y: 150, radius: 14, color: "blue", side: 'B' };

    let lastPuckX = 0, lastPuckY = 0, globalStuckTimer = 0;

    function renderTeams() {
      const container = document.getElementById("teams");
      for (let key in teams) {
        const div = document.createElement("div");
        div.classList.add("team");
        div.innerHTML = `<img src="${teams[key].logo}" alt="${teams[key].name}">`;
        div.onclick = () => {
            if (gameRunning) return;
            if (!selectedA) { selectedA = key; div.classList.add("selected"); rinkLogo.src = teams[key].logo; }
            else if (!selectedB && key !== selectedA) { selectedB = key; div.classList.add("selected"); }
            else { 
                selectedA = key; selectedB = null; 
                document.querySelectorAll(".team").forEach(t => t.classList.remove("selected"));
                div.classList.add("selected");
                rinkLogo.src = teams[key].logo;
            }
            document.getElementById("match").innerText = selectedB ? `${teams[selectedA].name} vs ${teams[selectedB].name}` : "Vyber soupeře";
        };
        container.appendChild(div);
      }
    }

    function resetPositions() {
      puck.x = 300; puck.y = 150; 
      puck.vx = 0; puck.vy = 0;
      puck.owner = null; puck.isShot = false; puck.passLock = 0; puck.isOneTimer = false;
      tacticalMode = null; tacticalPasses = 0;
      
      let homeSide = (currentPeriod === 2 && !isOvertime) ? 450 : 150;
      let awaySide = (currentPeriod === 2 && !isOvertime) ? 150 : 450;
      let homeDef  = (currentPeriod === 2 && !isOvertime) ? 520 : 80;
      let awayDef  = (currentPeriod === 2 && !isOvertime) ? 80 : 520;

      [playerA1, playerA2, playerA3, playerB1, playerB2, playerB3].forEach(p => p.decisionTimer = 0);

      playerA1.x = 280; playerA1.y = 150;
      playerA2.x = homeSide; playerA2.y = 220;
      playerA3.x = homeDef;  playerA3.y = 150;

      playerB1.x = 320; playerB1.y = 150;
      playerB2.x = awaySide; playerB2.y = 80;
      playerB3.x = awayDef;  playerB3.y = 150;

      globalStuckTimer = 0;
    }

    function updateSidesDisplay() {
        if (currentPeriod === 2 && !isOvertime) {
            document.getElementById("homeLogoContainer").innerHTML = `<img src="${teams[selectedB].logo}">`;
            document.getElementById("awayLogoContainer").innerHTML = `<img src="${teams[selectedA].logo}">`;
        } else {
            document.getElementById("homeLogoContainer").innerHTML = `<img src="${teams[selectedA].logo}">`;
            document.getElementById("awayLogoContainer").innerHTML = `<img src="${teams[selectedB].logo}">`;
        }
    }

    function update() {
      if (!gameRunning) return;

      if (puck.passLock > 0) puck.passLock--;

      if (Math.abs(puck.x - lastPuckX) < 0.2 && Math.abs(puck.y - lastPuckY) < 0.2) {
          globalStuckTimer++;
          if (globalStuckTimer > 180) { resetPositions(); document.getElementById("status").innerText = "Nové buly!"; }
      } else { globalStuckTimer = 0; }
      lastPuckX = puck.x; lastPuckY = puck.y;

      const teamA = [playerA1, playerA2, playerA3];
      const teamB = [playerB1, playerB2, playerB3];
      const allPlayers = [...teamA, ...teamB];

      allPlayers.forEach(p => {
          let teammates = (p.side === 'A') ? teamA.filter(x => x !== p) : teamB.filter(x => x !== p);
          let opponents = (p.side === 'A') ? teamB : teamA;
          let speed = (puck.owner === p) ? p.baseSpeed : p.baseSpeed * 1.25;
          let attackRight = (p.side === 'A' && (currentPeriod !== 2 || isOvertime)) || (p.side === 'B' && currentPeriod === 2 && !isOvertime);

          // TAKTIKA - FORMACE PŘI ÚTOČNÉ AKCI
          if (tacticalMode === p.side + '_ATTACK') {
              if (puck.owner !== p) {
                  let zoneX = attackRight ? 460 : 140;
                  let targetX = zoneX, targetY = 150;
                  if (p.id === 1) { targetX = zoneX + (attackRight?40:-40); targetY = 85; }
                  if (p.id === 2) { targetX = zoneX + (attackRight?40:-40); targetY = 215; }
                  if (p.id === 3) { targetX = zoneX - (attackRight?80:-80); targetY = 150; }
                  movePlayerToPoint(p, targetX, targetY, speed);
              }
          }

          if (puck.owner === p) {
              let targetGoalX = attackRight ? 600 : 0;
              let distToGoal = Math.abs(p.x - targetGoalX);
              let closestOpp = getClosest(p, opponents);
              
              if (p.decisionTimer <= 0) {
                  let inZone = attackRight ? p.x > 320 : p.x < 280;
                  
                  // LOGIKA VIDĚNÍ OSTATNÍCH (Realistické rozhodování)
                  let defender = teammates.find(t => t.role === 'defender');
                  let otherForward = teammates.find(t => t.role === 'forward');
                  
                  // 1. Spuštění útočné akce na čáře
                  if (inZone && !tacticalMode && Math.random() < 0.5) {
                      tacticalMode = p.side + '_ATTACK';
                      tacticalPasses = 0;
                      tacticalTargetPasses = 3 + Math.floor(Math.random() * 3);
                      document.getElementById("status").innerText = "Útočná akce!";
                  } 
                  // 2. Vidím volného obránce vzadu? (Když je cesta vpřed obsazená)
                  else if (getDistance(p, closestOpp) < 50 && defender && Math.random() < 0.7) {
                      passPuck(p, defender, opponents);
                      document.getElementById("status").innerText = "Zpětná na obránce";
                  }
                  // 3. Vidím volného spoluhráče vepředu/na straně?
                  else if (otherForward && Math.abs(otherForward.x - targetGoalX) < distToGoal && Math.random() < 0.6) {
                      passPuck(p, otherForward, opponents);
                  }
                  
                  p.decisionTimer = 40 + Math.random() * 30;
              }
              p.decisionTimer--;

              // Realizace akce
              if (tacticalMode === p.side + '_ATTACK') {
                  if (tacticalPasses >= tacticalTargetPasses) {
                      checkShot(p, targetGoalX, 150);
                      tacticalMode = null; 
                  } else if (p.decisionTimer < 10) {
                      let passTarget = teammates[Math.floor(Math.random() * teammates.length)];
                      passPuck(p, passTarget, opponents);
                      tacticalPasses++;
                  }
              } else {
                  moveWithPuckComplex(p, targetGoalX, 150, closestOpp, speed);
              }
              
              puck.x = attackRight ? p.x + 10 : p.x - 10;
              puck.y = p.y;
          } 
          else {
              // Hráči bez puku
              if (!puck.owner && getDistance(p, puck) < 100) {
                  movePlayerToPoint(p, puck.x, puck.y, speed);
              } else if (!tacticalMode) {
                  // Standardní positioning
                  let baseX = attackRight ? 400 : 200;
                  if (p.role === 'defender') baseX = attackRight ? 150 : 450;
                  movePlayerToPoint(p, baseX, 150 + (p.id === 1 ? -70 : 70), speed * 0.7);
              }
          }
      });

      if (!puck.owner) {
          puck.x += puck.vx; puck.y += puck.vy;
          puck.vx *= 0.985; puck.vy *= 0.985;
      }

      goalieA.y = 150 + (puck.y - 150) * 0.4;
      goalieB.y = 150 + (puck.y - 150) * 0.4;

      handleBouncesAndGoals();
      
      if (puck.owner) {
        let p = puck.owner;
        let attackRight = (p.side === 'A' && (currentPeriod !== 2 || isOvertime)) || (p.side === 'B' && currentPeriod === 2 && !isOvertime);
        if (attackRight && p.x > 450 && !tacticalMode) checkShot(p, 600, 150);
        else if (!attackRight && p.x < 150 && !tacticalMode) checkShot(p, 0, 150);
      }

      allPlayers.forEach(p => checkInteraction(p, allPlayers));
      checkGoalieCollision(goalieA);
      checkGoalieCollision(goalieB);

      draw();
      requestAnimationFrame(update);
    }

    function getDistance(p1, p2) { return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2)); }
    function getClosest(p, list) { return list.reduce((prev, curr) => getDistance(p, curr) < getDistance(p, prev) ? curr : prev); }

    function passPuck(from, to, opponents) {
        puck.owner = null;
        let angle = Math.atan2(to.y - from.y, to.x - from.x);
        puck.vx = Math.cos(angle) * 9;
        puck.vy = Math.sin(angle) * 9;
        puck.passLock = 10;
        
        // Pokud je nahrávka před branku, označíme pro One-timer
        let attackRight = (to.side === 'A' && (currentPeriod !== 2 || isOvertime)) || (to.side === 'B' && currentPeriod === 2 && !isOvertime);
        let goalX = attackRight ? 600 : 0;
        if (Math.abs(to.x - goalX) < 150) {
            puck.isOneTimer = true;
        }
    }

    function movePlayerToPoint(p, tx, ty, speed) {
      let dx = tx - p.x; let dy = ty - p.y;
      let dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > 5) { p.x += (dx/dist) * speed; p.y += (dy/dist) * speed; }
      keepInRink(p);
    }

    function moveWithPuckComplex(p, targetX, targetY, closestOpp, speed) {
      let dx = targetX - p.x; let dy = targetY - p.y;
      let distToOpp = getDistance(p, closestOpp);
      if (distToOpp < 60) {
        let angleToOpp = Math.atan2(closestOpp.y - p.y, closestOpp.x - p.x);
        p.x -= Math.cos(angleToOpp) * 0.6;
        p.y += (p.y > closestOpp.y ? 1 : -1) * 1.1;
      }
      let dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > 5) {
        p.x += (dx/dist) * (speed * 0.9);
        p.y += (dy/dist) * (speed * 0.9);
      }
      keepInRink(p);
    }

    function checkInteraction(p, others) {
      if (puck.passLock > 0) return;

      if (!puck.owner) {
        if (getDistance(p, puck) < p.radius + 10) {
            // ONE TIMER LOGIKA
            if (puck.isOneTimer && !puck.isShot) {
                puck.owner = p;
                let attackRight = (p.side === 'A' && (currentPeriod !== 2 || isOvertime)) || (p.side === 'B' && currentPeriod === 2 && !isOvertime);
                checkShot(p, attackRight ? 600 : 0, 150, true);
                puck.isOneTimer = false;
            } else {
                puck.owner = p;
                puck.isShot = false;
                puck.isOneTimer = false;
            }
        }
      } else if (puck.owner.side !== p.side) {
        if (getDistance(p, puck.owner) < p.radius * 2 + 2) {
            let defStat = (p.side === 'A' ? teams[selectedA].defense : teams[selectedB].defense);
            if (Math.random() * 100 < (defStat * 0.3)) { 
                puck.owner = null; puck.vx = (Math.random()-0.5)*5; 
                tacticalMode = null;
                document.getElementById("status").innerText = "Odebrání puku!";
            }
        }
      }
    }

    function checkGoalieCollision(g) {
      if (getDistance(g, puck) < g.radius + puck.radius) {
        let gkStat = (g.side === 'A' ? teams[selectedA].goalkeeper : teams[selectedB].goalkeeper);
        let difficulty = puck.isShot ? (puck.vx > 11 ? 140 : 110) : 80;
        if (Math.random() * difficulty < gkStat) {
          puck.isShot = false; puck.owner = null; puck.isOneTimer = false;
          puck.vx *= -0.7; puck.vy += (Math.random() - 0.5) * 10;
          document.getElementById("status").innerText = "Zákrok brankáře!";
          puck.x += (g.x < 300 ? 20 : -20);
        }
      }
    }

    function checkShot(p, goalX, goalY, forceOneTimer = false) {
      if (!puck.owner) return;
      let stats = (p.side === 'A' ? teams[selectedA] : teams[selectedB]);
      
      puck.isShot = true; puck.owner = null;
      let targetY = 150 + (Math.random() - 0.5) * 70; 
      let angle = Math.atan2(targetY - p.y, goalX - p.x);
      let power = forceOneTimer ? 15 : 11;
      puck.vx = Math.cos(angle) * power;
      puck.vy = Math.sin(angle) * power;
      document.getElementById("status").innerText = forceOneTimer ? "ONE-TIMER!" : "Střela!";
    }

    function handleBouncesAndGoals() {
      if (puck.y < 5 || puck.y > 295) puck.vy *= -1;
      if (puck.x < 0) {
        if (puck.y > 105 && puck.y < 195) { scoreB++; goalScored(); } 
        else { puck.x = 5; puck.vx *= -1; }
      }
      if (puck.x > 600) {
        if (puck.y > 105 && puck.y < 195) { scoreA++; goalScored(); } 
        else { puck.x = 595; puck.vx *= -1; }
      }
    }

    function keepInRink(p) {
      p.x = Math.max(p.radius, Math.min(600 - p.radius, p.x));
      p.y = Math.max(p.radius, Math.min(300 - p.radius, p.y));
    }

    function goalScored() {
      document.getElementById("scoreText").innerText = `${scoreA}:${scoreB}`;
      document.getElementById("status").innerText = "GÓÓÓL!";
      gameRunning = false;
      tacticalMode = null;
      if (isOvertime) {
          clearInterval(timerInterval);
          document.getElementById("status").innerText = "KONEC V PRODLOUŽENÍ!";
          document.getElementById("simBtn").disabled = false;
          return;
      }
      setTimeout(() => { if (timeLeft > 0) { resetPositions(); gameRunning = true; update(); } }, 1500);
    }

    function draw() {
      ctx.clearRect(0, 0, 600, 300);
      if (rinkLogo.complete) {
        ctx.globalAlpha = 0.15;
        ctx.drawImage(rinkLogo, 225, 75, 150, 150);
        ctx.globalAlpha = 1.0;
      }
      ctx.strokeStyle = "rgba(255, 0, 0, 0.4)"; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(300, 0); ctx.lineTo(300, 300); ctx.stroke();
      ctx.strokeStyle = "rgba(0, 0, 255, 0.3)"; ctx.lineWidth = 4;
      ctx.strokeRect(200, 0, 0.1, 300); ctx.strokeRect(400, 0, 0.1, 300);
      ctx.strokeStyle = "#38bdf8"; ctx.lineWidth = 2;
      ctx.strokeRect(0, 105, 25, 90); ctx.strokeRect(575, 105, 25, 90); 

      // Puk
      ctx.fillStyle = "#111";
      ctx.beginPath(); ctx.arc(puck.x, puck.y, puck.radius, 0, Math.PI*2); ctx.fill();
      if (puck.isOneTimer) {
          ctx.strokeStyle = "#fbbf24"; ctx.lineWidth = 2;
          ctx.beginPath(); ctx.arc(puck.x, puck.y, 8, 0, Math.PI*2); ctx.stroke();
      }
      
      [playerA1, playerA2, playerA3, playerB1, playerB2, playerB3].forEach(drawPlayer);
      drawGoalie(goalieA); drawGoalie(goalieB);
    }

    function drawPlayer(p) {
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = puck.owner === p ? "gold" : "rgba(0,0,0,0.3)"; 
      ctx.lineWidth = puck.owner === p ? 4 : 2; ctx.stroke();
      ctx.fillStyle = "white"; ctx.font = "bold 10px Arial"; ctx.fillText(p.side + p.id, p.x-6, p.y+4);
    }

    function drawGoalie(g) {
      ctx.fillStyle = g.color;
      ctx.fillRect(g.x - 8, g.y - 15, 16, 30);
      ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.strokeRect(g.x - 8, g.y - 15, 16, 30);
    }

    function updateTimer() {
      if (timeLeft <= 0) { 
          gameRunning = false;
          if (currentPeriod < 3) {
              currentPeriod++;
              timeLeft = 30;
              document.getElementById("period").innerText = currentPeriod + ". třetina";
              updateSidesDisplay();
              document.getElementById("status").innerText = "Začátek " + currentPeriod + ". třetiny";
              setTimeout(() => { resetPositions(); gameRunning = true; update(); }, 2000);
          } else if (scoreA === scoreB) {
              isOvertime = true; timeLeft = 999;
              document.getElementById("period").innerText = "PRODLOUŽENÍ";
              updateSidesDisplay();
              setTimeout(() => { resetPositions(); gameRunning = true; update(); }, 2000);
          } else {
              clearInterval(timerInterval);
              document.getElementById("status").innerText = "KONEC ZÁPASU!";
              document.getElementById("simBtn").disabled = false;
          }
          return;
      }
      if (!isOvertime) timeLeft--;
      let m = Math.floor(timeLeft / 60); let s = timeLeft % 60;
      document.getElementById("timer").innerText = isOvertime ? "NÁHLÁ SMRT" : `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    function startSimulatedMatch() {
      if (!selectedA || !selectedB) return;
      document.getElementById("simBtn").disabled = true;
      document.getElementById("gameWrapper").style.display = "flex";
      document.getElementById("rink-container").style.display = "block";
      currentPeriod = 1; isOvertime = false;
      updateSidesDisplay();
      [playerA1, playerA2, playerA3, goalieA].forEach(p => p.color = teams[selectedA].homeColor);
      [playerB1, playerB2, playerB3, goalieB].forEach(p => p.color = teams[selectedB].awayColor);
      
      scoreA = 0; scoreB = 0; timeLeft = 30;
      document.getElementById("scoreText").innerText = "0:0";
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(updateTimer, 1000);
      gameRunning = true; resetPositions(); update();
    }
    renderTeams();
  </script>
</body>
</html>
