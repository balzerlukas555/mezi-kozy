<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extraliga simulátor - 2D Engine</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px 10px;
      background: #0b0e14;
      color: #e2e8f0;
    }

    h1 { margin-bottom: 20px; font-size: 1.8rem; color: #ffffff; text-transform: uppercase; letter-spacing: 2px; }

    .teams { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; max-width: 1000px; margin: auto; }

    .team {
      cursor: pointer; transition: all 0.2s ease-in-out; width: 65px; padding: 8px;
      background: #1a1f29; border-radius: 8px; border: 1px solid #2d3748; box-sizing: border-box;
    }

    .team img { width: 100%; height: auto; aspect-ratio: 1/1; object-fit: contain; }

    .team:hover { background: #2d3748; transform: translateY(-3px); }

    .selected { border-color: #38bdf8; background: #1e293b; box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); transform: scale(1.05); }

    #match { margin-top: 25px; font-size: 1.2rem; min-height: 1.6em; font-weight: 500; color: #38bdf8; }

    /* HERNÍ PLOCHA A LOGA */
    .game-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin: 20px auto;
      max-width: 900px;
    }

    .side-logo {
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      border: 1px solid #2d3748;
    }

    .side-logo img {
      max-width: 80%;
      max-height: 80%;
      object-fit: contain;
    }

    #rink-container {
      background: #ffffff;
      border: 5px solid #475569;
      border-radius: 40px;
      width: 600px;
      height: 300px;
      position: relative;
      overflow: hidden;
      display: none; 
      box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
    }

    canvas { display: block; }

    .button-container { margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; }

    button {
      padding: 12px 25px; font-size: 16px; cursor: pointer; background-color: #f1f5f9;
      border: none; border-radius: 8px; color: #0b0e14; font-weight: bold; transition: 0.3s;
    }

    button:hover { background-color: #38bdf8; color: white; }

    button:disabled { background-color: #2d3748; color: #475569; cursor: not-allowed; }

    #result { margin-top: 30px; font-size: 1.1rem; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; display: inline-block; min-width: 360px; }

    .score-display { font-size: 3.5rem; font-weight: bold; color: #38bdf8; text-align: center; }

    #timer { font-size: 1.5rem; color: #fbbf24; font-weight: bold; margin-bottom: 5px; }

    @media (min-width: 600px) { .team { width: 85px; padding: 10px; } h1 { font-size: 2.5rem; } }
  </style>
</head>
<body>

  <h1>🏒 Simulátor Extraligy 2D</h1>

  <div class="teams" id="teams"></div>

  <div id="match">Vyber dva týmy</div>

  <div class="button-container">
    <button id="simBtn" onclick="startSimulatedMatch()">Simulovat grafický zápas</button>
  </div>

  <div class="game-wrapper" id="gameWrapper" style="display: none;">
    <div class="side-logo" id="homeLogoContainer"></div>
    <div id="rink-container">
      <canvas id="hockeyRink" width="600" height="300"></canvas>
    </div>
    <div class="side-logo" id="awayLogoContainer"></div>
  </div>

  <div id="result">
    <div id="timer">01:00</div>
    <div id="scoreText" class="score-display">0:0</div>
    <div id="status" style="font-style: italic; color: #94a3b8;">Vyber týmy a začni hru</div>
  </div>

  <script>
    const teams = {
      pardubice: { name: "HC Dynamo Pardubice", attack: 94, dribling: 92, defense: 91, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2FPCE-2x.png&w=120&h=120&exact=1", homeColor: "#ce0000", awayColor: "#ffffff" },
      sparta: { name: "HC Sparta Praha", attack: 85, dribling: 88, defense: 81, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fwueb1-spa.png&w=120&h=120&exact=1", homeColor: "#800000", awayColor: "#ffcc00" },
      trinec: { name: "HC Oceláři Třinec", attack: 87, dribling: 85, defense: 82, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fccek3-tri.png&w=120&h=120&exact=1", homeColor: "#ff0000", awayColor: "#ffffff" },
      mountfield: { name: "Mountfield HK", attack: 86, dribling: 84, defense: 88, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fj9qyt-hkr.png&w=120&h=120&exact=1", homeColor: "#000000", awayColor: "#ff0000" },
      vitkovice: { name: "HC Vítkovice Ridera", attack: 77, dribling: 79, defense: 74, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2F65gcx-vit.png&w=120&h=120&exact=1", homeColor: "#0056a0", awayColor: "#ffffff" },
      kometa: { name: "HC Kometa Brno", attack: 83, dribling: 82, defense: 80, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2F8oo52-kom.png&w=120&h=120&exact=1", homeColor: "#003399", awayColor: "#ffffff" },
      boleslav: { name: "BK Mladá Boleslav", attack: 80, dribling: 78, defense: 78, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fk1yj3-mbl.png&w=120&h=120&exact=1", homeColor: "#008000", awayColor: "#ffffff" },
      litvinov: { name: "HC Verva Litvínov", attack: 76, dribling: 81, defense: 72, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fifboo-lit.png&w=120&h=120&exact=1", homeColor: "#ffcc00", awayColor: "#000000" },
      liberec: { name: "Bílí Tygři Liberec", attack: 89, dribling: 87, defense: 86, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fi5lg4-lib.png&w=120&h=120&exact=1", homeColor: "#005aab", awayColor: "#ffffff" },
      olomouc: { name: "HC Olomouc", attack: 78, dribling: 75, defense: 76, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fy4tmv-olo.png&w=120&h=120&exact=1", homeColor: "#ff0000", awayColor: "#ffffff" },
      plzen: { name: "HC Škoda Plzeň", attack: 88, dribling: 84, defense: 93, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2Fpijgb-plz.png&w=120&h=120&exact=1", homeColor: "#0056a0", awayColor: "#ffffff" },
      karlovy_vary: { name: "HC Energie Karlovy Vary", attack: 83, dribling: 85, defense: 84, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2F98xoj-kva.png&w=120&h=120&exact=1", homeColor: "#000000", awayColor: "#ffffff" },
      kladno: { name: "Rytíři Kladno", attack: 79, dribling: 80, defense: 80, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2F7wb9o-kla.png&w=120&h=120&exact=1", homeColor: "#004a8d", awayColor: "#ffffff" },
      ceske_budejovice: { name: "Motor České Budějovice", attack: 82, dribling: 83, defense: 78, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2F4zj2z-ceb.png&w=120&h=120&exact=1", homeColor: "#ffff00", awayColor: "#cc0000" },
      jihlava: { name: "HC Dukla Jihlava", attack: 72, dribling: 70, defense: 69, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2FJIH-2x.png&w=120&h=120&exact=1", homeColor: "#800000", awayColor: "#ffcc00" },
      zlin: { name: "Rl Okna Berani Zlín", attack: 67, dribling: 65, defense: 70, logo: "https://www.hokej.cz/min.php?file=%2Ffiles%2Flogos%2FZLN-2x.png&w=120&h=120&exact=1", homeColor: "#003399", awayColor: "#ffff00" }
    };

    const canvas = document.getElementById("hockeyRink");
    const ctx = canvas.getContext("2d");
    let selectedA = null, selectedB = null;
    let scoreA = 0, scoreB = 0;
    let gameRunning = false;
    let timeLeft = 60;
    let timerInterval = null;

    let lastPuckPos = { x: 0, y: 0 };
    let stuckCounter = 0;

    let puck = { x: 300, y: 150, vx: 0, vy: 0, radius: 5, owner: null, isShot: false };
    let playerA = { x: 100, y: 150, color: "red", radius: 12, speed: 2.5, side: 'A' };
    let playerB = { x: 500, y: 150, color: "blue", radius: 12, speed: 2.5, side: 'B' };

    function renderTeams() {
      const container = document.getElementById("teams");
      for (let key in teams) {
        const div = document.createElement("div");
        div.classList.add("team");
        div.innerHTML = `<img src="${teams[key].logo}" alt="${teams[key].name}">`;
        div.onclick = () => {
            if (gameRunning) return;
            if (!selectedA) { selectedA = key; div.classList.add("selected"); }
            else if (!selectedB && key !== selectedA) { selectedB = key; div.classList.add("selected"); }
            else { 
                selectedA = key; selectedB = null; 
                document.querySelectorAll(".team").forEach(t => t.classList.remove("selected"));
                div.classList.add("selected");
            }
            document.getElementById("match").innerText = selectedB ? `${teams[selectedA].name} vs ${teams[selectedB].name}` : "Vyber soupeře";
        };
        container.appendChild(div);
      }
    }

    function resetPositions() {
      puck.x = 300; puck.y = 150; puck.vx = (Math.random() - 0.5) * 5; puck.vy = (Math.random() - 0.5) * 5;
      puck.owner = null;
      puck.isShot = false;
      playerA.x = 100; playerA.y = 150;
      playerB.x = 500; playerB.y = 150;
      stuckCounter = 0;
    }

    function update() {
      if (!gameRunning) return;

      // Logika pohybu
      if (puck.owner === playerA) {
        moveWithPuck(playerA, 600, 150, playerB);
        movePlayerToOpponent(playerB, playerA); // Obránce napadá
        puck.x = playerA.x + 12; puck.y = playerA.y;
      } else if (puck.owner === playerB) {
        moveWithPuck(playerB, 0, 150, playerA);
        movePlayerToOpponent(playerA, playerB); // Obránce napadá
        puck.x = playerB.x - 12; puck.y = playerB.y;
      } else {
        movePlayerToPuck(playerA, puck);
        movePlayerToPuck(playerB, puck);
        puck.x += puck.vx;
        puck.y += puck.vy;
        puck.vx *= 0.985; puck.vy *= 0.985;
        if (Math.abs(puck.vx) < 0.1 && Math.abs(puck.vy) < 0.1) puck.isShot = false;
      }

      // Detekce záseku
      let distMoved = Math.sqrt(Math.pow(puck.x - lastPuckPos.x, 2) + Math.pow(puck.y - lastPuckPos.y, 2));
      if (distMoved < 0.3) stuckCounter++; else stuckCounter = 0;
      lastPuckPos = { x: puck.x, y: puck.y };
      if (stuckCounter > 150) { resetPositions(); }

      // Mantinely a góly
      handleBouncesAndGoals();
      
      // Střelba (především od modré)
      if (puck.owner) {
        if (puck.owner === playerA && puck.x > 400) checkShot(playerA, 600, 150);
        if (puck.owner === playerB && puck.x < 200) checkShot(playerB, 0, 150);
      }

      // Kolize a napadání
      checkInteraction(playerA, playerB);

      draw();
      requestAnimationFrame(update);
    }

    function movePlayerToPuck(p, target) {
      let dx = target.x - p.x;
      let dy = target.y - p.y;
      let dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > 5) {
        p.x += (dx/dist) * p.speed;
        p.y += (dy/dist) * p.speed;
      }
      keepInRink(p);
    }

    function movePlayerToOpponent(p, opponent) {
      let dx = opponent.x - p.x;
      let dy = opponent.y - p.y;
      let dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > 10) {
        p.x += (dx/dist) * p.speed;
        p.y += (dy/dist) * p.speed;
      }
      keepInRink(p);
    }

    function moveWithPuck(p, targetX, targetY, opponent) {
      let dx = targetX - p.x;
      let dy = targetY - p.y;
      
      let distToOpp = Math.sqrt(Math.pow(p.x - opponent.x, 2) + Math.pow(p.y - opponent.y, 2));
      if (distToOpp < 70) {
        dy += (p.y > opponent.y) ? 35 : -35; // Dribling - úhyb
      }

      let dist = Math.sqrt(dx*dx + dy*dy);
      p.x += (dx/dist) * (p.speed * 0.85);
      p.y += (dy/dist) * (p.speed * 0.85);
      keepInRink(p);
    }

    function checkInteraction(pa, pb) {
      let dist = Math.sqrt(Math.pow(pa.x - pb.x, 2) + Math.pow(pa.y - pb.y, 2));
      let distPuckA = Math.sqrt(Math.pow(pa.x - puck.x, 2) + Math.pow(pa.y - puck.y, 2));
      let distPuckB = Math.sqrt(Math.pow(pb.x - puck.x, 2) + Math.pow(pb.y - puck.y, 2));

      if (!puck.owner && !puck.isShot) {
        if (distPuckA < pa.radius + puck.radius) puck.owner = pa;
        else if (distPuckB < pb.radius + puck.radius) puck.owner = pb;
      }

      // Defense vs Dribling souboj
      if (dist < pa.radius + pb.radius + 15) {
        if (puck.owner === pa) {
            let stealChance = teams[selectedB].defense - teams[selectedA].dribling + 15;
            if (Math.random() * 100 < stealChance * 0.15) { 
                puck.owner = null; puck.vx = (Math.random()-0.5)*5; puck.vy = (Math.random()-0.5)*5;
                document.getElementById("status").innerText = "Vypíchnutí!"; 
            }
        } else if (puck.owner === pb) {
            let stealChance = teams[selectedA].defense - teams[selectedB].dribling + 15;
            if (Math.random() * 100 < stealChance * 0.15) { 
                puck.owner = null; puck.vx = (Math.random()-0.5)*5; puck.vy = (Math.random()-0.5)*5;
                document.getElementById("status").innerText = "Vypíchnutí!"; 
            }
        }
      }
    }

    function checkShot(p, goalX, goalY) {
        if (!puck.owner || puck.isShot) return;
        
        let stats = (p.side === 'A' ? teams[selectedA] : teams[selectedB]);
        // Šance na střelu roste s blízkostí k bráně
        if (Math.random() * 100 < stats.attack * 0.05) {
            puck.isShot = true;
            puck.owner = null;
            
            // Výpočet míření střely
            let targetY = 150 + (Math.random() - 0.5) * (140 - stats.attack / 2); 
            let angle = Math.atan2(targetY - p.y, goalX - p.x);
            let speed = 12;
            
            puck.vx = Math.cos(angle) * speed;
            puck.vy = Math.sin(angle) * speed;
            document.getElementById("status").innerText = "Střela!";
        }
    }

    function handleBouncesAndGoals() {
      // Mantinely
      if (puck.y - puck.radius < 0 || puck.y + puck.radius > 300) { puck.vy *= -1; }
      
      // Branková čára
      if (puck.x - puck.radius < 0) {
        if (puck.y > 105 && puck.y < 195) { scoreB++; goalScored(); } 
        else { puck.x = puck.radius; puck.vx *= -1; puck.isShot = false; }
      }
      if (puck.x + puck.radius > 600) {
        if (puck.y > 105 && puck.y < 195) { scoreA++; goalScored(); }
        else { puck.x = 600 - puck.radius; puck.vx *= -1; puck.isShot = false; }
      }
    }

    function keepInRink(p) {
      p.x = Math.max(p.radius, Math.min(600 - p.radius, p.x));
      p.y = Math.max(p.radius, Math.min(300 - p.radius, p.y));
    }

    function goalScored() {
      document.getElementById("scoreText").innerText = `${scoreA}:${scoreB}`;
      document.getElementById("status").innerText = "GÓÓÓL!";
      gameRunning = false;
      setTimeout(() => { if (timeLeft > 0) { gameRunning = true; resetPositions(); update(); } }, 1200);
    }

    function draw() {
      ctx.clearRect(0, 0, 600, 300);
      
      // Čáry
      ctx.strokeStyle = "rgba(255, 0, 0, 0.4)"; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(300, 0); ctx.lineTo(300, 300); ctx.stroke(); // Střed
      
      ctx.strokeStyle = "rgba(0, 0, 255, 0.3)"; ctx.lineWidth = 4;
      ctx.beginPath(); ctx.moveTo(200, 0); ctx.lineTo(200, 300); ctx.stroke(); // Modrá A
      ctx.beginPath(); ctx.moveTo(400, 0); ctx.lineTo(400, 300); ctx.stroke(); // Modrá B

      ctx.strokeStyle = "#38bdf8"; ctx.lineWidth = 2;
      ctx.strokeRect(0, 100, 30, 100); ctx.strokeRect(570, 100, 30, 100); 

      // Puk
      ctx.fillStyle = "#111";
      ctx.beginPath(); ctx.arc(puck.x, puck.y, puck.radius, 0, Math.PI*2); ctx.fill();
      
      drawPlayer(playerA);
      drawPlayer(playerB);
    }

    function drawPlayer(p) {
      // Stín
      ctx.fillStyle = "rgba(0,0,0,0.2)";
      ctx.beginPath(); ctx.arc(p.x + 3, p.y + 3, p.radius, 0, Math.PI*2); ctx.fill();
      
      // Hráč
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = puck.owner === p ? "gold" : "#333"; 
      ctx.lineWidth = puck.owner === p ? 4 : 2; 
      ctx.stroke();
    }

    function updateTimer() {
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        gameRunning = false;
        document.getElementById("status").innerText = "KONEC ZÁPASU!";
        document.getElementById("simBtn").disabled = false;
        return;
      }
      timeLeft--;
      let m = Math.floor(timeLeft / 60);
      let s = timeLeft % 60;
      document.getElementById("timer").innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    function startSimulatedMatch() {
      if (!selectedA || !selectedB) return;
      document.getElementById("simBtn").disabled = true;
      document.getElementById("gameWrapper").style.display = "flex";
      document.getElementById("rink-container").style.display = "block";
      document.getElementById("homeLogoContainer").innerHTML = `<img src="${teams[selectedA].logo}" alt="Home">`;
      document.getElementById("awayLogoContainer").innerHTML = `<img src="${teams[selectedB].logo}" alt="Away">`;
      
      playerA.color = teams[selectedA].homeColor;
      playerB.color = teams[selectedB].awayColor;
      playerA.speed = (teams[selectedA].attack / 100) * 3.4;
      playerB.speed = (teams[selectedB].attack / 100) * 3.4;

      scoreA = 0; scoreB = 0; timeLeft = 60;
      document.getElementById("scoreText").innerText = "0:0";
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(updateTimer, 1000);

      gameRunning = true;
      resetPositions();
      update();
    }

    renderTeams();
  </script>
</body>
</html>
