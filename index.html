<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mezi Kozy - Hospodská hra</title>

    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/8294/8294512.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/8294/8294512.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --wood: #3e2723;
            --felt: #1b5e20;
            --gold: #ffd700;
            --paper: #f5f5dc;
            --text-dark: #212121;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Georgia', serif;
            background: var(--wood) url('https://www.transparenttextures.com/patterns/dark-wood.png');
            color: white;
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        h1 { 
            margin: 10px 0; 
            font-size: 2.2rem; 
            color: var(--gold); 
            text-transform: uppercase;
            text-shadow: 2px 2px 4px #000;
            letter-spacing: 2px;
        }

        .game-container { width: 100%; max-width: 600px; }

        .section { 
            background: rgba(0,0,0,0.6); 
            padding: 15px; 
            border-radius: 8px; 
            border: 2px solid #5d4037;
            margin-bottom: 15px;
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .stat-item { 
            background: rgba(255,255,255,0.05); 
            padding: 10px; 
            border-radius: 5px; 
            text-align: center;
            border: 1px solid #795548;
        }

        .stat-label { font-size: 0.8rem; color: #ccc; display: block; margin-bottom: 3px; }
        .stat-value { font-size: 1.3rem; font-weight: bold; color: var(--gold); }

        /* Hrací stůl - zelené plátno */
        .table-area { 
            background: var(--felt) url('https://www.transparenttextures.com/patterns/felt.png');
            border: 10px solid #5d4037;
            border-radius: 40px;
            display: flex; justify-content: center; align-items: center;
            gap: 12px; margin: 15px 0; 
            min-height: 180px;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.6), 0 10px 20px rgba(0,0,0,0.5);
            padding: 10px;
        }

        .card-slot { 
            width: 85px; height: 125px; 
            border: 1px dashed rgba(255,255,255,0.3); 
            border-radius: 6px; 
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.1);
        }

        .card-img { 
            width: 100%; height: 100%; 
            border-radius: 5px; 
            box-shadow: 4px 4px 12px rgba(0,0,0,0.8);
            animation: dealCard 0.4s ease-out;
            object-fit: cover;
        }

        @keyframes dealCard { from { transform: translateY(-40px) rotate(5deg); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Ovládací tlačítka */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        input[type="number"] { 
            grid-column: span 2;
            background: var(--paper); border: 2px solid #9e9e9e; 
            color: var(--text-dark); padding: 12px; border-radius: 5px; 
            font-size: 1.2rem; text-align: center; font-weight: bold; outline: none;
        }

        button { 
            padding: 15px; border-radius: 5px; border: none;
            font-weight: bold; font-size: 1.1rem; cursor: pointer;
            text-transform: uppercase; box-shadow: 0 4px #222;
            transition: all 0.1s;
        }

        button#bet-btn { background: #d32f2f; color: white; }
        button#pass-btn { background: #5d4037; color: white; }
        
        button:active { transform: translateY(2px); box-shadow: 0 2px #111; }
        button:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }

        /* Log jako starý papír */
        .log { 
            height: 110px; overflow-y: auto; 
            padding: 12px; background: var(--paper); 
            color: var(--text-dark); border-radius: 3px;
            font-family: 'Courier New', monospace;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.3);
            font-size: 0.9rem;
        }

        .log-entry { border-bottom: 1px dashed #bbb; padding: 4px 0; }

        /* Modální okno */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: var(--paper); color: var(--text-dark); padding: 30px; border-radius: 8px; text-align: center; width: 85%; max-width: 380px; border: 4px solid var(--wood); }
        
        .hidden { display: none; }
        @media (max-width: 768px) { .card-slot { width: 75px; height: 110px; } .table-area { border-width: 6px; padding: 5px; } }
    </style>
</head>
<body>

<h1>Mezi Kozy</h1>

<div id="setup-screen" class="modal">
    <div class="modal-content">
        <img src="https://cdn-icons-png.flaticon.com/512/8294/8294512.png" width="70" alt="Ikonka">
        <h2 style="margin:10px 0; font-family: Georgia;">U hracího stolu</h2>
        <input type="text" id="player-name" placeholder="Tvé jméno..." style="width: 100%; padding: 12px; margin: 15px 0; font-size: 1rem; border-radius: 5px; border: 1px solid #ccc;">
        <div style="display: flex; gap: 10px;">
            <button onclick="startGame(1)" style="flex: 1; background: #2e7d32; color: white; box-shadow: 0 4px #1b5e20;">Jeden soupeř</button>
            <button onclick="startGame(2)" style="flex: 1; background: #2e7d32; color: white; box-shadow: 0 4px #1b5e20;">Dva soupeři</button>
        </div>
    </div>
</div>

<div class="game-container">
    <div class="section">
        <div class="stats-grid">
            <div class="stat-item"><span class="stat-label">V Banku</span><span id="pot-display" class="stat-value">0</span></div>
            <div class="stat-item"><span class="stat-label">Tvůj měšec</span><span id="player-money" class="stat-value">0</span></div>
        </div>
        <div id="turn-indicator" style="text-align: center; margin-top: 10px; color: var(--gold); font-style: italic;">Čeká se na hosty...</div>
    </div>

    <div class="table-area">
        <div class="card-slot" id="card1"></div>
        <div class="card-slot" id="card3" style="transform: scale(1.1); z-index: 5;"></div>
        <div class="card-slot" id="card2"></div>
    </div>

    <div class="section controls" id="game-controls">
        <input type="number" id="bet-amount" placeholder="Kolik vsadíš?">
        <button onclick="playTurn()" id="bet-btn">Vsadit!</button>
        <button onclick="passTurn()" id="pass-btn">Přejít</button>
    </div>

    <div class="log" id="game-log"></div>
</div>

<script>
    // TVOJE ODKAZY NA KARTY
    const IMAGE_URLS = {
        "7_K": "https://hra-lora.cz/assets/cardsmini/7_d.jpg", "8_K": "https://hra-lora.cz/assets/cardsmini/8_d.jpg", "9_K": "https://hra-lora.cz/assets/cardsmini/9_d.jpg", "10_K": "https://hra-lora.cz/assets/cardsmini/t_d.jpg", "J_K": "https://hra-lora.cz/assets/cardsmini/j_d.jpg", "Q_K": "https://hra-lora.cz/assets/cardsmini/q_d.jpg", "K_K": "https://hra-lora.cz/assets/cardsmini/k_d.jpg", "A_K": "https://hra-lora.cz/assets/cardsmini/a_d.jpg",
        "7_Z": "https://hra-lora.cz/assets/cardsmini/7_s.jpg", "8_Z": "https://hra-lora.cz/assets/cardsmini/8_s.jpg", "9_Z": "https://hra-lora.cz/assets/cardsmini/9_s.jpg", "10_Z": "https://hra-lora.cz/assets/cardsmini/t_s.jpg", "J_Z": "https://hra-lora.cz/assets/cardsmini/j_s.jpg", "Q_Z": "https://hra-lora.cz/assets/cardsmini/q_s.jpg", "K_Z": "https://hra-lora.cz/assets/cardsmini/k_s.jpg", "A_Z": "https://hra-lora.cz/assets/cardsmini/a_s.jpg",
        "7_C": "https://hra-lora.cz/assets/cardsmini/7_h.jpg", "8_C": "https://hra-lora.cz/assets/cardsmini/8_h.jpg", "9_C": "https://hra-lora.cz/assets/cardsmini/9_h.jpg", "10_C": "https://hra-lora.cz/assets/cardsmini/t_h.jpg", "J_C": "https://hra-lora.cz/assets/cardsmini/j_h.jpg", "Q_C": "https://hra-lora.cz/assets/cardsmini/q_h.jpg", "K_C": "https://hra-lora.cz/assets/cardsmini/k_h.jpg", "A_C": "https://hra-lora.cz/assets/cardsmini/a_h.jpg",
        "7_ZL": "https://hra-lora.cz/assets/cardsmini/7_c.jpg", "8_ZL": "https://hra-lora.cz/assets/cardsmini/8_c.jpg", "9_ZL": "https://hra-lora.cz/assets/cardsmini/9_c.jpg", "10_ZL": "https://hra-lora.cz/assets/cardsmini/t_c.jpg", "J_ZL": "https://hra-lora.cz/assets/cardsmini/j_c.jpg", "Q_ZL": "https://hra-lora.cz/assets/cardsmini/q_c.jpg", "K_ZL": "https://hra-lora.cz/assets/cardsmini/k_c.jpg", "A_ZL": "https://hra-lora.cz/assets/cardsmini/a_c.jpg",
        "back": "https://hra-lora.cz/assets/cardsmini/back.jpg",
        "icon": "https://cdn-icons-png.flaticon.com/512/8294/8294512.png"
    };

    const SUITS = ['C', 'Z', 'K', 'ZL'];
    const RANKS = ['7', '8', '9', '10', 'J', 'Q', 'K', 'A'];
    const RANK_VALUES = { '7': 7, '8': 8, '9': 9, '10': 10, 'J': 11, 'Q': 12, 'K': 13, 'A': 14 };

    let deck = [], players = [], currentPlayerIndex = 0, pot = 0, tableCards = [];

    function createDeck() {
        deck = [];
        for (let suit of SUITS) for (let rank of RANKS) deck.push({ rank, suit });
    }

    function shuffleDeck() {
        for (let i = deck.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [deck[i], deck[j]] = [deck[j], deck[i]];
        }
    }

    function addLog(msg, color = 'var(--text-dark)') {
        const log = document.getElementById('game-log');
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.style.color = color;
        entry.textContent = `• ${msg}`;
        log.prepend(entry);
    }

    function updateUI() {
        const human = players.find(p => p.type === 'human');
        if (human) document.getElementById('player-money').textContent = human.money + " ,-";
        document.getElementById('pot-display').textContent = pot + " ,-";
        document.getElementById('turn-indicator').textContent = `Hraje: ${players[currentPlayerIndex].name}`;
        
        const controls = document.getElementById('game-controls');
        const isHuman = players[currentPlayerIndex].type === 'human';
        controls.querySelectorAll('button, input').forEach(el => el.disabled = !isHuman);
    }

    function startGame(npcCount) {
        const pName = document.getElementById('player-name').value.trim() || "Ty";
        players = [{ name: pName, money: 500, type: 'human' }];
        for (let i = 1; i <= npcCount; i++) players.push({ name: `Štamgast ${i}`, money: 500, type: 'npc' });
        document.getElementById('setup-screen').classList.add('hidden');
        newRound();
    }

    function newRound() {
        if (pot === 0) {
            players.forEach(p => { p.money -= 20; pot += 20; });
            addLog("Každý vsadil 20 do společného banku.");
        }
        createDeck(); shuffleDeck(); startTurn();
    }

    function startTurn() {
        document.getElementById('card1').innerHTML = '';
        document.getElementById('card2').innerHTML = '';
        document.getElementById('card3').innerHTML = '';
        
        tableCards = [deck.pop(), deck.pop()];
        tableCards.sort((a, b) => RANK_VALUES[a.rank] - RANK_VALUES[b.rank]);
        
        setTimeout(() => renderCard('card1', tableCards[0]), 200);
        setTimeout(() => renderCard('card2', tableCards[1]), 400);
        
        updateUI();
        if (players[currentPlayerIndex].type === 'npc') setTimeout(npcAction, 1500);
    }

    function renderCard(slotId, card) {
        const slot = document.getElementById(slotId);
        const img = document.createElement('img');
        img.src = IMAGE_URLS[`${card.rank}_${card.suit}`] || IMAGE_URLS["back"];
        img.className = 'card-img';
        slot.innerHTML = ''; slot.appendChild(img);
    }

    function playTurn() {
        const betInput = document.getElementById('bet-amount');
        let bet = parseInt(betInput.value);
        const player = players[currentPlayerIndex];

        if (isNaN(bet) || bet <= 0) return;
        if (bet > player.money || bet > pot) {
            addLog("Tolik u sebe nemáš nebo víc než je v banku!");
            return;
        }

        evaluateTurn(bet);
        betInput.value = '';
    }

    function passTurn() {
        addLog(`${players[currentPlayerIndex].name} se tentokrát bojí a pasuje.`);
        nextPlayer();
    }

    function evaluateTurn(bet) {
        const player = players[currentPlayerIndex];
        const card3 = deck.pop();
        renderCard('card3', card3);

        const v1 = RANK_VALUES[tableCards[0].rank], v2 = RANK_VALUES[tableCards[1].rank], v3 = RANK_VALUES[card3.rank];

        setTimeout(() => {
            if (v3 > v1 && v3 < v2) {
                player.money += bet; pot -= bet;
                addLog(`${player.name} trefil mezeru a bere ${bet} ,-`, '#2e7d32');
            } else if (v3 === v1 || v3 === v2) {
                player.money -= bet * 2; pot += bet * 2;
                addLog(`${player.name} trefil KOZU! Platí dvojnásob (${bet*2})!`, '#c62828');
            } else {
                player.money -= bet; pot += bet;
                addLog(`${player.name} netrefil a prohrává ${bet} ,-`, '#c62828');
            }
            
            if (pot <= 0) { pot = 0; addLog("Bank byl vybrán! Příště musíme znova vsadit."); }
            checkElimination();
        }, 800);
    }

    function checkElimination() {
        players = players.filter(p => p.money > 0);
        if (players.length === 1 && players[0].type === 'human') {
            alert("Gratulujeme! Vybílil jsi celou hospodu!");
            location.reload();
        } else if (players.find(p => p.type === 'human') === undefined) {
            alert("Došly ti prachy! Hostinský tě vyprovodil ke dveřím.");
            location.reload();
        } else {
            nextPlayer();
        }
    }

    function nextPlayer() {
        currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
        if (deck.length < 5) newRound(); else startTurn();
    }

    function npcAction() {
        const npc = players[currentPlayerIndex];
        const gap = RANK_VALUES[tableCards[1].rank] - RANK_VALUES[tableCards[0].rank];
        // Štamgast hraje, jen když je šance (mezera aspoň 3 karty)
        if (gap > 3) {
            const bet = Math.min(Math.floor(npc.money * 0.2), pot);
            addLog(`${npc.name} sází ${bet} ,-`);
            evaluateTurn(bet);
        } else {
            passTurn();
        }
    }
</script>
</body>
</html>
