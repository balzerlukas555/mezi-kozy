<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/8294/8294512.png">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/8294/8294512.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mezi Kozy</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #1a472a; /* Jednoduchá zelená jako plátno */
            color: white;
            text-align: center;
            overflow-x: hidden;
        }

        /* ===== OBRAZOVKY ===== */
        #startScreen, #endScreen {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.85);
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            z-index: 100;
        }

        .card-ui {
            background: white;
            color: #222;
            padding: 30px;
            border-radius: 12px;
            width: 85%;
            max-width: 320px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .btn-main {
            width: 100%;
            padding: 12px;
            background: #c40000;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            text-transform: uppercase;
        }

        /* ===== STAV PENĚZ SOUPEŘŮ ===== */
        #playersRow {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.2);
        }

        .player-box {
            padding: 8px 12px;
            background: rgba(0,0,0,0.4);
            border-radius: 6px;
            min-width: 80px;
            border: 2px solid transparent;
            font-size: 0.9rem;
        }

        .active-player {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.1);
        }

        /* ===== Hrací plocha ===== */
        .pot-area {
            margin: 15px 0;
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffd700;
        }

        #cardsArea {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .player-cards-container {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 10px;
            width: 95%;
            max-width: 450px;
        }

        .card-row {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 5px;
        }

        .card {
            width: 70px;
            height: 105px;
            background: rgba(0,0,0,0.2);
            border-radius: 4px;
            border: 1px dashed rgba(255,255,255,0.2);
        }

        .card img {
            width: 100%;
            height: 100%;
            border-radius: 4px;
            display: block;
        }

        /* ===== OVLÁDÁNÍ ===== */
        #actions {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            position: sticky;
            bottom: 0;
        }

        input[type="number"] {
            padding: 10px;
            width: 100px;
            border-radius: 4px;
            border: 1px solid #ccc;
            font-size: 1.1rem;
            margin-bottom: 10px;
            text-align: center;
        }

        .game-btn {
            padding: 10px 18px;
            font-weight: bold;
            margin: 4px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: white;
            text-transform: uppercase;
        }

        #nextBtn {
            background: #444;
            width: 80%;
            max-width: 300px;
            margin: 10px auto;
            display: block;
        }
        #nextBtn.active { background: #2e7d32; }

        #log {
            padding: 10px;
            height: 40px;
            color: #ffd700;
            font-style: italic;
        }
    </style>
</head>
<body>

<div id="startScreen">
    <div class="card-ui">
        <h2 style="margin-top:0">Mezi Kozy</h2>
        <input type="text" id="playerName" placeholder="Tvé jméno" style="width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;">
        <button id="startBtn" class="btn-main">VSTOUPIT DO HRY</button>
    </div>
</div>

<div id="endScreen" style="display:none;">
    <div class="card-ui">
        <h1 id="endTitle"></h1>
        <p id="endMsg"></p>
        <button onclick="location.reload()" class="btn-main">HRÁT ZNOVU</button>
    </div>
</div>

<div id="game" style="display:none;">
    <div id="playersRow"></div>
    
    <div class="pot-area">BANK: <span id="pot">0</span> Kč</div>
    
    <div id="log"></div>

    <div id="cardsArea"></div>

    <button id="nextBtn" class="game-btn">DALŠÍ KOLO</button>

    <div id="actions" style="display:none;">
        <input type="number" id="bet" value="50" step="10"> <br>
        <button id="playBtn" class="game-btn" style="background:#c40000;">VSADIT</button>
        <button id="allInBtn" class="game-btn" style="background:#ffd700; color: #000;">ALL-IN</button>
        <button id="passBtn" class="game-btn" style="background:#666;">PAS</button>
    </div>
</div>

<script>
// KONFIGURACE ODKAZŮ
const IMAGE_URLS = {
    "7_K": "https://hra-lora.cz/assets/cardsmini/7_d.jpg", "8_K": "https://hra-lora.cz/assets/cardsmini/8_d.jpg", "9_K": "https://hra-lora.cz/assets/cardsmini/9_d.jpg", "10_K": "https://hra-lora.cz/assets/cardsmini/t_d.jpg", "J_K": "https://hra-lora.cz/assets/cardsmini/j_d.jpg", "Q_K": "https://hra-lora.cz/assets/cardsmini/q_d.jpg", "K_K": "https://hra-lora.cz/assets/cardsmini/k_d.jpg", "A_K": "https://hra-lora.cz/assets/cardsmini/a_d.jpg",
    "7_Z": "https://hra-lora.cz/assets/cardsmini/7_s.jpg", "8_Z": "https://hra-lora.cz/assets/cardsmini/8_s.jpg", "9_Z": "https://hra-lora.cz/assets/cardsmini/9_s.jpg", "10_Z": "https://hra-lora.cz/assets/cardsmini/t_s.jpg", "J_Z": "https://hra-lora.cz/assets/cardsmini/j_s.jpg", "Q_Z": "https://hra-lora.cz/assets/cardsmini/q_s.jpg", "K_Z": "https://hra-lora.cz/assets/cardsmini/k_s.jpg", "A_Z": "https://hra-lora.cz/assets/cardsmini/a_s.jpg",
    "7_C": "https://hra-lora.cz/assets/cardsmini/7_h.jpg", "8_C": "https://hra-lora.cz/assets/cardsmini/8_h.jpg", "9_C": "https://hra-lora.cz/assets/cardsmini/9_h.jpg", "10_C": "https://hra-lora.cz/assets/cardsmini/t_h.jpg", "J_C": "https://hra-lora.cz/assets/cardsmini/j_h.jpg", "Q_C": "https://hra-lora.cz/assets/cardsmini/q_h.jpg", "K_C": "https://hra-lora.cz/assets/cardsmini/k_h.jpg", "A_C": "https://hra-lora.cz/assets/cardsmini/a_h.jpg",
    "7_ZL": "https://hra-lora.cz/assets/cardsmini/7_c.jpg", "8_ZL": "https://hra-lora.cz/assets/cardsmini/8_c.jpg", "9_ZL": "https://hra-lora.cz/assets/cardsmini/9_c.jpg", "10_ZL": "https://hra-lora.cz/assets/cardsmini/t_c.jpg", "J_ZL": "https://hra-lora.cz/assets/cardsmini/j_c.jpg", "Q_ZL": "https://hra-lora.cz/assets/cardsmini/q_c.jpg", "K_ZL": "https://hra-lora.cz/assets/cardsmini/k_c.jpg", "A_ZL": "https://hra-lora.cz/assets/cardsmini/a_c.jpg",
    "back": "https://hra-lora.cz/assets/cardsmini/back.jpg"
};

const maleNames = ["Mirek", "Karel", "Pepa", "Milan", "Jarda", "Honza", "Franta", "Láďa", "Tonda", "Petr", "Pavel", "Aleš", "Radek", "Dan", "Vašek"];
const femaleNames = ["Jana", "Hanka", "Alena", "Iva", "Lucka"];
const ranks = ["7", "8", "9", "10", "J", "Q", "K", "A"];
const suits = ["Z", "C", "K", "ZL"];

let state;
let roundOver = true;
const $ = id => document.getElementById(id);
const delay = ms => new Promise(r => setTimeout(r, ms));

function createDeck() {
    let d = [];
    for (let s of suits) for (let r of ranks) d.push({ suit: s, rank: r });
    return d.sort(() => Math.random() - 0.5);
}

function getRandomNPCName() {
    const all = [...maleNames, ...femaleNames];
    return all[Math.floor(Math.random() * all.length)];
}

function updateUI() {
    $('pot').innerText = state.pot;
    let html = "";
    state.players.forEach((p, i) => {
        let active = state.currentTurn === i ? "active-player" : "";
        html += `<div class="player-box ${active}">
            <strong>${p.name}</strong><br>${p.bal > 0 ? p.bal + ' Kč' : 'K.O.'}
        </div>`;
    });
    $('playersRow').innerHTML = html;
}

function renderCardsArea() {
    let html = "";
    state.players.forEach((p, i) => {
        if (p.bal <= 0) return;
        html += `<div class="player-cards-container">
            <div style="font-size:0.8rem; opacity:0.7">${p.name}</div>
            <div class="card-row">
                <div id="p${i}_c1" class="card"></div>
                <div id="p${i}_ct" class="card" style="border-style:solid; border-color:#ffd700"></div>
                <div id="p${i}_c2" class="card"></div>
            </div>
        </div>`;
    });
    $('cardsArea').innerHTML = html;
}

function renderCard(id, card) {
    const el = $(id);
    if (!el) return;
    el.innerHTML = card ? `<img src="${IMAGE_URLS[card.rank + '_' + card.suit] || IMAGE_URLS.back}">` : "";
}

function startGame() {
    let pName = $('playerName').value.trim() || "Ty";
    
    // Vybereme dvě náhodná různá jména pro NPC
    let names = [...maleNames, ...femaleNames].sort(() => 0.5 - Math.random());

    state = {
        deck: createDeck(),
        pot: 0,
        currentTurn: null,
        players: [
            { name: names[0], bal: 1000, isNPC: true },
            { name: pName, bal: 1000, isNPC: false },
            { name: names[1], bal: 1000, isNPC: true }
        ]
    };

    $('startScreen').style.display = "none";
    $('game').style.display = "block";
    startRound();
}

async function startRound() {
    if (!roundOver) return;
    
    // Kontrola konce hry
    if (state.players[1].bal <= 0) return showEnd(false);
    if (state.players[0].bal <= 0 && state.players[2].bal <= 0) return showEnd(true);

    roundOver = false;
    $('nextBtn').classList.remove("active");
    $('log').innerText = "Všichni vkládají 20 Kč...";
    state.deck = createDeck();
    
    // Povinný vklad
    state.players.forEach(p => {
        if (p.bal > 0) {
            let fee = Math.min(p.bal, 20);
            p.bal -= fee;
            state.pot += fee;
        }
    });

    updateUI();
    renderCardsArea();

    for (let i = 0; i < state.players.length; i++) {
        if (state.players[i].bal <= 0) continue;
        state.currentTurn = i;
        updateUI();
        await turn(i);
        if (state.pot <= 0) break;
    }

    roundOver = true;
    $('nextBtn').classList.add("active");
    state.currentTurn = null;
    updateUI();
}

async function turn(i) {
    let p = state.players[i];
    let c1 = state.deck.pop();
    let c2 = state.deck.pop();
    renderCard(`p${i}_c1`, c1);
    renderCard(`p${i}_c2`, c2);
    
    await delay(600);

    let v1 = ranks.indexOf(c1.rank);
    let v2 = ranks.indexOf(c2.rank);

    if (v1 === v2) {
        $('log').innerText = `${p.name} má stejné karty a platí 50 Kč!`;
        p.bal -= 50; state.pot += 50;
        updateUI();
        await delay(800);
        return;
    }

    if (p.isNPC) {
        let min = Math.min(v1, v2);
        let max = Math.max(v1, v2);
        let gap = max - min;
        
        if (gap >= 2 && Math.random() > 0.3) {
            let bet = Math.min(Math.floor(p.bal * 0.1) + (gap * 20), p.bal, state.pot);
            $('log').innerText = `${p.name} sází ${bet} Kč`;
            await evaluate(p, i, v1, v2, bet);
        } else {
            $('log').innerText = `${p.name} pasuje`;
            await delay(800);
        }
    } else {
        await new Promise(resolve => {
            $('actions').style.display = "block";
            $('log').innerText = "Tvé karty. Kolik vsadíš?";
            
            $('playBtn').onclick = async () => {
                let bet = Math.min(parseInt($('bet').value) || 0, p.bal, state.pot);
                if (bet <= 0) return;
                $('actions').style.display = "none";
                await evaluate(p, i, v1, v2, bet);
                resolve();
            };
            $('allInBtn').onclick = async () => {
                let bet = Math.min(p.bal, state.pot);
                $('actions').style.display = "none";
                await evaluate(p, i, v1, v2, bet);
                resolve();
            };
            $('passBtn').onclick = () => {
                $('actions').style.display = "none";
                $('log').innerText = "Pasoval jsi.";
                resolve();
            };
        });
    }
}

async function evaluate(p, i, v1, v2, bet) {
    let t = state.deck.pop();
    renderCard(`p${i}_ct`, t);
    await delay(800);

    let min = Math.min(v1, v2);
    let max = Math.max(v1, v2);
    let val = ranks.indexOf(t.rank);

    if (val > min && val < max) {
        p.bal += bet; state.pot -= bet;
        $('log').innerText = `Trefa! ${p.name} bere ${bet} Kč.`;
    } else if (val === min || val === max) {
        let penalty = bet * 2;
        p.bal -= penalty; state.pot += penalty;
        $('log').innerText = `KOZA! ${p.name} platí ${penalty} Kč.`;
    } else {
        p.bal -= bet; state.pot += bet;
        $('log').innerText = `Mimo. ${p.name} ztrácí ${bet} Kč.`;
    }
    updateUI();
    await delay(1000);
}

function showEnd(win) {
    $('endScreen').style.display = "flex";
    $('endTitle').innerText = win ? "Vítězství!" : "Bankrot!";
    $('endMsg').innerText = win ? "Oškubal jsi soupeře a ovládl stůl." : "Všechny jsi nechal v banku.";
}

$('startBtn').onclick = startGame;
$('nextBtn').onclick = startRound;
</script>
</body>
</html>
