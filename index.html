<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mezi Kozy - Karetní hra</title>

    <link rel="apple-touch-icon" href="SEM_VLOZ_ODKAZ_NA_IKONKU">
    <link rel="icon" type="image/png" href="SEM_VLOZ_ODKAZ_NA_IKONKU">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent: #bb86fc;
            --text-main: #e0e0e0;
            --text-dim: #a0a0a0;
            --green: #03dac6;
            --red: #cf6679;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }
        h1 { margin: 10px 0; font-size: 1.8rem; color: var(--accent); text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .game-container { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 15px; }
        .section { background: var(--card-bg); padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 1px solid #333; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .stat-item { background: #252525; padding: 10px; border-radius: 8px; text-align: center; }
        .stat-label { font-size: 0.8rem; color: var(--text-dim); display: block; margin-bottom: 4px; }
        .stat-value { font-size: 1.1rem; font-weight: bold; color: var(--green); }
        .table-area { display: flex; justify-content: center; gap: 15px; margin: 20px 0; perspective: 1000px; min-height: 150px; }
        .card-slot { width: 90px; height: 135px; border: 2px dashed #444; border-radius: 8px; position: relative; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.02); }
        .card-img { width: 100%; height: 100%; border-radius: 6px; object-fit: cover; box-shadow: 0 4px 8px rgba(0,0,0,0.5); animation: flipIn 0.5s ease-out; }
        @keyframes flipIn { from { transform: rotateY(90deg); opacity: 0; } to { transform: rotateY(0deg); opacity: 1; } }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input[type="number"] { background: #2c2c2c; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; font-size: 1rem; width: 100%; outline: none; }
        button { background: var(--accent); color: black; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: transform 0.1s, filter 0.2s; font-size: 1rem; }
        button:active { transform: scale(0.95); }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        .full-width { grid-column: span 2; }
        .log { height: 120px; overflow-y: auto; font-size: 0.85rem; padding: 10px; background: #000; border-radius: 8px; color: #0f0; font-family: 'Courier New', monospace; border: 1px solid #333; }
        .log-entry { margin-bottom: 4px; border-bottom: 1px solid #111; padding-bottom: 2px; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
        .modal-content { background: var(--card-bg); padding: 25px; border-radius: 15px; text-align: center; max-width: 400px; width: 100%; border: 1px solid var(--accent); }
        .hidden { display: none; }
        @media (max-width: 768px) { .card-slot { width: 75px; height: 112px; } .table-area { min-height: 125px; } }
    </style>
</head>
<body>

<h1>Mezi Kozy</h1>

<div id="setup-screen" class="modal">
    <div class="modal-content">
        <h2>Nové posezení</h2>
        <p style="color: var(--text-dim);">Zadej své jméno a počet soupeřů</p>
        <input type="text" id="player-name" placeholder="Tvé jméno" style="width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #444; background: #2c2c2c; color: white;">
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button onclick="startGame(1)" style="flex: 1;">1 Protivník</button>
            <button onclick="startGame(2)" style="flex: 1;">2 Protivníci</button>
        </div>
    </div>
</div>

<div class="game-container">
    <div class="section">
        <div class="stats-grid">
            <div class="stat-item"><span class="stat-label">V Banku</span><span id="pot-display" class="stat-value">0</span></div>
            <div class="stat-item"><span class="stat-label">Tvůj Kapitál</span><span id="player-money" class="stat-value">0</span></div>
        </div>
        <div id="turn-indicator" style="text-align: center; font-weight: bold; color: var(--accent);">Na řadě: -</div>
    </div>

    <div class="table-area">
        <div class="card-slot" id="card1"></div>
        <div class="card-slot" id="card3" style="border-style: solid; border-color: var(--accent); transform: scale(1.1); margin: 0 10px; z-index: 2;"></div>
        <div class="card-slot" id="card2"></div>
    </div>

    <div class="section controls" id="game-controls">
        <input type="number" id="bet-amount" placeholder="Sázka..." min="1">
        <button onclick="playTurn()" id="bet-btn">Vsadit</button>
        <button onclick="passTurn()" id="pass-btn" style="background: var(--red);">Nehrát</button>
    </div>

    <div class="section">
        <div id="game-log" class="log"></div>
    </div>
</div>

<script>
    // ==========================================
    // NASTAVENÍ ODKAZŮ NA OBRÁZKY
    // ==========================================
    const IMAGE_URLS = {
        // Barvy: C = Červené, Z = Zelené, K = Kule, ZL = Žaludy
        "7_C": "ODKAZ_ZDE", "8_C": "ODKAZ_ZDE", "9_C": "ODKAZ_ZDE", "10_C": "ODKAZ_ZDE", "J_C": "ODKAZ_ZDE", "Q_C": "ODKAZ_ZDE", "K_C": "ODKAZ_ZDE", "A_C": "ODKAZ_ZDE",
        "7_Z": "ODKAZ_ZDE", "8_Z": "ODKAZ_ZDE", "9_Z": "ODKAZ_ZDE", "10_Z": "ODKAZ_ZDE", "J_Z": "ODKAZ_ZDE", "Q_Z": "ODKAZ_ZDE", "K_Z": "ODKAZ_ZDE", "A_Z": "ODKAZ_ZDE",
        "7_K": "ODKAZ_ZDE", "8_K": "ODKAZ_ZDE", "9_K": "ODKAZ_ZDE", "10_K": "ODKAZ_ZDE", "J_K": "ODKAZ_ZDE", "Q_K": "ODKAZ_ZDE", "K_K": "ODKAZ_ZDE", "A_K": "ODKAZ_ZDE",
        "7_ZL": "ODKAZ_ZDE", "8_ZL": "ODKAZ_ZDE", "9_ZL": "ODKAZ_ZDE", "10_ZL": "ODKAZ_ZDE", "J_ZL": "ODKAZ_ZDE", "Q_ZL": "ODKAZ_ZDE", "K_ZL": "ODKAZ_ZDE", "A_ZL": "ODKAZ_ZDE",
        
        "back": "SEM_VLOZ_ODKAZ_NA_ZADNI_STRANU_KARTY",
        "icon": "SEM_VLOZ_ODKAZ_NA_IKONKU_APLIKACE"
    };

    // Logika hry
    const SUITS = ['C', 'Z', 'K', 'ZL'];
    const RANKS = ['7', '8', '9', '10', 'J', 'Q', 'K', 'A'];
    const RANK_VALUES = { '7': 7, '8': 8, '9': 9, '10': 10, 'J': 11, 'Q': 12, 'K': 13, 'A': 14 };

    let deck = [];
    let players = [];
    let currentPlayerIndex = 0;
    let pot = 0;
    let tableCards = [];

    function createDeck() {
        deck = [];
        for (let suit of SUITS) {
            for (let rank of RANKS) {
                deck.push({ rank, suit });
            }
        }
    }

    function shuffleDeck() {
        for (let i = deck.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [deck[i], deck[j]] = [deck[j], deck[i]];
        }
    }

    function addLog(msg, color = 'var(--text-main)') {
        const log = document.getElementById('game-log');
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.style.color = color;
        entry.textContent = `> ${msg}`;
        log.prepend(entry);
    }

    function updateUI() {
        const human = players.find(p => p.type === 'human');
        if (human) document.getElementById('player-money').textContent = human.money;
        document.getElementById('pot-display').textContent = pot;
        document.getElementById('turn-indicator').textContent = `Na řadě: ${players[currentPlayerIndex].name}`;
        
        const controls = document.getElementById('game-controls');
        if (players[currentPlayerIndex].type === 'human') {
            controls.querySelectorAll('button, input').forEach(el => el.disabled = false);
        } else {
            controls.querySelectorAll('button, input').forEach(el => el.disabled = true);
        }
    }

    function startGame(npcCount) {
        const nameInput = document.getElementById('player-name').value.trim();
        const pName = nameInput || "Hráč";
        
        players = [{ name: pName, money: 1000, type: 'human' }];
        for (let i = 1; i <= npcCount; i++) {
            players.push({ name: `NPC ${i}`, money: 1000, type: 'npc' });
        }
        
        document.getElementById('setup-screen').classList.add('hidden');
        newRound();
    }

    function newRound() {
        if (pot === 0) {
            players.forEach(p => { p.money -= 10; pot += 10; });
            addLog("Všichni vložili 10 do banku.", 'var(--text-dim)');
        }
        createDeck();
        shuffleDeck();
        startTurn();
    }

    function startTurn() {
        document.getElementById('card1').innerHTML = '';
        document.getElementById('card2').innerHTML = '';
        document.getElementById('card3').innerHTML = '';
        
        tableCards = [deck.pop(), deck.pop()];
        tableCards.sort((a, b) => RANK_VALUES[a.rank] - RANK_VALUES[b.rank]);
        
        renderCard('card1', tableCards[0]);
        renderCard('card2', tableCards[1]);
        
        updateUI();
        if (players[currentPlayerIndex].type === 'npc') {
            setTimeout(npcAction, 1500);
        }
    }

    function renderCard(slotId, card) {
        const slot = document.getElementById(slotId);
        const img = document.createElement('img');
        const key = `${card.rank}_${card.suit}`;
        img.src = IMAGE_URLS[key] !== "ODKAZ_ZDE" ? IMAGE_URLS[key] : IMAGE_URLS["back"];
        img.className = 'card-img';
        img.alt = key;
        slot.innerHTML = '';
        slot.appendChild(img);
    }

    function playTurn() {
        const betInput = document.getElementById('bet-amount');
        let bet = parseInt(betInput.value);
        const player = players[currentPlayerIndex];

        if (isNaN(bet) || bet <= 0) { addLog("Zadej platnou sázku!"); return; }
        if (bet > player.money) { addLog("Nemáš dost peněz!"); return; }
        if (bet > pot) { addLog("V banku je jen " + pot); return; }

        evaluateTurn(bet);
        betInput.value = '';
    }

    function passTurn() {
        addLog(`${players[currentPlayerIndex].name} se hry neúčastní.`);
        nextPlayer();
    }

    function evaluateTurn(bet) {
        const player = players[currentPlayerIndex];
        const card3 = deck.pop();
        renderCard('card3', card3);

        const v1 = RANK_VALUES[tableCards[0].rank];
        const v2 = RANK_VALUES[tableCards[1].rank];
        const v3 = RANK_VALUES[card3.rank];

        setTimeout(() => {
            if (v3 > v1 && v3 < v2) {
                player.money += bet;
                pot -= bet;
                addLog(`${player.name} vyhrál ${bet}!`, 'var(--green)');
            } else if (v3 === v1 || v3 === v2) {
                const penalty = bet * 2;
                player.money -= penalty;
                pot += penalty;
                addLog(`${player.name} trefil KOZU! Platí ${penalty}.`, 'var(--red)');
            } else {
                player.money -= bet;
                pot += bet;
                addLog(`${player.name} prohrál ${bet}.`, 'var(--red)');
            }
            
            if (pot <= 0) {
                addLog("Bank je prázdný, začíná nové kolo!");
                pot = 0;
            }
            
            checkElimination();
        }, 1000);
    }

    function checkElimination() {
        players = players.filter(p => {
            if (p.money <= 0) {
                addLog(`${p.name} zbankrotoval!`, 'orange');
                return false;
            }
            return true;
        });

        if (players.length === 1) {
            alert("Konec hry! Vítěz: " + players[0].name);
            location.reload();
        } else {
            nextPlayer();
        }
    }

    function nextPlayer() {
        currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
        if (deck.length < 5) newRound();
        else startTurn();
    }

    function npcAction() {
        const npc = players[currentPlayerIndex];
        const v1 = RANK_VALUES[tableCards[0].rank];
        const v2 = RANK_VALUES[tableCards[1].rank];
        const gap = v2 - v1;

        if (gap > 3) {
            const bet = Math.min(Math.floor(npc.money * 0.2), pot);
            addLog(`${npc.name} sází ${bet}.`);
            evaluateTurn(bet);
        } else {
            passTurn();
        }
    }
</script>

</body>
</html>
