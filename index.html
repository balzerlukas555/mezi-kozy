<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mezi Kozy - Profi Edition</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/8294/8294512.png">
    <style>
        :root {
            --primary-green: #0b4d1a;
            --gold: #ffd700;
            --card-w: 90px;
            --card-h: 150px;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--primary-green);
            color: white;
            text-align: center;
            overflow-x: hidden;
        }

        /* OBRAZOVKY */
        #startScreen, #endScreen {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.92);
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            z-index: 100;
        }

        .card-ui {
            background: #fdfdfd;
            color: #222;
            padding: 25px;
            border-radius: 12px;
            width: 85%;
            max-width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .btn-main {
            width: 100%;
            padding: 12px;
            background: #c40000;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .btn-main:hover { background: #e60000; }

        /* NASTAVENÍ */
        #settingsToggle {
            margin-top: 15px;
            font-size: 0.85rem;
            color: #666;
            cursor: pointer;
            text-decoration: underline;
            display: block;
        }

        #settingsBox {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
            display: none;
            text-align: left;
        }

        .setting-item { margin-bottom: 12px; }
        .setting-item label { display: block; font-size: 0.75rem; font-weight: bold; margin-bottom: 4px; color: #444; }
        
        select, input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        /* HERNÍ PLOCHA (Zmenšená) */
        #playersRow {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            padding: 8px;
            background: rgba(0,0,0,0.4);
        }

        .player-box {
            padding: 6px 10px;
            background: #1a1a1a;
            border-radius: 8px;
            min-width: 80px;
            border: 2px solid transparent;
            font-size: 0.75rem;
        }

        .active-player { border-color: var(--gold); color: var(--gold); }

        #potArea { margin: 10px 0; color: var(--gold); font-size: 1.1rem; }

        #msg { height: 1.2em; font-weight: bold; color: var(--gold); font-size: 0.9rem; margin-bottom: 10px; }

        /* KARTY (Kompaktní) */
        #cardsArea {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 80px; /* místo pro fixní ovládání */
        }

        .player-row-ui {
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            padding: 8px;
            width: 95%;
            max-width: 500px;
        }

        .card-row {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-top: 5px;
        }

        .card img {
            width: var(--card-w);
            height: var(--card-h);
            border-radius: 6px;
            background: #082b0f;
            box-shadow: 0 3px 8px rgba(0,0,0,0.3);
        }

        .shuffling { animation: shake 0.4s infinite; }
        @keyframes shake {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(-1deg); }
            75% { transform: rotate(1deg); }
        }

        /* FIXNÍ OVLÁDÁNÍ */
        #actions {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            box-sizing: border-box;
            backdrop-filter: blur(5px);
            display: none;
        }

        .game-btn {
            padding: 10px 15px;
            font-size: 0.8rem;
            margin: 3px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        #nextBtn { background: #444; color: white; display: none; margin: 10px auto; width: 150px; }
        #nextBtn.active { background: #c40000; display: block; }

        @media (max-width: 600px) {
            :root {
                --card-w: 65px;
                --card-h: 108px;
            }
            .player-box { min-width: 65px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>

<div id="startScreen">
    <div class="card-ui">
        <h1 style="color:var(--primary-green); margin:0 0 10px 0; font-size: 1.5rem;">Mezi Kozy</h1>
        <input type="text" id="playerName" placeholder="Tvé jméno..." style="margin-bottom:10px;">
        <button id="startBtn" class="btn-main">VSTOUPIT DO HRY</button>
        
        <span id="settingsToggle" onclick="document.getElementById('settingsBox').style.display='block'">⚙️ Nastavení</span>
        
        <div id="settingsBox">
            <div class="setting-item">
                <label>Počet protihráčů:</label>
                <select id="npcCount">
                    <option value="1">1 Protihráč</option>
                    <option value="2" selected>2 Protihráči</option>
                    <option value="3">3 Protihráči</option>
                </select>
            </div>
            <div class="setting-item">
                <label>Počáteční peníze (pro všechny):</label>
                <input type="number" id="startMoney" value="1000" min="100">
            </div>
        </div>
    </div>
</div>

<div id="endScreen" style="display:none;">
    <div class="card-ui">
        <h1 id="endTitle"></h1>
        <p id="endMsg"></p>
        <button onclick="location.reload()" class="btn-main">HRÁT ZNOVU</button>
    </div>
</div>

<div id="game" style="display:none;">
    <div id="playersRow"></div>
    <div id="potArea">BANK: <strong id="pot">0</strong> Kč</div>
    <div id="msg"></div>
    
    <div id="cardsArea"></div>

    <button id="nextBtn" class="game-btn active">DALŠÍ KOLO</button>

    <div id="actions">
        <input type="number" id="bet" value="50" min="10" step="10" style="width:80px; text-align:center; margin-bottom:5px;"> <br>
        <button id="playBtn" class="game-btn" style="background:#c40000; color:white;">VSADIT</button>
        <button id="allInBtn" class="game-btn" style="background:var(--gold); color:black;">ALL IN</button>
        <button id="passBtn" class="game-btn" style="background:#666; color:white;">PAS</button>
    </div>
</div>

<script>
    const IMAGE_URLS = {
        "7_K": "https://hra-lora.cz/assets/cardsmini/7_d.jpg", "8_K": "https://hra-lora.cz/assets/cardsmini/8_d.jpg", "9_K": "https://hra-lora.cz/assets/cardsmini/9_d.jpg", "10_K": "https://hra-lora.cz/assets/cardsmini/t_d.jpg", "J_K": "https://hra-lora.cz/assets/cardsmini/j_d.jpg", "Q_K": "https://hra-lora.cz/assets/cardsmini/q_d.jpg", "K_K": "https://hra-lora.cz/assets/cardsmini/k_d.jpg", "A_K": "https://hra-lora.cz/assets/cardsmini/a_d.jpg",
        "7_Z": "https://hra-lora.cz/assets/cardsmini/7_s.jpg", "8_Z": "https://hra-lora.cz/assets/cardsmini/8_s.jpg", "9_Z": "https://hra-lora.cz/assets/cardsmini/9_s.jpg", "10_Z": "https://hra-lora.cz/assets/cardsmini/t_s.jpg", "J_Z": "https://hra-lora.cz/assets/cardsmini/j_s.jpg", "Q_Z": "https://hra-lora.cz/assets/cardsmini/q_s.jpg", "K_Z": "https://hra-lora.cz/assets/cardsmini/k_s.jpg", "A_Z": "https://hra-lora.cz/assets/cardsmini/a_s.jpg",
        "7_C": "https://hra-lora.cz/assets/cardsmini/7_h.jpg", "8_C": "https://hra-lora.cz/assets/cardsmini/8_h.jpg", "9_C": "https://hra-lora.cz/assets/cardsmini/9_h.jpg", "10_C": "https://hra-lora.cz/assets/cardsmini/t_h.jpg", "J_C": "https://hra-lora.cz/assets/cardsmini/j_h.jpg", "Q_C": "https://hra-lora.cz/assets/cardsmini/q_h.jpg", "K_C": "https://hra-lora.cz/assets/cardsmini/k_h.jpg", "A_C": "https://hra-lora.cz/assets/cardsmini/a_h.jpg",
        "7_ZL": "https://hra-lora.cz/assets/cardsmini/7_c.jpg", "8_ZL": "https://hra-lora.cz/assets/cardsmini/8_c.jpg", "9_ZL": "https://hra-lora.cz/assets/cardsmini/9_c.jpg", "10_ZL": "https://hra-lora.cz/assets/cardsmini/t_c.jpg", "J_ZL": "https://hra-lora.cz/assets/cardsmini/j_c.jpg", "Q_ZL": "https://hra-lora.cz/assets/cardsmini/q_c.jpg", "K_ZL": "https://hra-lora.cz/assets/cardsmini/k_c.jpg", "A_ZL": "https://hra-lora.cz/assets/cardsmini/a_c.jpg",
        "back": "https://hra-lora.cz/assets/cardsmini/back.jpg"
    };

    const ranks = ["7", "8", "9", "10", "J", "Q", "K", "A"];
    const suits = ["Z", "C", "K", "ZL"];
    const namesPool = ["Mirek", "Karel", "Pepa", "Honza", "Milan", "Jana", "Hanka", "Láďa", "Iva", "Petr", "Dan", "Lucka", "Alena", "Vašek", "Radek"];

    let state;
    let roundOver = true;
    let isFirstRound = true;

    const $ = id => document.getElementById(id);
    const delay = ms => new Promise(r => setTimeout(r, ms));

    function shuffle(deck) {
        for (let i = deck.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [deck[i], deck[j]] = [deck[j], deck[i]];
        }
        return deck;
    }

    function createDeck() {
        let deck = [];
        for (let s of suits) for (let r of ranks) deck.push({ suit: s, rank: r });
        return shuffle(deck);
    }

    function updateUI() {
        $('pot').innerText = state.pot;
        let html = "";
        state.players.forEach((p, idx) => {
            let active = state.currentTurn === idx ? "active-player" : "";
            html += `<div class="player-box ${active}"><strong>${p.name}</strong><br>${p.bal > 0 ? p.bal : 'OUT'}</div>`;
        });
        $('playersRow').innerHTML = html;
    }

    function renderCardsArea() {
        let html = "";
        state.players.forEach((p, i) => {
            if (p.bal <= 0) return;
            html += `<div class="player-row-ui" id="ui_${i}">
                <div style="font-size:0.7rem; opacity:0.6;">${p.name}</div>
                <div class="card-row">
                    <div id="p${i}_c1" class="card"></div>
                    <div id="p${i}_ct" class="card" style="border:1px solid var(--gold); border-radius:6px;"></div>
                    <div id="p${i}_c2" class="card"></div>
                </div>
            </div>`;
        });
        $('cardsArea').innerHTML = html;
    }

    function drawCardImg(id, card) {
        const el = $(id);
        if (!el) return;
        el.innerHTML = card ? `<img src="${IMAGE_URLS[card.rank + '_' + card.suit]}">` : "";
    }

    function startGame() {
        let pName = $('playerName').value.trim() || "Ty";
        let startMoney = parseInt($('startMoney').value) || 1000;
        let nNpc = parseInt($('npcCount').value);
        
        let enemies = namesPool.sort(() => 0.5 - Math.random()).slice(0, nNpc);
        
        state = {
            deck: [],
            pot: 0,
            currentTurn: null,
            players: []
        };

        // Přidání NPC
        enemies.forEach(name => state.players.push({ name, bal: startMoney, isNPC: true }));
        // Přidání hráče doprostřed nebo na konec
        state.players.splice(Math.floor(state.players.length/2), 0, { name: pName, bal: startMoney, isNPC: false });

        $('startScreen').style.display = "none";
        $('game').style.display = "block";
        startRound();
    }

    async function startRound() {
        if (!roundOver) return;
        if (state.players.find(p => !p.isNPC).bal <= 0) return showEnd(false);
        if (state.players.filter(p => p.isNPC).every(p => p.bal <= 0)) return showEnd(true);

        roundOver = false;
        $('nextBtn').classList.remove("active");
        
        if (state.pot <= 0 || isFirstRound) {
            $('msg').innerText = "Všichni vkládají 50 Kč...";
            state.players.forEach(p => { if(p.bal > 0) { let take = Math.min(p.bal, 50); p.bal -= take; state.pot += take; }});
            isFirstRound = false;
        }

        updateUI();
        renderCardsArea();

        const rows = document.querySelectorAll('.player-row-ui');
        rows.forEach(r => r.classList.add('shuffling'));
        $('msg').innerText = "Míchám karty...";
        await delay(1000);
        rows.forEach(r => r.classList.remove('shuffling'));
        
        state.deck = createDeck();

        for (let i = 0; i < state.players.length; i++) {
            if (state.players[i].bal <= 0) continue;
            state.currentTurn = i;
            updateUI();
            await turn(i);
            if (state.pot <= 0) break;
        }

        roundOver = true;
        $('nextBtn').classList.add("active");
        state.currentTurn = null;
        updateUI();
    }

    async function turn(i) {
        let p = state.players[i];
        let c1 = state.deck.pop();
        let c2 = state.deck.pop();
        drawCardImg(`p${i}_c1`, c1);
        drawCardImg(`p${i}_c2`, c2);
        await delay(700);

        if (c1.rank === c2.rank) {
            if (c1.rank === "A") {
                p.bal += state.pot; state.pot = 0;
                $('msg').innerText = `${p.name}: ESA! Bere bank!`;
            } else {
                p.bal -= 50; state.pot += 50;
                $('msg').innerText = `${p.name}: Stejné karty - platí 50.`;
            }
            updateUI(); await delay(1200); return;
        }

        if (p.isNPC) {
            let v1 = ranks.indexOf(c1.rank), v2 = ranks.indexOf(c2.rank);
            let gap = Math.abs(v1 - v2);
            if (gap > 2 && Math.random() > 0.45) {
                let bet = Math.min(gap * 30, p.bal, state.pot);
                await evaluate(p, i, v1, v2, bet);
            } else { await delay(600); }
        } else {
            await new Promise(resolve => {
                $('actions').style.display = "block";
                $('playBtn').onclick = async () => {
                    let b = Math.min(parseInt($('bet').value), p.bal, state.pot);
                    $('actions').style.display = "none";
                    await evaluate(p, i, ranks.indexOf(c1.rank), ranks.indexOf(c2.rank), b);
                    resolve();
                };
                $('allInBtn').onclick = async () => {
                    let b = Math.min(p.bal, state.pot);
                    $('actions').style.display = "none";
                    await evaluate(p, i, ranks.indexOf(c1.rank), ranks.indexOf(c2.rank), b);
                    resolve();
                };
                $('passBtn').onclick = () => { $('actions').style.display = "none"; resolve(); };
            });
        }
    }

    async function evaluate(p, i, v1, v2, bet) {
        let t = state.deck.pop();
        drawCardImg(`p${i}_ct`, t);
        await delay(800);
        let min = Math.min(v1, v2), max = Math.max(v1, v2), vt = ranks.indexOf(t.rank);

        if (vt > min && vt < max) {
            p.bal += bet; state.pot -= bet;
            $('msg').innerText = `${p.name} vyhrál ${bet} Kč.`;
        } else if (vt === min || vt === max) {
            p.bal -= (bet * 2); state.pot += (bet * 2);
            $('msg').innerText = `KOZA! ${p.name} platí ${bet*2} Kč.`;
        } else {
            p.bal -= bet; state.pot += bet;
            $('msg').innerText = `${p.name} prohrál ${bet} Kč.`;
        }
        updateUI(); await delay(1200);
    }

    function showEnd(win) {
        $('endScreen').style.display = "flex";
        $('endTitle').innerText = win ? "Vítězství!" : "Bankrot!";
        $('endMsg').innerText = win ? "Ovládl jsi stůl!" : "Příště to vyjde.";
    }

    $('startBtn').onclick = startGame;
    $('nextBtn').onclick = startRound;
</script>
</body>
</html>
