<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="ikonka/ikonka.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mezi Kozy</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#0f5e1c;
color:white;
text-align:center;
}

/* ===== START SCREEN ===== */

#startScreen{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f5e1c,#0b3d13);
}

.start-card{
background:white;
color:#222;
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
width:90%;
max-width:400px;
}

.start-card h1{
margin-top:0;
color:#0f5e1c;
}

.start-card p{
margin:10px 0 20px 0;
color:#555;
}

.start-card input{
width:100%;
padding:12px;
font-size:16px;
border-radius:10px;
border:1px solid #ccc;
margin-bottom:20px;
text-align:center;
}

.start-card button{
width:100%;
padding:14px;
font-size:18px;
background:#c40000;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.start-card button:hover{
background:#ff1a1a;
transform:scale(1.05);
}

/* ===== HRÁČI ===== */

.player-box{
display:inline-block;
margin:10px 35px; /* větší mezera */
padding:10px;
background:#222;
border-radius:12px;
min-width:160px;
}

.active-player{
color:#ffd700;
font-weight:bold;
}

/* ===== KARTY ===== */

#cardsArea{
display:flex;
justify-content:center;
align-items:flex-start;
gap:80px; /* bylo 80px */
flex-wrap:wrap;
margin-top:30px;
}

.player-cards{
display:flex;
flex-direction:column;
align-items:center;
}

.card-row{
display:flex;
gap:40px; /* bylo 40px */
}

.card img{
width:110px;
border-radius:10px;
box-shadow:0 6px 12px rgba(0,0,0,0.6);
}

/* ===== TLAČÍTKA ===== */

button{
padding:10px 18px;
font-weight:bold;
margin:5px;
border:none;
border-radius:8px;
}

#nextBtn{
background:#666;
color:white;
cursor:not-allowed;
opacity:0.7;
margin-top:20px;
}

#nextBtn.active{
background:#c40000;
cursor:pointer;
opacity:1;
}

#msg{
margin-top:15px;
font-weight:bold;
color:#ffd700;
min-height:24px;
}

@media (max-width:768px){

.card img{
width:65px;
}

#cardsArea{
gap:25px;
}

.card-row{
gap:10px;
}

.player-box{
display:block;
margin:10px auto;
width:90%;
}

button{
width:90%;
max-width:300px;
font-size:18px;
padding:14px;
}
}

@media (max-width:400px){
.card img{
width:55px;
}
}
</style>
</head>
<body>

<div id="startScreen">
<div class="start-card">
<h1>Karetní hra Mezi Kozy</h1>
<p>Vítejte na webu. Zadejte své jméno a pojďte si zahrát!</p>

<input type="text" id="playerName" placeholder="Zadej své jméno">
<button id="startBtn">ZAČÍT HRU</button>
</div>
</div>

<div id="game" style="display:none;">
<div id="playersRow"></div>
<h3>BANK: <span id="pot">0</span> Kč</h3>
<div id="cardsArea"></div>
<div id="msg"></div>

<div id="actions" style="display:none;">
<input type="number" id="bet" value="50" min="1">
<button id="playBtn">HRAJU</button>
<button id="allInBtn">HRÁT O VŠECHNO</button>
<button id="passBtn">PAS</button>
</div>

<button id="nextBtn">DALŠÍ KOLO</button>
</div>

<script>

const ranks=["7","8","9","10","Sp","Sv","K","A"];
const suits=["Z","C","K","ZL"];

const npcNames=[
"Radek","Pepa","Martin","David","Tomáš","Milan","Ondra",
"Karel","Honza","Filip","Michal","Roman","Jirka","Vojta","Adam"
];

let state;
let playerName="Ty";
let roundOver=true;

const $=id=>document.getElementById(id);
const delay=ms=>new Promise(r=>setTimeout(r,ms));

function setNextButton(active){
const btn=$('nextBtn');
if(active){
btn.classList.add("active");
btn.disabled=false;
}else{
btn.classList.remove("active");
btn.disabled=true;
}
}

function createDeck(){
let deck=[];
for(let s of suits){
for(let r of ranks){
deck.push({suit:s,rank:r});
}
}
for(let i=deck.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[deck[i],deck[j]]=[deck[j],deck[i]];
}
return deck;
}

function drawCard(){ return state.deck.pop(); }

function renderCard(id,card){
if(!card){ $(id).innerHTML=""; return; }
$(id).innerHTML=`<img src="karty/${card.rank}_${card.suit}.jpg">`;
}

function updateUI(){
$('pot').innerText=state.pot;

let html="";
state.players.forEach((p,index)=>{
let activeClass = state.currentTurn === index ? "active-player" : "";

html+=`<div class="player-box ${activeClass}">
${p.name}<br>
${p.bal} Kč ${p.out?"(Vypadl)":""}
<div style="font-size:12px;color:#ffd700" id="log_${p.name}"></div>
</div>`;
});
$('playersRow').innerHTML=html;
}

function addLog(text){
state.players.forEach(p=>{
let el=document.getElementById("log_"+p.name);
if(el) el.innerText="";
});
let name=text.split(" ")[0];
let el=document.getElementById("log_"+name);
if(el) el.innerText=text;
}

function renderCardsArea(){
let html="";
state.players.forEach((p,i)=>{
if(p.out) return;
html+=`
<div class="player-cards">
<div class="card-row">
<div id="p${i}_c1" class="card"></div>
<div id="p${i}_ct" class="card"></div>
<div id="p${i}_c2" class="card"></div>
</div>
</div>`;
});
$('cardsArea').innerHTML=html;
}

function randomNPC(){
let shuffled=[...npcNames].sort(()=>0.5-Math.random());
return [shuffled[0],shuffled[1]];
}

function startGame(){

let nameInput=$('playerName').value.trim();
if(nameInput) playerName=nameInput;

let [n1,n2]=randomNPC();

state={
deck:createDeck(),
pot:0,
currentTurn:null,
players:[
{name:n1,bal:1000,isNPC:true,out:false},
{name:playerName,bal:1000,isNPC:false,out:false},
{name:n2,bal:1000,isNPC:true,out:false}
]
};

$('startScreen').style.display="none";
$('game').style.display="block";

startRound();
}

async function startRound(){

if(!roundOver) return;

roundOver=false;
setNextButton(false);
state.deck=createDeck();

if(state.pot===0){
state.players.forEach(p=>{
if(!p.out && p.bal>=50){
p.bal-=50;
state.pot+=50;
}
});
}

updateUI();
renderCardsArea();

for(let i=0;i<state.players.length;i++){
if(state.players[i].out) continue;

state.currentTurn = i;
updateUI();

await turn(i);

if(roundOver){
setNextButton(true);
return;
}
}

roundOver=true;
setNextButton(true);
}

async function turn(i){

let p=state.players[i];
if(p.out) return;

let c1=drawCard();
let c2=drawCard();

renderCard(`p${i}_c1`,c1);
renderCard(`p${i}_c2`,c2);

await delay(800);

if(c1.rank===c2.rank){
if(c1.rank==="A"){
p.bal+=state.pot;
state.pot=0;
addLog(p.name+" vybral celý bank!");
updateUI();
roundOver=true;
return;
}else{
p.bal-=50;
state.pot+=50;
addLog(p.name+" platí 50 Kč");
updateUI();
return;
}
}

if(p.isNPC){

let min=Math.min(ranks.indexOf(c1.rank),ranks.indexOf(c2.rank));
let max=Math.max(ranks.indexOf(c1.rank),ranks.indexOf(c2.rank));
let gap=max-min-1;

if(gap<=0){
addLog(p.name+" dává PAS");
await delay(800);
return;
}

let bet=Math.min(gap*30,p.bal,state.pot);

if(Math.random()<0.25){
addLog(p.name+" se bojí a dává PAS");
await delay(800);
return;
}

addLog(p.name+" sází "+bet+" Kč");
await evaluate(p,i,c1,c2,bet);

}else{
await userTurn(p,i,c1,c2);
}

if(p.bal<=0){
p.out=true;
updateUI();
}
}

function userTurn(p,i,c1,c2){
return new Promise(resolve=>{
$('actions').style.display="block";

$('playBtn').onclick=async()=>{
let bet=Math.min(parseInt($('bet').value),p.bal,state.pot);
addLog(p.name+" sází "+bet+" Kč");
$('actions').style.display="none";
await evaluate(p,i,c1,c2,bet);
resolve();
};

$('allInBtn').onclick=async()=>{
let bet=Math.min(state.pot,p.bal);
addLog(p.name+" jde ALL IN za "+bet+" Kč");
$('actions').style.display="none";
await evaluate(p,i,c1,c2,bet);
resolve();
};

$('passBtn').onclick=()=>{
addLog(p.name+" dává PAS");
$('actions').style.display="none";
resolve();
};
});
}

async function evaluate(p,i,c1,c2,bet){

let t=drawCard();
renderCard(`p${i}_ct`,t);
await delay(800);

let min=Math.min(ranks.indexOf(c1.rank),ranks.indexOf(c2.rank));
let max=Math.max(ranks.indexOf(c1.rank),ranks.indexOf(c2.rank));
let val=ranks.indexOf(t.rank);

if(val>min && val<max){
p.bal+=bet;
state.pot-=bet;
addLog(p.name+" vyhrává "+bet+" Kč");
if(state.pot===0) roundOver=true;
}else{
p.bal-=bet;
state.pot+=bet;
addLog(p.name+" prohrává "+bet+" Kč");
}

updateUI();
await delay(600);
}

$('startBtn').onclick=startGame;
$('nextBtn').onclick=startRound;

</script>
</body>
</html>
