<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NHL Simulátor s ratingy</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px 10px;
      background: #0b0e14;
      color: white;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 1.8rem;
    }

    .teams {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      max-width: 1000px;
      margin: auto;
    }

    .team {
      cursor: pointer;
      transition: 0.2s;
      width: 65px; 
      background: #1a1f29;
      padding: 5px;
      border-radius: 8px;
      border: 1px solid #2d3748;
    }

    .team img {
      width: 100%;
      height: auto;
      aspect-ratio: 1/1;
      object-fit: contain;
    }

    .selected {
      border-color: #38bdf8;
      background: #1e293b;
      transform: scale(1.1);
    }

    #match {
      margin-top: 25px;
      font-size: 1.1rem;
      min-height: 1.5em;
      color: #38bdf8;
    }

    button {
      margin-top: 20px;
      padding: 15px 30px;
      font-size: 18px;
      cursor: pointer;
      background-color: #38bdf8;
      border: none;
      border-radius: 8px;
      color: #0f172a;
      font-weight: bold;
      width: 100%;
      max-width: 300px;
    }

    #result {
      margin-top: 30px;
      font-size: 1.5rem;
      font-weight: bold;
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 12px;
      display: inline-block;
    }

    @media (min-width: 600px) {
      .team { width: 80px; }
      h1 { font-size: 2.5rem; }
    }
  </style>
</head>
<body>

  <h1>🏒 NHL SIMULATOR</h1>

  <div class="teams" id="teams"></div>

  <div id="match">Vyber dva týmy</div>

  <button onclick="simulate()">Simulovat zápas</button>

  <div id="result"></div>

  <script>
    const teams = {
      // ATLANTIC
      bos: { name: "Boston Bruins", attack: 88, defense: 90, logo: "https://assets.nhle.com/logos/nhl/svg/BOS_dark.svg" },
      buf: { name: "Buffalo Sabres", attack: 84, defense: 82, logo: "https://assets.nhle.com/logos/nhl/svg/BUF_dark.svg" },
      det: { name: "Detroit Red Wings", attack: 85, defense: 83, logo: "https://assets.nhle.com/logos/nhl/svg/DET_dark.svg" },
      fla: { name: "Florida Panthers", attack: 92, defense: 89, logo: "https://assets.nhle.com/logos/nhl/svg/FLA_dark.svg" },
      mtl: { name: "Montreal Canadiens", attack: 79, defense: 80, logo: "https://assets.nhle.com/logos/nhl/svg/MTL_dark.svg" },
      ott: { name: "Ottawa Senators", attack: 83, defense: 82, logo: "https://assets.nhle.com/logos/nhl/svg/OTT_dark.svg" },
      tbl: { name: "Tampa Bay Lightning", attack: 89, defense: 86, logo: "https://assets.nhle.com/logos/nhl/svg/TBL_dark.svg" },
      tor: { name: "Toronto Maple Leafs", attack: 93, defense: 85, logo: "https://assets.nhle.com/logos/nhl/svg/TOR_dark.svg" },
      // METROPOLITAN
      car: { name: "Carolina Hurricanes", attack: 87, defense: 91, logo: "https://assets.nhle.com/logos/nhl/svg/CAR_dark.svg" },
      cbj: { name: "Columbus Blue Jackets", attack: 78, defense: 77, logo: "https://assets.nhle.com/logos/nhl/svg/CBJ_dark.svg" },
      njd: { name: "New Jersey Devils", attack: 88, defense: 84, logo: "https://assets.nhle.com/logos/nhl/svg/NJD_dark.svg" },
      nyi: { name: "New York Islanders", attack: 81, defense: 86, logo: "https://assets.nhle.com/logos/nhl/svg/NYI_dark.svg" },
      nyr: { name: "New York Rangers", attack: 91, defense: 89, logo: "https://assets.nhle.com/logos/nhl/svg/NYR_dark.svg" },
      phi: { name: "Philadelphia Flyers", attack: 80, defense: 82, logo: "https://assets.nhle.com/logos/nhl/svg/PHI_dark.svg" },
      phi: { name: "Philadelphia Flyers", attack: 80, defense: 82, logo: "https://assets.nhle.com/logos/nhl/svg/PHI_dark.svg" },
      pit: { name: "Pittsburgh Penguins", attack: 84, defense: 81, logo: "https://assets.nhle.com/logos/nhl/svg/PIT_dark.svg" },
      wsh: { name: "Washington Capitals", attack: 82, defense: 83, logo: "https://assets.nhle.com/logos/nhl/svg/WSH_dark.svg" },
      // CENTRAL
      chi: { name: "Chicago Blackhawks", attack: 77, defense: 78, logo: "https://assets.nhle.com/logos/nhl/svg/CHI_dark.svg" },
      col: { name: "Colorado Avalanche", attack: 94, defense: 89, logo: "https://assets.nhle.com/logos/nhl/svg/COL_dark.svg" },
      dal: { name: "Dallas Stars", attack: 91, defense: 91, logo: "https://assets.nhle.com/logos/nhl/svg/DAL_dark.svg" },
      min: { name: "Minnesota Wild", attack: 83, defense: 85, logo: "https://assets.nhle.com/logos/nhl/svg/MIN_dark.svg" },
      nsh: { name: "Nashville Predators", attack: 86, defense: 87, logo: "https://assets.nhle.com/logos/nhl/svg/NSH_dark.svg" },
      stl: { name: "St. Louis Blues", attack: 82, defense: 82, logo: "https://assets.nhle.com/logos/nhl/svg/STL_dark.svg" },
      uta: { name: "Utah Mammoth", attack: 81, defense: 80, logo: "https://assets.nhle.com/logos/nhl/svg/UTA_dark.svg" },
      wpg: { name: "Winnipeg Jets", attack: 87, defense: 89, logo: "https://assets.nhle.com/logos/nhl/svg/WPG_dark.svg" },
      // PACIFIC
      ana: { name: "Anaheim Ducks", attack: 78, defense: 79, logo: "https://assets.nhle.com/logos/nhl/svg/ANA_dark.svg" },
      cgy: { name: "Calgary Flames", attack: 80, defense: 81, logo: "https://assets.nhle.com/logos/nhl/svg/CGY_dark.svg" },
      edm: { name: "Edmonton Oilers", attack: 95, defense: 84, logo: "https://assets.nhle.com/logos/nhl/svg/EDM_dark.svg" },
      lak: { name: "Los Angeles Kings", attack: 85, defense: 87, logo: "https://assets.nhle.com/logos/nhl/svg/LAK_dark.svg" },
      sjs: { name: "San Jose Sharks", attack: 75, defense: 76, logo: "https://assets.nhle.com/logos/nhl/svg/SJS_dark.svg" },
      sea: { name: "Seattle Kraken", attack: 81, defense: 84, logo: "https://assets.nhle.com/logos/nhl/svg/SEA_dark.svg" },
      van: { name: "Vancouver Canucks", attack: 78, defense: 80, logo: "https://assets.nhle.com/logos/nhl/svg/VAN_dark.svg" },
      vgk: { name: "Vegas Golden Knights", attack: 89, defence: 88, logo: "https://assets.nhle.com/logos/nhl/svg/VGK_dark.svg" }
    };

    const container = document.getElementById("teams");
    let selectedA = null;
    let selectedB = null;

    function renderTeams() {
      for (let key in teams) {
        const div = document.createElement("div");
        div.classList.add("team");
        div.innerHTML = `<img src="${teams[key].logo}" alt="${teams[key].name}" title="${teams[key].name}">`;
        div.onclick = () => selectTeam(key, div);
        container.appendChild(div);
      }
    }

    function selectTeam(key, element) {
      if (!selectedA) {
        selectedA = key;
        element.classList.add("selected");
      } else if (!selectedB && key !== selectedA) {
        selectedB = key;
        element.classList.add("selected");
      } else {
        selectedA = key;
        selectedB = null;
        document.querySelectorAll(".team").forEach(t => t.classList.remove("selected"));
        element.classList.add("selected");
      }
      updateMatch();
    }

    function updateMatch() {
      if (selectedA && selectedB) {
        document.getElementById("match").innerText =
          `${teams[selectedA].name} vs ${teams[selectedB].name}`;
      } else if (selectedA) {
          document.getElementById("match").innerText = "Vyber soupeře";
      }
    }

    // VYLEPŠENÁ LOGIKA GÓLŮ (BELL CURVE + ŠANCE NA PŘESTŘELKU)
    function getGoals(att, def, isHome) {
      // Základní síla s průměrem kolem 2.8 gólu
      let power = (att - def) / 10 + 2.8;
      if (isHome) power += 0.3;

      // Bell curve náhoda (sečtení 3 náhodných čísel)
      let luck = (Math.random() + Math.random() + Math.random()) / 1.5; 
      
      let finalGoals = Math.round(power * luck);
      
      // 5% šance na bonusové góly (výjimečné přestřelky)
      if (Math.random() > 0.95) finalGoals += Math.floor(Math.random() * 3);

      return Math.max(0, finalGoals);
    }

    function simulate() {
      if (!selectedA || !selectedB) {
        document.getElementById("result").innerText = "Vyber dva týmy!";
        return;
      }

      const A = teams[selectedA];
      const B = teams[selectedB];
      
      let goalsA = getGoals(A.attack, B.defense, true);
      let goalsB = getGoals(B.attack, A.defense, false);
      let suffix = "";

      if (goalsA === goalsB) {
        if (Math.random() < 0.5) {
          goalsA++;
          suffix = " (OT)";
        } else {
          goalsB++;
          suffix = " (SO)";
        }
      }

      document.getElementById("result").innerHTML = 
        `<div style="font-size: 3rem; color: #38bdf8;">${goalsA} : ${goalsB}</div>` +
        `<div style="color: #94a3b8; margin-top: 10px;">${A.name} vs ${B.name}${suffix}</div>`;
    }

    renderTeams();
  </script>
</body>
</html>
