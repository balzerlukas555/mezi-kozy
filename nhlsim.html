<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NHL Simulátor</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px 10px;
      background: #0b0e14;
      color: #e2e8f0;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 1.8rem;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .teams {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      max-width: 1100px;
      margin: auto;
    }

    .team {
      cursor: pointer;
      transition: all 0.2s ease-in-out;
      width: 65px; 
      padding: 5px;
      background: #1a1f29;
      border-radius: 8px;
      border: 1px solid #2d3748;
    }

    .team img {
      width: 100%;
      height: auto;
      aspect-ratio: 1/1;
      object-fit: contain;
      filter: drop-shadow(0 0 2px rgba(0,0,0,0.5));
    }

    .team:hover {
      background: #2d3748;
      transform: translateY(-3px);
    }

    .selected {
      border-color: #38bdf8;
      background: #1e293b;
      box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
    }

    #match {
      margin-top: 25px;
      font-size: 1.2rem;
      min-height: 1.6em;
      font-weight: 500;
      color: #38bdf8;
    }

    button {
      margin-top: 20px;
      padding: 15px 40px;
      font-size: 18px;
      cursor: pointer;
      background-color: #f1f5f9;
      border: none;
      border-radius: 8px;
      color: #0b0e14;
      font-weight: bold;
      width: 100%;
      max-width: 320px;
      transition: 0.2s;
    }

    button:hover {
      background-color: #38bdf8;
      color: white;
    }

    button:active {
      transform: scale(0.96);
    }

    #result {
      margin-top: 30px;
      font-size: 1.6rem;
      font-weight: 800;
      padding: 15px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      display: inline-block;
      min-width: 280px;
    }

    @media (min-width: 600px) {
      .team { width: 85px; }
      h1 { font-size: 2.5rem; }
      #match { font-size: 24px; }
      #result { font-size: 32px; }
    }
  </style>
</head>
<body>

  <h1>🏒 NHL Simulator</h1>

  <div class="teams" id="teams"></div>

  <div id="match">Select two teams</div>

  <button onclick="simulate()">Simulate Game</button>

  <div id="result"></div>

  <script>
    const teams = {
      // ATLANTIC
      bos: { name: "Boston Bruins", logo: "SEM_VLOŽ" },
      buf: { name: "Buffalo Sabres", logo: "SEM_VLOŽ" },
      det: { name: "Detroit Red Wings", logo: "SEM_VLOŽ" },
      fla: { name: "Florida Panthers", logo: "SEM_VLOŽ" },
      mtl: { name: "Montreal Canadiens", logo: "SEM_VLOŽ" },
      ott: { name: "Ottawa Senators", logo: "SEM_VLOŽ" },
      tbl: { name: "Tampa Bay Lightning", logo: "SEM_VLOŽ" },
      tor: { name: "Toronto Maple Leafs", logo: "SEM_VLOŽ" },
      // METROPOLITAN
      car: { name: "Carolina Hurricanes", logo: "SEM_VLOŽ" },
      cbj: { name: "Columbus Blue Jackets", logo: "SEM_VLOŽ" },
      njd: { name: "New Jersey Devils", logo: "SEM_VLOŽ" },
      nyi: { name: "New York Islanders", logo: "SEM_VLOŽ" },
      nyr: { name: "New York Rangers", logo: "SEM_VLOŽ" },
      phi: { name: "Philadelphia Flyers", logo: "SEM_VLOŽ" },
      pit: { name: "Pittsburgh Penguins", logo: "SEM_VLOŽ" },
      wsh: { name: "Washington Capitals", logo: "SEM_VLOŽ" },
      // CENTRAL
      chi: { name: "Chicago Blackhawks", logo: "SEM_VLOŽ" },
      col: { name: "Colorado Avalanche", logo: "SEM_VLOŽ" },
      dal: { name: "Dallas Stars", logo: "SEM_VLOŽ" },
      min: { name: "Minnesota Wild", logo: "SEM_VLOŽ" },
      nsh: { name: "Nashville Predators", logo: "SEM_VLOŽ" },
      stl: { name: "St. Louis Blues", logo: "SEM_VLOŽ" },
      uta: { name: "Utah Hockey Club", logo: "SEM_VLOŽ" },
      wpg: { name: "Winnipeg Jets", logo: "SEM_VLOŽ" },
      // PACIFIC
      ana: { name: "Anaheim Ducks", logo: "SEM_VLOŽ" },
      cgy: { name: "Calgary Flames", logo: "SEM_VLOŽ" },
      edm: { name: "Edmonton Oilers", logo: "SEM_VLOŽ" },
      lak: { name: "Los Angeles Kings", logo: "SEM_VLOŽ" },
      sjs: { name: "San Jose Sharks", logo: "SEM_VLOŽ" },
      sea: { name: "Seattle Kraken", logo: "SEM_VLOŽ" },
      van: { name: "Vancouver Canucks", logo: "SEM_VLOŽ" },
      vgk: { name: "Vegas Golden Knights", logo: "SEM_VLOŽ" }
    };

    const container = document.getElementById("teams");
    let selectedA = null;
    let selectedB = null;

    function renderTeams() {
      for (let key in teams) {
        const div = document.createElement("div");
        div.classList.add("team");
        div.innerHTML = `<img src="${teams[key].logo}" alt="${teams[key].name}" title="${teams[key].name}">`;
        div.onclick = () => selectTeam(key, div);
        container.appendChild(div);
      }
    }

    function selectTeam(key, element) {
      if (!selectedA) {
        selectedA = key;
        element.classList.add("selected");
      } else if (!selectedB && key !== selectedA) {
        selectedB = key;
        element.classList.add("selected");
      } else {
        selectedA = key;
        selectedB = null;
        document.querySelectorAll(".team").forEach(t => t.classList.remove("selected"));
        element.classList.add("selected");
      }
      updateMatch();
    }

    function updateMatch() {
      if (selectedA && selectedB) {
        document.getElementById("match").innerText =
          `${teams[selectedA].name} vs ${teams[selectedB].name}`;
      } else if (selectedA) {
          document.getElementById("match").innerText = "Select Opponent";
      }
    }

    function simulate() {
      if (!selectedA || !selectedB) {
        document.getElementById("result").innerText = "Select two teams! 🏒";
        return;
      }

      const A = teams[selectedA];
      const B = teams[selectedB];
      
      // Jednoduchá náhodná simulace gólů
      let goalsA = Math.floor(Math.random() * 6);
      let goalsB = Math.floor(Math.random() * 6);
      let suffix = "";

      if (goalsA === goalsB) {
        if (Math.random() < 0.5) {
          goalsA++;
          suffix = " (OT)";
        } else {
          goalsB++;
          suffix = " (SO)";
        }
      }

      document.getElementById("result").innerHTML = 
        `<span style="color:#38bdf8">${goalsA}</span> : <span style="color:#38bdf8">${goalsB}</span><br>` +
        `<small style="font-size: 1rem; color: #94a3b8">${A.name} vs ${B.name}${suffix}</small>`;
    }

    renderTeams();
  </script>
</body>
</html>
