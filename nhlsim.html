<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NHL Simulátor s ratingy</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px 10px;
      background: #0b0e14;
      color: white;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 1.8rem;
    }

    .teams {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      max-width: 1000px;
      margin: auto;
    }

    .team {
      cursor: pointer;
      transition: 0.2s;
      width: 65px; 
      background: #1a1f29;
      padding: 5px;
      border-radius: 8px;
      border: 1px solid #2d3748;
    }

    .team img {
      width: 100%;
      height: auto;
      aspect-ratio: 1/1;
      object-fit: contain;
    }

    .selected {
      border-color: #38bdf8;
      background: #1e293b;
      transform: scale(1.1);
      box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
    }

    #match {
      margin-top: 25px;
      font-size: 1.2rem;
      min-height: 1.5em;
      color: #38bdf8;
      font-weight: bold;
    }

    .button-container {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .series-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    button {
      padding: 12px 25px;
      font-size: 16px;
      cursor: pointer;
      background-color: #38bdf8;
      border: none;
      border-radius: 8px;
      color: #0f172a;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      background-color: #7dd3fc;
      transform: translateY(-2px);
    }

    button:disabled {
      background-color: #475569;
      cursor: not-allowed;
      transform: none;
    }

    #result {
      margin-top: 30px;
      font-size: 1.1rem;
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 12px;
      display: inline-block;
      min-width: 360px;
      text-align: left;
    }

    .score-display-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 10px;
    }

    .score-display {
      font-size: 3.5rem;
      font-weight: bold;
      color: #38bdf8;
      min-width: 120px;
      text-align: center;
    }

    .score-logo {
      width: 60px;
      height: 60px;
      object-fit: contain;
    }

    .game-line {
      border-bottom: 1px solid #2d3748;
      padding: 8px 0;
      font-size: 0.95rem;
    }

    .winner-box {
      margin-top: 20px;
      font-size: 1.8rem;
      color: #fbbf24;
      text-align: center;
      font-weight: bold;
      padding: 10px;
      border: 2px solid #fbbf24;
      border-radius: 8px;
    }

    .status-msg {
      font-style: italic;
      color: #94a3b8;
      text-align: center;
      margin-bottom: 10px;
    }

    .current-series-score {
      font-size: 2rem;
      text-align: center;
      color: #fff;
      margin-bottom: 5px;
    }

    .team-names-info {
        text-align: center;
        font-size: 0.9rem;
        color: #e2e8f0;
    }

    @media (min-width: 600px) {
      .team { width: 80px; }
      h1 { font-size: 2.5rem; }
    }
  </style>
</head>
<body>

  <h1>🏒 NHL SIMULATOR</h1>

  <div class="teams" id="teams"></div>

  <div id="match">Vyberte dva týmy</div>

  <div class="button-container">
    <button id="simBtn" onclick="simulateMatch()">Simulovat zápas</button>
    <div class="series-buttons">
      <button id="bo3Btn" onclick="startSeries('bo3')">Série BO3</button>
      <button id="bo5Btn" onclick="startSeries('bo5')">Série BO5</button>
      <button id="bo7Btn" onclick="startSeries('bo7')">Série BO7</button>
    </div>
  </div>

  <div id="result"></div>

<script>
const teams = {
  bos: { name: "Boston Bruins", attack: 88, defense: 90, logo: "https://assets.nhle.com/logos/nhl/svg/BOS_dark.svg" },
  buf: { name: "Buffalo Sabres", attack: 84, defense: 82, logo: "https://assets.nhle.com/logos/nhl/svg/BUF_dark.svg" },
  det: { name: "Detroit Red Wings", attack: 85, defense: 83, logo: "https://assets.nhle.com/logos/nhl/svg/DET_dark.svg" },
  fla: { name: "Florida Panthers", attack: 92, defense: 89, logo: "https://assets.nhle.com/logos/nhl/svg/FLA_dark.svg" },
  mtl: { name: "Montreal Canadiens", attack: 79, defense: 80, logo: "https://assets.nhle.com/logos/nhl/svg/MTL_dark.svg" },
  ott: { name: "Ottawa Senators", attack: 83, defense: 82, logo: "https://assets.nhle.com/logos/nhl/svg/OTT_dark.svg" },
  tbl: { name: "Tampa Bay Lightning", attack: 89, defense: 86, logo: "https://assets.nhle.com/logos/nhl/svg/TBL_dark.svg" },
  tor: { name: "Toronto Maple Leafs", attack: 93, defense: 85, logo: "https://assets.nhle.com/logos/nhl/svg/TOR_dark.svg" },
  car: { name: "Carolina Hurricanes", attack: 87, defense: 91, logo: "https://assets.nhle.com/logos/nhl/svg/CAR_dark.svg" },
  cbj: { name: "Columbus Blue Jackets", attack: 78, defense: 77, logo: "https://assets.nhle.com/logos/nhl/svg/CBJ_dark.svg" },
  njd: { name: "New Jersey Devils", attack: 88, defense: 84, logo: "https://assets.nhle.com/logos/nhl/svg/NJD_dark.svg" },
  nyi: { name: "New York Islanders", attack: 81, defense: 86, logo: "https://assets.nhle.com/logos/nhl/svg/NYI_dark.svg" },
  nyr: { name: "New York Rangers", attack: 91, defense: 89, logo: "https://assets.nhle.com/logos/nhl/svg/NYR_dark.svg" },
  phi: { name: "Philadelphia Flyers", attack: 80, defense: 82, logo: "https://assets.nhle.com/logos/nhl/svg/PHI_dark.svg" },
  pit: { name: "Pittsburgh Penguins", attack: 84, defense: 81, logo: "https://assets.nhle.com/logos/nhl/svg/PIT_dark.svg" },
  wsh: { name: "Washington Capitals", attack: 82, defense: 83, logo: "https://assets.nhle.com/logos/nhl/svg/WSH_dark.svg" },
  chi: { name: "Chicago Blackhawks", attack: 77, defense: 78, logo: "https://assets.nhle.com/logos/nhl/svg/CHI_dark.svg" },
  col: { name: "Colorado Avalanche", attack: 94, defense: 89, logo: "https://assets.nhle.com/logos/nhl/svg/COL_dark.svg" },
  dal: { name: "Dallas Stars", attack: 91, defense: 91, logo: "https://assets.nhle.com/logos/nhl/svg/DAL_dark.svg" },
  min: { name: "Minnesota Wild", attack: 83, defense: 85, logo: "https://assets.nhle.com/logos/nhl/svg/MIN_dark.svg" },
  nsh: { name: "Nashville Predators", attack: 86, defense: 87, logo: "https://assets.nhle.com/logos/nhl/svg/NSH_dark.svg" },
  stl: { name: "St. Louis Blues", attack: 82, defense: 82, logo: "https://assets.nhle.com/logos/nhl/svg/STL_dark.svg" },
  uta: { name: "Utah Mammoth", attack: 81, defense: 80, logo: "https://assets.nhle.com/logos/nhl/svg/UTA_dark.svg" },
  wpg: { name: "Winnipeg Jets", attack: 87, defense: 89, logo: "https://assets.nhle.com/logos/nhl/svg/WPG_dark.svg" },
  ana: { name: "Anaheim Ducks", attack: 78, defense: 79, logo: "https://assets.nhle.com/logos/nhl/svg/ANA_dark.svg" },
  cgy: { name: "Calgary Flames", attack: 80, defense: 81, logo: "https://assets.nhle.com/logos/nhl/svg/CGY_dark.svg" },
  edm: { name: "Edmonton Oilers", attack: 95, defense: 84, logo: "https://assets.nhle.com/logos/nhl/svg/EDM_dark.svg" },
  lak: { name: "Los Angeles Kings", attack: 85, defense: 87, logo: "https://assets.nhle.com/logos/nhl/svg/LAK_dark.svg" },
  sjs: { name: "San Jose Sharks", attack: 75, defense: 76, logo: "https://assets.nhle.com/logos/nhl/svg/SJS_dark.svg" },
  sea: { name: "Seattle Kraken", attack: 81, defense: 84, logo: "https://assets.nhle.com/logos/nhl/svg/SEA_dark.svg" },
  van: { name: "Vancouver Canucks", attack: 78, defense: 80, logo: "https://assets.nhle.com/logos/nhl/svg/VAN_dark.svg" },
  vgk: { name: "Vegas Golden Knights", attack: 89, defense: 88, logo: "https://assets.nhle.com/logos/nhl/svg/VGK_dark.svg" }
};

const container = document.getElementById("teams");
let selectedA = null;
let selectedB = null;
let isAnimating = false;

function renderTeams() {
  for (let key in teams) {
    const div = document.createElement("div");
    div.classList.add("team");
    div.setAttribute("data-id", key);
    div.innerHTML = `<img src="${teams[key].logo}" title="${teams[key].name}">`;
    div.onclick = () => selectTeam(key);
    container.appendChild(div);
  }
}

function selectTeam(key) {
  if (isAnimating) return;
  if (!selectedA) {
    selectedA = key;
  } else if (selectedA === key) {
    selectedA = null;
  } else if (!selectedB) {
    selectedB = key;
  } else if (selectedB === key) {
    selectedB = null;
  } else {
    selectedA = key;
    selectedB = null;
  }
  
  document.querySelectorAll(".team").forEach(t => {
    const id = t.getAttribute("data-id");
    t.classList.toggle("selected", id === selectedA || id === selectedB);
  });
  updateMatch();
}

function updateMatch() {
  const matchDiv = document.getElementById("match");
  if (selectedA && selectedB) {
    // Formát Hosté @ Domácí (Domácí je druhý vybraný a bude vpravo)
    matchDiv.innerText = `${teams[selectedA].name} @ ${teams[selectedB].name} (Home)`;
  } else if (selectedA) {
    matchDiv.innerText = "Vyber domácí tým (Home)...";
  } else {
    matchDiv.innerText = "Vyberte dva týmy";
  }
}

function getGoals(att, def, isHome) {
  let power = (att - def) / 10 + 2.8;
  if (isHome) power += 0.5;
  let luck = (Math.random() + Math.random() + Math.random()) / 1.5;
  return Math.max(0, Math.round(power * luck));
}

async function animateScore(finalA, finalB, isSeries = false, gameNum = 0, homeSide = "", winsA = 0, winsB = 0, ot = false, winnerOT = "") {
    const res = document.getElementById("result");
    let currentA = 0;
    let currentB = 0;
    const duration = 7000; 
    
    let baseA = ot ? (winnerOT === "A" ? finalA - 1 : finalA) : finalA;
    let baseB = ot ? (winnerOT === "B" ? finalB - 1 : finalB) : finalB;

    let goals = [];
    for(let i=0; i<baseA; i++) goals.push("A");
    for(let i=0; i<baseB; i++) goals.push("B");
    goals.sort(() => Math.random() - 0.5);

    const interval = duration / (goals.length + (ot ? 1 : 0));

    for (let i = 0; i < goals.length; i++) {
        await new Promise(r => setTimeout(r, interval));
        if (goals[i] === "A") currentA++; else currentB++;
        updateDisplay(res, currentA, currentB, isSeries, gameNum, homeSide, winsA, winsB, ot, false);
    }
    
    if (ot) {
        await new Promise(r => setTimeout(r, interval));
        if (winnerOT === "A") currentA++; else currentB++;
        updateDisplay(res, currentA, currentB, isSeries, gameNum, homeSide, winsA, winsB, ot, true);
    }
    
    if (isSeries) {
        updateDisplay(res, finalA, finalB, true, gameNum, homeSide, winsA, winsB, ot, true, true);
        await new Promise(r => setTimeout(r, 2000));
    }
}

function updateDisplay(res, curA, curB, isSeries, gameNum, homeSide, winsA, winsB, ot, isDoneOT, isFinal = false) {
    let leftTeam, rightTeam, leftScore, rightScore;
    
    // V NHL: Domácí tým je VŽDY vpravo (Away @ Home)
    if (homeSide === "B" || (!isSeries)) { 
        // V režimu 1 zápasu je selectedB brán jako domácí (vpravo)
        leftTeam = teams[selectedA];
        rightTeam = teams[selectedB];
        leftScore = curA;
        rightScore = curB;
    } else { 
        // V sérii když je 'A' doma, prohodíme je pro zobrazení (B je host, A je domácí vpravo)
        leftTeam = teams[selectedB];
        rightTeam = teams[selectedA];
        leftScore = curB;
        rightScore = curA;
    }

    const statusText = isSeries ? `Série: ${winsA}:${winsB} - Zápas ${gameNum} (v hale: ${rightTeam.name})` : (isFinal ? "KONEC" : "Zápas probíhá...");
    const endMark = isFinal ? `<div style="text-align:center; font-weight:bold; color:#fbbf24;">KONEC${ot ? " (v prodl.)" : ""}</div>` : "";

    res.innerHTML = `
        <div class="status-msg">${statusText}</div>
        ${isSeries ? `<div class="current-series-score">${winsA} : ${winsB}</div>` : ''}
        <div class="score-display-wrapper">
            <img src="${leftTeam.logo}" class="score-logo">
            <div class="score-display">${leftScore}:${rightScore}</div>
            <img src="${rightTeam.logo}" class="score-logo">
        </div>
        ${endMark}
        <div class="team-names-info">${leftTeam.name} @ ${rightTeam.name}</div>
    `;
}

async function simulateMatch() {
  if (!selectedA || !selectedB || isAnimating) return;
  isAnimating = true;
  toggleButtons(true);
  
  // B je domácí (vpravo)
  let finalA = getGoals(teams[selectedA].attack, teams[selectedB].defense, false);
  let finalB = getGoals(teams[selectedB].attack, teams[selectedA].defense, true);
  
  let ot = false;
  let winnerOT = "";
  if (finalA === finalB) {
    ot = true;
    if (Math.random() < 0.5) { finalA++; winnerOT = "A"; } else { finalB++; winnerOT = "B"; }
  }

  await animateScore(finalA, finalB, false, 0, "B", 0, 0, ot, winnerOT);
  updateDisplay(document.getElementById("result"), finalA, finalB, false, 0, "B", 0, 0, ot, true, true);
  
  isAnimating = false;
  toggleButtons(false);
}

async function startSeries(type) {
  if (!selectedA || !selectedB || isAnimating) return;
  isAnimating = true;
  toggleButtons(true);

  let winTarget = type === "bo3" ? 2 : type === "bo5" ? 3 : 4;
  // Domácí prostředí v NHL sérii (2-2-1-1-1): Tým B začíná doma
  let homeSchedule = type === "bo7" ? ["B", "B", "A", "A", "B", "A", "B"] : 
                     (type === "bo5" ? ["B", "B", "A", "A", "B"] : ["B", "A", "B"]);

  let winsA = 0, winsB = 0, gameIdx = 0;
  let history = [];

  while (winsA < winTarget && winsB < winTarget) {
    let homeSide = homeSchedule[gameIdx] || (gameIdx % 2 === 0 ? "B" : "A");
    let finalA = getGoals(teams[selectedA].attack, teams[selectedB].defense, homeSide === "A");
    let finalB = getGoals(teams[selectedB].attack, teams[selectedA].defense, homeSide === "B");
    let ot = false;
    let winnerOT = "";
    if (finalA === finalB) {
        ot = true;
        if (Math.random() < 0.5) { finalA++; winnerOT = "A"; } else { finalB++; winnerOT = "B"; }
    }

    await animateScore(finalA, finalB, true, gameIdx + 1, homeSide, winsA, winsB, ot, winnerOT);

    if (finalA > finalB) winsA++; else winsB++;
    history.push({game: gameIdx+1, scoreA: finalA, scoreB: finalB, ot: ot, home: homeSide});
    renderSeriesProgress(winsA, winsB, history);
    gameIdx++;
  }

  const winner = winsA > winsB ? teams[selectedA].name : teams[selectedB].name;
  document.getElementById("result").innerHTML += `<div class="winner-box">🏆 VÍTĚZ SÉRIE: ${winner.toUpperCase()} (${winsA}:${winsB})</div>`;

  isAnimating = false;
  toggleButtons(false);
}

function renderSeriesProgress(wA, wB, history) {
    const res = document.getElementById("result");
    let html = `
        <div class="status-msg">Průběh série</div>
        <div class="current-series-score">${wA} : ${wB}</div>
        <div style="text-align:center; margin-bottom:15px; font-weight:bold;">Historie zápasů:</div>
    `;
    
    history.forEach(h => {
        // V historii také držíme formát Away @ Home
        const isBHome = h.home === "B";
        const leftTeam = isBHome ? teams[selectedA] : teams[selectedB];
        const rightTeam = isBHome ? teams[selectedB] : teams[selectedA];
        const leftScore = isBHome ? h.scoreA : h.scoreB;
        const rightScore = isBHome ? h.scoreB : h.scoreA;

        html += `<div class="game-line">
            Zápas ${h.game}: ${leftTeam.name} <strong>${leftScore}:${rightScore}</strong> ${rightTeam.name} 
            <span style="font-size:0.8rem; color:#94a3b8">${h.ot ? " (v prodl.)" : ""}</span>
        </div>`;
    });
    
    res.innerHTML = html;
}

function toggleButtons(disabled) {
    document.querySelectorAll("button").forEach(b => b.disabled = disabled);
}

renderTeams();
</script>
</body>
</html>
