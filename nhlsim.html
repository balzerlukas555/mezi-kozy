<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NHL Simulátor s ratingy</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px 10px;
      background: #0b0e14;
      color: white;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 1.8rem;
    }

    .teams {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      max-width: 1000px;
      margin: auto;
    }

    .team {
      cursor: pointer;
      transition: 0.2s;
      width: 65px; 
      background: #1a1f29;
      padding: 5px;
      border-radius: 8px;
      border: 1px solid #2d3748;
    }

    .team img {
      width: 100%;
      height: auto;
      aspect-ratio: 1/1;
      object-fit: contain;
    }

    .selected {
      border-color: #38bdf8;
      background: #1e293b;
      transform: scale(1.1);
      box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
    }

    #match {
      margin-top: 25px;
      font-size: 1.2rem;
      min-height: 1.5em;
      color: #38bdf8;
      font-weight: bold;
    }

    .button-container {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .series-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    button {
      padding: 12px 25px;
      font-size: 16px;
      cursor: pointer;
      background-color: #38bdf8;
      border: none;
      border-radius: 8px;
      color: #0f172a;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      background-color: #7dd3fc;
      transform: translateY(-2px);
    }

    button:disabled {
      background-color: #475569;
      cursor: not-allowed;
      transform: none;
    }

    #result {
      margin-top: 30px;
      font-size: 1.1rem;
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 12px;
      display: inline-block;
      min-width: 320px;
      text-align: left;
    }

    .score-display {
      font-size: 3.5rem;
      font-weight: bold;
      text-align: center;
      margin-bottom: 10px;
      color: #38bdf8;
    }

    .game-line {
      border-bottom: 1px solid #2d3748;
      padding: 8px 0;
      font-size: 0.95rem;
    }

    .winner-box {
      margin-top: 20px;
      font-size: 1.8rem;
      color: #fbbf24;
      text-align: center;
      font-weight: bold;
      padding: 10px;
      border: 2px solid #fbbf24;
      border-radius: 8px;
    }

    .status-msg {
      font-style: italic;
      color: #94a3b8;
      text-align: center;
      margin-bottom: 10px;
    }

    .current-series-score {
      font-size: 2rem;
      text-align: center;
      color: #fff;
      margin-bottom: 5px;
    }

    @media (min-width: 600px) {
      .team { width: 80px; }
      h1 { font-size: 2.5rem; }
    }
  </style>
</head>
<body>

  <h1>🏒 NHL SIMULATOR</h1>

  <div class="teams" id="teams"></div>

  <div id="match">Vyberte dva týmy</div>

  <div class="button-container">
    <button id="simBtn" onclick="simulateMatch()">Simulovat zápas</button>
    <div class="series-buttons">
      <button id="bo3Btn" onclick="startSeries('bo3')">Série BO3</button>
      <button id="bo5Btn" onclick="startSeries('bo5')">Série BO5</button>
      <button id="bo7Btn" onclick="startSeries('bo7')">Série BO7</button>
    </div>
  </div>

  <div id="result"></div>

<script>
const teams = {
  bos: { name: "Boston Bruins", attack: 88, defense: 90, logo: "https://assets.nhle.com/logos/nhl/svg/BOS_dark.svg" },
  buf: { name: "Buffalo Sabres", attack: 84, defense: 82, logo: "https://assets.nhle.com/logos/nhl/svg/BUF_dark.svg" },
  det: { name: "Detroit Red Wings", attack: 85, defense: 83, logo: "https://assets.nhle.com/logos/nhl/svg/DET_dark.svg" },
  fla: { name: "Florida Panthers", attack: 92, defense: 89, logo: "https://assets.nhle.com/logos/nhl/svg/FLA_dark.svg" },
  mtl: { name: "Montreal Canadiens", attack: 79, defense: 80, logo: "https://assets.nhle.com/logos/nhl/svg/MTL_dark.svg" },
  ott: { name: "Ottawa Senators", attack: 83, defense: 82, logo: "https://assets.nhle.com/logos/nhl/svg/OTT_dark.svg" },
  tbl: { name: "Tampa Bay Lightning", attack: 89, defense: 86, logo: "https://assets.nhle.com/logos/nhl/svg/TBL_dark.svg" },
  tor: { name: "Toronto Maple Leafs", attack: 93, defense: 85, logo: "https://assets.nhle.com/logos/nhl/svg/TOR_dark.svg" },
  car: { name: "Carolina Hurricanes", attack: 87, defense: 91, logo: "https://assets.nhle.com/logos/nhl/svg/CAR_dark.svg" },
  cbj: { name: "Columbus Blue Jackets", attack: 78, defense: 77, logo: "https://assets.nhle.com/logos/nhl/svg/CBJ_dark.svg" },
  njd: { name: "New Jersey Devils", attack: 88, defense: 84, logo: "https://assets.nhle.com/logos/nhl/svg/NJD_dark.svg" },
  nyi: { name: "New York Islanders", attack: 81, defense: 86, logo: "https://assets.nhle.com/logos/nhl/svg/NYI_dark.svg" },
  nyr: { name: "New York Rangers", attack: 91, defense: 89, logo: "https://assets.nhle.com/logos/nhl/svg/NYR_dark.svg" },
  phi: { name: "Philadelphia Flyers", attack: 80, defense: 82, logo: "https://assets.nhle.com/logos/nhl/svg/PHI_dark.svg" },
  pit: { name: "Pittsburgh Penguins", attack: 84, defense: 81, logo: "https://assets.nhle.com/logos/nhl/svg/PIT_dark.svg" },
  wsh: { name: "Washington Capitals", attack: 82, defense: 83, logo: "https://assets.nhle.com/logos/nhl/svg/WSH_dark.svg" },
  chi: { name: "Chicago Blackhawks", attack: 77, defense: 78, logo: "https://assets.nhle.com/logos/nhl/svg/CHI_dark.svg" },
  col: { name: "Colorado Avalanche", attack: 94, defense: 89, logo: "https://assets.nhle.com/logos/nhl/svg/COL_dark.svg" },
  dal: { name: "Dallas Stars", attack: 91, defense: 91, logo: "https://assets.nhle.com/logos/nhl/svg/DAL_dark.svg" },
  min: { name: "Minnesota Wild", attack: 83, defense: 85, logo: "https://assets.nhle.com/logos/nhl/svg/MIN_dark.svg" },
  nsh: { name: "Nashville Predators", attack: 86, defense: 87, logo: "https://assets.nhle.com/logos/nhl/svg/NSH_dark.svg" },
  stl: { name: "St. Louis Blues", attack: 82, defense: 82, logo: "https://assets.nhle.com/logos/nhl/svg/STL_dark.svg" },
  uta: { name: "Utah Mammoth", attack: 81, defense: 80, logo: "https://assets.nhle.com/logos/nhl/svg/UTA_dark.svg" },
  wpg: { name: "Winnipeg Jets", attack: 87, defense: 89, logo: "https://assets.nhle.com/logos/nhl/svg/WPG_dark.svg" },
  ana: { name: "Anaheim Ducks", attack: 78, defense: 79, logo: "https://assets.nhle.com/logos/nhl/svg/ANA_dark.svg" },
  cgy: { name: "Calgary Flames", attack: 80, defense: 81, logo: "https://assets.nhle.com/logos/nhl/svg/CGY_dark.svg" },
  edm: { name: "Edmonton Oilers", attack: 95, defense: 84, logo: "https://assets.nhle.com/logos/nhl/svg/EDM_dark.svg" },
  lak: { name: "Los Angeles Kings", attack: 85, defense: 87, logo: "https://assets.nhle.com/logos/nhl/svg/LAK_dark.svg" },
  sjs: { name: "San Jose Sharks", attack: 75, defense: 76, logo: "https://assets.nhle.com/logos/nhl/svg/SJS_dark.svg" },
  sea: { name: "Seattle Kraken", attack: 81, defense: 84, logo: "https://assets.nhle.com/logos/nhl/svg/SEA_dark.svg" },
  van: { name: "Vancouver Canucks", attack: 78, defense: 80, logo: "https://assets.nhle.com/logos/nhl/svg/VAN_dark.svg" },
  vgk: { name: "Vegas Golden Knights", attack: 89, defense: 88, logo: "https://assets.nhle.com/logos/nhl/svg/VGK_dark.svg" }
};

const container = document.getElementById("teams");
let selectedA = null;
let selectedB = null;
let isAnimating = false;

function renderTeams() {
  for (let key in teams) {
    const div = document.createElement("div");
    div.classList.add("team");
    div.setAttribute("data-id", key);
    div.innerHTML = `<img src="${teams[key].logo}" title="${teams[key].name}">`;
    div.onclick = () => selectTeam(key);
    container.appendChild(div);
  }
}

function selectTeam(key) {
  if (isAnimating) return;
  if (!selectedA) {
    selectedA = key;
  } else if (selectedA === key) {
    selectedA = null;
  } else if (!selectedB) {
    selectedB = key;
  } else if (selectedB === key) {
    selectedB = null;
  } else {
    selectedA = key;
    selectedB = null;
  }
  
  document.querySelectorAll(".team").forEach(t => {
    const id = t.getAttribute("data-id");
    t.classList.toggle("selected", id === selectedA || id === selectedB);
  });
  updateMatch();
}

function updateMatch() {
  const matchDiv = document.getElementById("match");
  if (selectedA && selectedB) {
    matchDiv.innerText = `${teams[selectedA].name} vs ${teams[selectedB].name}`;
  } else if (selectedA) {
    matchDiv.innerText = "Vyber druhý tým...";
  } else {
    matchDiv.innerText = "Vyberte dva týmy";
  }
}

function getGoals(att, def, isHome) {
  let power = (att - def) / 10 + 2.8;
  if (isHome) power += 0.5;
  let luck = (Math.random() + Math.random() + Math.random()) / 1.5;
  return Math.max(0, Math.round(power * luck));
}

// Funkce pro 7s animaci
async function animateScore(finalA, finalB, isSeries = false, gameNum = 0, homeSide = "", winsA = 0, winsB = 0, ot = false) {
    const res = document.getElementById("result");
    let currentA = 0;
    let currentB = 0;
    const duration = 7000; 
    
    let goals = [];
    for(let i=0; i<finalA; i++) goals.push("A");
    for(let i=0; i<finalB; i++) goals.push("B");
    goals.sort(() => Math.random() - 0.5);

    const interval = goals.length > 0 ? duration / goals.length : duration;

    for (let i = 0; i < goals.length; i++) {
        await new Promise(r => setTimeout(r, interval));
        if (goals[i] === "A") currentA++; else currentB++;
        
        if (isSeries) {
            const homeTeamName = homeSide === "A" ? teams[selectedA].name : teams[selectedB].name;
            res.innerHTML = `
                <div class="status-msg">Série probíhá - Zápas ${gameNum} (doma: ${homeTeamName})...</div>
                <div class="current-series-score">${winsA} : ${winsB}</div>
                <div class="score-display">${currentA}:${currentB}</div>
                <div style="text-align:center">${teams[selectedA].name} vs ${teams[selectedB].name}</div>
            `;
        } else {
            res.innerHTML = `
                <div class="status-msg">Zápas probíhá...</div>
                <div class="score-display">${currentA}:${currentB}</div>
                <div style="text-align:center">${teams[selectedA].name} vs ${teams[selectedB].name}</div>
            `;
        }
    }
    
    // Zobrazení KONEC na 2 sekundy i v sérii
    if (isSeries) {
        const homeTeamName = homeSide === "A" ? teams[selectedA].name : teams[selectedB].name;
        res.innerHTML = `
            <div class="status-msg">Série probíhá - Zápas ${gameNum} (doma: ${homeTeamName})...</div>
            <div class="current-series-score">${winsA} : ${winsB}</div>
            <div class="score-display">${finalA}:${finalB}</div>
            <div style="text-align:center; font-weight:bold;">KONEC${ot ? " (v prodl.)" : ""}</div>
            <div style="text-align:center">${teams[selectedA].name} vs ${teams[selectedB].name}</div>
        `;
        await new Promise(r => setTimeout(r, 2000));
    } else if (goals.length === 0) {
        await new Promise(r => setTimeout(r, duration));
    }
}

async function simulateMatch() {
  if (!selectedA || !selectedB || isAnimating) return;
  isAnimating = true;
  toggleButtons(true);
  
  const A = teams[selectedA];
  const B = teams[selectedB];
  
  let finalA = getGoals(A.attack, B.defense, false);
  let finalB = getGoals(B.attack, A.defense, true);
  
  let ot = false;
  if (finalA === finalB) {
    ot = true;
    Math.random() < 0.5 ? finalA++ : finalB++;
  }

  await animateScore(finalA, finalB, false, 0, "", 0, 0, ot);
  
  const res = document.getElementById("result");
  res.innerHTML = `
    <div class="score-display">${finalA}:${finalB}</div>
    <div style="text-align:center; font-weight:bold;">${A.name} vs ${B.name}</div>
    <div style="text-align:center; color:#94a3b8; margin-top:5px;">${ot ? "Konečný výsledek (v prodloužení)" : "Konečný výsledek"}</div>
  `;
  
  isAnimating = false;
  toggleButtons(false);
}

async function startSeries(type) {
  if (!selectedA || !selectedB || isAnimating) return;
  isAnimating = true;
  toggleButtons(true);

  const res = document.getElementById("result");
  res.innerHTML = `<div class="status-msg">Série začíná...</div>`;

  let winTarget = type === "bo3" ? 2 : type === "bo5" ? 3 : 4;
  
  let homeSchedule = [];
  if (type === "bo7") homeSchedule = ["B", "B", "A", "A", "B", "A", "B"];
  else if (type === "bo5") homeSchedule = ["B", "B", "A", "A", "B"];
  else homeSchedule = ["B", "A", "B"];

  let winsA = 0, winsB = 0, gameIdx = 0;
  let history = [];

  while (winsA < winTarget && winsB < winTarget) {
    let homeSide = homeSchedule[gameIdx];
    let A = teams[selectedA];
    let B = teams[selectedB];

    let finalA = getGoals(A.attack, B.defense, homeSide === "A");
    let finalB = getGoals(B.attack, A.defense, homeSide === "B");
    let ot = false;
    if (finalA === finalB) {
        ot = true;
        Math.random() < 0.5 ? finalA++ : finalB++;
    }

    await animateScore(finalA, finalB, true, gameIdx + 1, homeSide, winsA, winsB, ot);

    if (finalA > finalB) winsA++; else winsB++;
    
    history.push({game: gameIdx+1, score: `${finalA}:${finalB}`, ot: ot, home: homeSide});
    
    renderSeriesProgress(winsA, winsB, history);
    gameIdx++;
  }

  const winner = winsA > winsB ? teams[selectedA].name : teams[selectedB].name;
  res.innerHTML += `<div class="winner-box">🏆 VÍTĚZ SÉRIE: ${winner.toUpperCase()} (${winsA}:${winsB})</div>`;

  isAnimating = false;
  toggleButtons(false);
}

function renderSeriesProgress(wA, wB, history) {
    const res = document.getElementById("result");
    let html = `
        <div class="status-msg">Průběh série</div>
        <div class="current-series-score">${wA} : ${wB}</div>
        <div style="text-align:center; margin-bottom:15px; font-weight:bold;">Historie zápasů:</div>
    `;
    
    history.forEach(h => {
        const homeName = h.home === "A" ? teams[selectedA].name : teams[selectedB].name;
        html += `<div class="game-line">
            Zápas ${h.game}: <strong>${h.score}</strong> 
            <span style="font-size:0.8rem; color:#94a3b8"> (Doma: ${homeName}${h.ot ? ", v prodloužení" : ""})</span>
        </div>`;
    });
    
    res.innerHTML = html;
}

function toggleButtons(disabled) {
    document.querySelectorAll("button").forEach(b => b.disabled = disabled);
}

renderTeams();
</script>
</body>
</html>
